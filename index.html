<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-accent: #1e293b;
      --card: #1e293b;
      --card-hover: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(
          ellipse at top,
          var(--bg-accent),
          var(--bg) 60%
        );
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding: 24px 16px calc(48px + env(safe-area-inset-bottom));
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
      padding: 8px 4px;
    }

    h1 {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 60px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      transition: background 0.18s ease, transform 0.1s ease,
        border-color 0.18s ease;
    }

    .nav-link .arrow {
      color: var(--accent);
      font-size: 1.25rem;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    /* Hover for devices with a pointer; active state covers touch */
    @media (hover: hover) {
      .nav-link:hover {
        background: var(--card-hover);
        border-color: var(--accent);
      }
      .nav-link:hover .arrow {
        transform: translateX(4px);
      }
    }

    .nav-link:active {
      transform: scale(0.98);
      background: var(--card-hover);
    }

    .nav-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Library</h1>
      <p>15 pages</p>
    </header>
    <nav>
      <a class="nav-link" href="agents.html"><span>Agents</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="api-layer.html"><span>Api Layer</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="containers.html"><span>Containers</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="context-management.html"><span>Context Management</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="finetuning.html"><span>Finetuning</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="inference.html"><span>Inference</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="kubernetes.html"><span>Kubernetes</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="mcp.html"><span>Mcp</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="mlops.html"><span>Mlops</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="monitoring.html"><span>Monitoring</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="multimodal-embeddings.html"><span>Multimodal Embeddings</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="rag-enterprise.html"><span>Rag Enterprise</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="similarity-search.html"><span>Similarity Search</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="vector-databases-in-production.html"><span>Vector Databases In Production</span><span class="arrow">&rsaquo;</span></a>
      <a class="nav-link" href="what-are-embeddings.html"><span>What Are Embeddings</span><span class="arrow">&rsaquo;</span></a>
    </nav>
    <footer>Tap any item to open</footer>
  </div>
</body>
</html>
