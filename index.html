прийшла до agentic mesh — десятки спеціалізованих AI-агентів від різних вендорів, кожен зі своєю експертизою. Подзвонити пасивну функцію недостатньо коли інший агент сам має думати, шукати, узгоджувати з третім агентом. - Sales agent від Salesforce треба узгодити з finance agent від SAP щоб виставити інвойс — обидва володіють своїми даними і логікою - Research agent делегує code review agent-у перевірку проекту — кожен має свою спеціалізацію - Travel booking agent координує з calendar agent і expense agent — мульти-сторонній workflow - Усі ці агенти можуть бути від різних компаній на різних моделях — потрібен спільний протокол Архітектура A2A — 5 ключових концептів 📋 Agent Card JSON-документ що описує агента: ім'я, опис, skills, endpoint, auth. Лежить за стандартним URL /.well-known/agent.json. Discovery аналог robots.txt — кожен агент сам себе анонсує. 🛠 Skills Високорівневі здібності — не функції. \"перевести текст з en→fr\", \"проаналізувати PR на безпеку\", \"запланувати meeting між 4 people\". Описуються природною мовою + JSON schema. 📨 Task Одиниця роботи з життєвим циклом: submitted → working → input-required → completed/failed. Тримає state. Може тривати години — асинхронна модель. 💬 Messages Обмін у форматі text / file / structured data всередині task. Агенти ведуть діалог, не один-в-один request-response. Можуть запитувати уточнення. 📡 Streaming (SSE) Server-Sent Events для long-running tasks — клієнт-агент отримує progress updates у real-time. Принципово відрізняється від MCP який в основному синхронний. 🔐 Auth + Push OAuth 2.0, mTLS, push notifications через webhooks — для enterprise. Агенти можуть повертатися самостійно коли робота готова. Live demo · Travel booking — Host агент координує 3 спеціалізованих агентів step 0 / 6 ‹ Prev Next › ▶ Play sequence Reset [] User \"Book trip to Lisbon\" Travel Host Agent orchestrator a2a/discover Flight Agent United Airlines search_flight Hotel Agent Booking.com find_hotel Calendar Agent Google Workspace block_dates ▶ Press Play Покажемо як Travel Host Agent координує 3 спеціалізованих агентів від різних компаній (United, Booking, Google) щоб виконати одну задачу користувача. MCP vs A2A — коли який Аспект MCP A2A -------------------- --------------------------- ---------------------------------------- Хто з ким говорить AI ↔ tool/service AI ↔ AI Друга сторона Пасивний JSON-RPC сервер Активний агент із власною логікою Транспорт stdio (локально) / HTTP HTTP + SSE для streaming Тривалість виклику Секунди (synchronous) Хвилини-години (asynchronous) Discovery Server-list у Host config Agent Cards на /.well-known/agent.json State Часто stateless Stateful Tasks з життєвим циклом Уточнюючі питання — ні (один shot) ✓ так (multi-turn) Push notifications — ні ✓ webhooks Створено Anthropic, 2024 Google, 2025 (Linux Foundation) Зрілість 2026 stable evolving Ключова теза: MCP і A2A — комплементарні, не конкуруючі. Реальний production-агент 2026 використовує обидва: A2A для координації з іншими агентами (delegation, multi-step workflows), MCP для звертань до своїх tools (БД, API, файлова система). Як HTTP + SMTP — обидва живуть поруч, кожен для своєї задачі. Коли інвестувати у A2A ✓ A2A підходить коли - Будуєш multi-agent систему з 3+ спеціалізованих агентів - Агенти живуть у різних компаніях / стеках / моделях - Workflow довготривалий — хвилини, години - Потрібен real-time progress через SSE - Агентам треба домовлятися (negotiate price, dates, options) ✗ A2A — overkill коли - Один агент + tools — MCP достатньо - Усі агенти у тебе в репозиторії — можна викликати напряму - Простий sequential pipeline без negotiation - Latency-critical — A2A додає async overhead - Прототип/демо — інвестиція не окупиться 09 · Реальні use cases — де MCP вже працює у production MCP не лабораторна іграшка — вже у 2025-26 його використовують Anthropic, OpenAI, Cursor, Block, Sourcegraph, Zed. Розглянемо три персони які отримують різну вигоду. 👨‍💻 Developer productivity persona Cursor IDE підключає GitHub MCP — AI бачить PR-и, issues, репозиторії. Не треба копіювати code review у chat. Claude Desktop + filesystem MCP — Claude читає локальні файли, виконує grep, експортує markdown. Claude Desktop + Postgres MCP — Claude пише і виконує SQL прямо на твоїй базі. - Виграш: економія 30-60 хв/день на context switching між AI і інструментами - Setup: 5-10 хвилин на конфіг 🏢 Enterprise data access persona Внутрішній MCP-сервер компанії експортує Confluence + JIRA + Slack як єдиний інтерфейс. AI-асистент компанії підключається через MCP → отримує доступ до всіх внутрішніх знань без custom integration на кожен сервіс. IAM-permissions працюють на рівні MCP Server через OAuth — кожен користувач бачить тільки те що йому дозволено. - Виграш: compliance + uniform audit log + переносимість між AI-провайдерами - Setup: один platform engineer на 2-4 тижні 🤖 Agentic workflows persona AI-агент має 5 MCP-серверів: Gmail, Calendar, CRM, Stripe, Slack. Виконує мульти-step задачу: \"знайди клієнтів які не оплатили інвойс за 30+ днів, надішли email, постав follow-up у календар, нотіфай sales-канал\". Жодного коду інтеграції не треба писати — все через стандартні MCP-сервери. - Виграш: час від ідеї до production agent — дні, не тижні - Setup: підключити готові сервери + написати prompt Реальні приклади продуктів що підтримують MCP (станом на 2026) Claude Desktop Native MCP-конфіг через claude_desktop_config.json Cursor IDE MCP-розширення для будь-якого AI-провайдера Zed editor MCP як основний механізм AI-інтеграцій Sourcegraph Cody MCP для context із внутрішніх джерел Block (Square) Внутрішні MCP-сервери для розробників OpenAI Agents SDK MCP як рекомендований transport Anthropic Skills Skills використовують MCP під капотом 200+ community servers Готові сервери для Slack, Notion, AWS, Kubernetes 10 · Безпека — що відбувається коли AI отримує доступ до твоїх інструментів Підключаєш MCP-сервер з повним read/write доступом до GitHub — AI технічно може видалити репозиторій. Це реальна проблема яку треба вирішувати правильно. MCP має 4 шари безпеки що працюють разом. 🔒 Шар 1: Server-side permissions Сервер сам обмежує що дозволено. Filesystem MCP server можна налаштувати на read-only mode або обмежити конкретними директоріями. Принцип: не довіряй AI — обмежуй на рівні Server. Він знає реальні permissions, AI може помилитись. 👤 Шар 2: Host-side approval Claude Desktop і Cursor показують user confirmation dialog перед виконанням destructive tool. Користувач бачить \"Claude хоче видалити файл /tmp/foo — Approve / Deny\" і вирішує. Принцип: destructive operations завжди йдуть через людину. 🔑 Шар 3: OAuth scopes MCP підтримує OAuth 2.0 з scopes. Gmail-сервер може запитати тільки gmail.readonly — не повний доступ. Користувач бачить scope-list у consent screen. Принцип: мінімальний privilege. Завжди запитуй найвужчий scope. 📦 Шар 4: Sandbox processes Server запускається як окремий процес з власними правами. Якщо Server скомпрометований — він не може вийти за межі sandbox. Принцип: isolation за замовчуванням. Server це окрема \"ящик\" а не частина Host-процесу. ⚠ Anti-patterns яких слід уникати - Підключати MCP-сервери з невідомих джерел. Як npm — може містити malware. Кожен Server це повноцінний процес на твоїй машині. - Дозволяти AI виконувати arbitrary shell commands через MCP без human approval. Найшвидший шлях до prompt injection → data exfiltration. - Зберігати API keys у конфізі MCP-сервера у plaintext. Використовуй OS keychain (macOS Keychain, Windows Credential Manager) або змінні середовища з обмеженим доступом. - Підключати write-MCP до публічних AI-сервісів. Якщо твій бот доступний користувачам — обмежуй MCP-сервери на read-only. Правило: MCP збільшує power AI-агента, але також збільшує attack surface. Кожен підключений Server — це новий шлях для potential prompt injection або data exfiltration. Перед підключенням нового сервера у production задавай три питання: (1) що він може зробити у найгіршому випадку? (2) які scopes йому реально потрібні? (3) чи можна звузити до read-only або до однієї директорії? ⚠ Реальні інциденти 2026 — це не теорія За перші п'ять місяців 2026 з'явилось понад десяток CVE у популярних MCP-серверах. Це означає що абстрактні ризики вище — конкретні вектори, які вже експлуатуються. Ось найгучніше: ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ CVE / Reference CVSS Компонент і суть ------------------------- ----------------------- ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- CVE-2026-32211 9.1 @azure-devops/mcp — missing authentication. Server від Microsoft приймав tool-виклики без перевірки токена. Будь-хто з мережевим доступом міг читати repo, pipelines, секрети. Виправлено у v2.0. квітень 2026 critical 3× CVE у mcp-server-git high Офіційний git-сервер Anthropic. Три вразливості prompt injection → file read/delete. Зловмисний commit message змушував AI-агента читати ~/.ssh/id_rsa або видаляти файли поза репо. Це найболючіше — incident у \"reference implementation\". січень 2026 · Cyata CVE-2026-30615 high Zero-click prompt injection у Windsurf. Клас вразливостей у AI IDE: Cursor, Claude Code, Gemini-CLI, GitHub Copilot вразливі схожим чином. Зловмисний файл у відкритому проєкті → exfiltration через MCP без жодного кліку юзера. квітень 2026 OX Security advisory varies Command injection у MCP STDIO. 10 CVE одночасно для серверів, які передавали аргументи у shell без sanitization. Класичний 90-х CWE-78 повернувся через MCP-обгортки. CVE-2026-23947 — типовий приклад. 2026 · 10 CVE NSA CSI U/OO/6030316-26 guidance Cybersecurity Information Sheet від NSA з рекомендаціями: OAuth 2.1 mandatory, session-scoped tokens, sandbox isolation, audit trails. Обов'язкове читання перед deploy у regulated environment. травень 2026 ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ Висновок: класичні вразливості (SSRF, path traversal, command injection) у поєднанні з prompt injection створюють розширену поверхню атаки, до якої більшість команд не готова. Перед підключенням публічного MCP-сервера у production: (1) перевірити CVE-базу для пакета; (2) запустити у sandbox (Docker, Daytona, Cloudflare Sandbox) — ніколи як native process з повними правами; (3) увімкнути audit log на всі tool-виклики. 11 · Екосистема — і коли НЕ використовувати MCP MCP — потужний інструмент, але не silver bullet. Іноді function calling простіше і правильніше. Розглянемо коли MCP підходить, коли overkill, і яка зрілість екосистеми у 2026. ✓ MCP підходить коли - Будуєш AI-агента що підключається до багатьох сервісів (Slack, GitHub, БД, API) - Хочеш щоб tools переносились між Host-ами (Claude → Cursor → власний bot) - Команда має багато AI-додатків які потребують спільних інтеграцій - Будуєш enterprise AI-платформу з permission management і audit - Інтегруєш AI з internal compliance-критичною системою - Хочеш мати свободу міняти LLM-провайдера без переписування інтеграцій ✗ MCP — overkill коли - Простий chatbot з 2-3 hardcoded функціями — function calling достатньо - Однорангове scripting — Python script з OpenAI SDK і прямими API calls простіший - Latency-critical системи — JSON-RPC overhead може коштувати десятки мс - Real-time streaming — MCP transport не оптимізований під SSE/WebSocket high-throughput - Демо/прототип — у нього і так піде у смітник, не варто інвестувати у Server - Один-провайдер один-tool — нема що переносити, нема що стандартизувати Зрілість екосистеми (станом на 2026) Компонент Стан Примітки ------------------------- ---------- ------------------------------------------------------- JSON-RPC core spec stable Версія 2024-11-05 не зміниться без deprecation period stdio transport stable Default для локальних серверів, добре працює HTTP/SSE transport stable Для віддалених серверів і enterprise OAuth 2.0 flow stable Стандартні scopes, типова integration Python SDK stable Офіційний mcp пакет, активна підтримка TypeScript SDK stable @modelcontextprotocol/sdk WebSocket transport evolving Новий, ще не стандартизований для всіх кейсів Schema versioning evolving Best practices ще формуються Observability standards evolving OpenTelemetry integration на ранніх стадіях Альтернативи якщо MCP не підходить - OpenAI Agents SDK — фреймворк, не протокол. Простіший старт, але vendor-locked на OpenAI. - LangChain tool calling — для prototyping і одноразових скриптів. У production менш переносимо. - Native function calling — найпростіше для одного провайдера, найскладніше для портабельності. - Custom REST API — якщо твій Server вже існує як internal REST API, можна не загортати у MCP, а викликати напряму через function calling. 12 · Recap — практичні висновки Підсумуємо що варто винести з лекції і що зробити цього тижня. Ключові тези лекції — у п'яти реченнях - MCP — це стандартизація того що раніше кожен фреймворк винаходив сам. Не нова технологія, не модель — протокол. - Три ролі: Host (застосунок), Client (з'єднання), Server (capability provider). Server можна писати один раз і переюзовувати з будь-яким Host. - Три типи капабіліті: Tools (модель викликає), Resources (модель читає), Prompts (юзер вибирає). Function calling має лише tools — MCP додає два інші шари. - MCP не замінює function calling — надбудовується над ним. LLM генерує tool_use, Host транслює у MCP. Модель цього не помічає. - Default вибір для production AI-агентів у 2026. Підтримують всі major вендори, екосистема зріла, інвестиція окуповується через 6-12 місяців переносимості. Recap — симптом → який шар MCP розв'язує Симптом / задача Що використати Чому ----------------------------------------- -------------------------- ----------------------------------------------------- Модель має викликати функцію (write) Tool LLM сама вирішує коли — стандартний tool calling Модель має прочитати документ Resource Attach у context, без витрачання tool call rotation Юзер часто робить ту саму операцію Prompt Шаблон у dropdown — швидше і надійніше Потрібен переніс tools між провайдерами MCP Server Один Server працює з Claude, GPT, Gemini одночасно Enterprise auth для AI-доступу MCP + OAuth Стандартні scopes, audit log на рівні Server Простий chatbot з 2 функціями Function calling напряму MCP overkill, не варто інвестувати в Server Що зробити цього тижня - Встанови Claude Desktop і подивись як виглядає UI з підключеним MCP — 10 хвилин роботи - Підключи готовий filesystem MCP server — побачиш протокол у дії на твоїх локальних файлах - Прочитай specification на modelcontextprotocol.io — це 30 сторінок, читається за вечір - Виконай домашнє завдання — напиши власний MCP-сервер. Це єдиний спосіб по-справжньому зрозуміти протокол. - Подивись список 200+ community MCP-серверів на GitHub — імовірно для твого use case вже є готовий Фінальна думка: MCP — це не нова технологія, це стандартизація. Так само як HTTP не винайшов клієнт-сервер а стандартизував його, MCP не винайшов tool use — він зробив його портабельним. Це виглядає менш ефектно ніж нова модель, але має більший довгостроковий вплив: AI-система яку ви пишете сьогодні з MCP — буде працювати з моделями і платформами 2030 року без переписування. Це і є основна цінність."}, {"file": "finetuning.html", "title": "Finetuning", "badge": "17", "text": "LLM Fine-Tuning in Production Заняття 17 · AI Engineering Course · коли API-промптів недостатньо Як донавчати моделі під свою задачу без власних GPU-кластерів та без десятків тисяч доларів на епоху. Урок про eval-driven engineering, не про теорію градієнтів. До кінця: знатимете коли FT справді варто, як виміряти quality lift, і чому \"велика модель + малий датасет\" у 2026 — це не overfit. 🎯 Три рівні втручання у LLM — клікайте щоб порівняти Спочатку треба зрозуміти на якому рівні ваша задача. Fine-tuning — це третій крок, не перший. Більшість команд приходять до нього занадто рано. ① Prompting $0 · setup 5 хв Лише input змінюється. Системний промпт + few-shot examples. 90% задач вирішуються тут. ② RAG $50-500/міс · setup 1-3 дні Контекст з retrieval. Для актуальних/приватних даних які модель не знає. ③ Fine-tuning $1-1000 · setup 3-30 днів Ваги моделі змінюються. Для стилю, формату, доменної лексики. 01 · Що таке fine-tuning і чому це інженерна задача Fine-tuning — це не магія і не data science. Це інженерна задача про дані, метрики і trade-offs. Правильно зроблений FT економить тисячі доларів на місяць у проді; неправильно — згорає бюджет і дає гіршу якість за вихідний промпт. Завдання уроку — навчити вас приймати рішення про FT на числах, а не на хайпі. Дві характеристики mid-level engineer'а який працює з AI 🟢 Те що вміють усі Викликати API LLM. Обернути у HTTP-endpoint. Поставити Redis для кешу. 90% backend engineers зупиняються тут. 🔵 Те що рідко хто вміє Натренувати власну модель + виміряти ROI + пояснити CTO коли FT варто vs RAG vs прoмптинг. ~5% engineers. Це і є те, що ми вивчаємо. Головне правило уроку: ML engineering у 2026 — це 80% data + 20% training. Найважливіше у fine-tuning — не модель, не GPU і не гіперпараметри. Це якість даних і eval set. 02 · Три підходи — коли що використовувати Найчастіша помилка команд що тільки почали з LLM — стрибнути на fine-tuning як перший крок. Правильний порядок: prompting → RAG → fine-tuning. Кожен наступний крок дорожчий і складніший, але вирішує клас проблем якого попередній не може. Підхід Що змінюється Коли застосовувати Вартість ------------- ------------------------ ------------------------------------------------------------------------------------- ------------------------------------- Prompting Лише input Завдання вирішується через інструкції в системному промпті $0 на adaptation RAG Контекст від retrieval Потрібні актуальні/приватні дані, яких модель не знає Дешево; складно по інфраструктурі Fine-tuning Ваги моделі Стиль/формат відповіді, доменна лексика, складні patterns що не вміщаються у промпт $100-$10K на тренування + inference Decision tree — як вибрати правильний шлях - Ваша задача описується чітким промптом + 3-5 прикладами? → Prompting. Не йдіть далі. - Потрібні актуальні дані (новини, ваша внутрішня вікі, документи клієнтів)? → RAG. FT тут не допоможе — він не дає \"знання\", він дає \"поведінку\". - Модель робить помилки які promprting не виправляє? Спершу спробуйте кращий промпт, few-shot, structured outputs. - Виміряли baseline, спробували 3 варіанти промпту, нічого не дало нормальної якості? → Тільки тоді fine-tuning. Правило вибору: спершу prompting → RAG → fine-tuning. Не навпаки. Fine-tuning — це коли перші два не дають потрібної якості, і у вас є ≥500 якісних training прикладів. 03 · Що таке fine-tuning технічно — три типи Fine-tuning — це продовження тренування pre-trained моделі на вашому датасеті з малим learning rate. Pre-trained model вже бачила трильйони токенів. Fine-tuning донавчає її на 1K-100K прикладах вашої специфічної задачі. Три типи fine-tuning у production 📚 Continued pre-training На сирому тексті домена (юр-документи, медичні картки, ваш кодбейс). Модель вчиться лексики і стилю. Дорого: 100K+ прикладів, full weights. 🎯 Supervised fine-tuning (SFT) На парах (prompt, ideal_response). Модель вчиться формату відповідей. У 95% production-кейсів — це те що вам треба. 🏆 Preference tuning (RLHF / DPO) На парах (chosen, rejected). Модель вчиться які відповіді кращі. Research-level, дорого. У 2026 для AI engineer у проді — це майже завжди SFT. Continued pre-training — це research labs. RLHF/DPO — це OpenAI/Anthropic які роблять frontier models. Ваша робота — SFT з якісним датасетом. 04 · Fine-tuning = Transfer Learning — це той самий концепт Якщо ви бачили \"transfer learning\" у попередніх ML-курсах — це той самий підхід, що сучасний fine-tuning. Просто інша назва з іншої епохи. 👴 Класичний transfer learning (2014-2020) Брали ImageNet-pretrained ResNet. Заморожували нижні шари (feature extractor). Тренували лише останні classification-шари на своєму датасеті фотографій котиків. 🆕 Сучасний LLM fine-tuning (2023+) Беремо pre-trained Llama / GPT / Mistral. Заморожуємо base weights (через LoRA — далі). Тренуємо невеликі адаптери на доменному датасеті. Ключова ідея в обох випадках одна: не вчити модель з нуля, а перенести знання з general domain (ImageNet / web text) у спеціалізований (медицина / юриспруденція / ваш код). Чому термін змінився У CV transfer learning означав заміну classification head. У LLM ми переймаємо всю generative-здатність і донавчаємо стилю/формату відповідей. Це той самий принцип, але інший шар моделі модифікується. У 2026 кажуть \"fine-tuning\" — це правильна назва для роботи з LLM. 05 · PEFT і LoRA — чому ми не тренуємо всі ваги Full fine-tuning 70B моделі вимагає ~1.5TB GPU RAM. Це 20 × H100 = $40K на місяць оренди. Тому з 2023 року стандарт — Parameter-Efficient Fine-Tuning (PEFT). 🦥 LoRA: тренуємо адаптери замість всієї моделі [] Frozen base (8B params, не змінюємо) Trainable LoRA adapter (~10M params) КЛЮЧОВЕ Замість тренування 8 мільярдів параметрів — тренуємо ~10 мільйонів (0.1%). Це і є відповідь на питання \"чи не переобучить велику модель малий датасет?\" — ми не тренуємо велику модель. Тренуємо лише маленький адаптер поверх неї. Чотири варіанти PEFT у 2026 🅛 LoRA 2021 2 матриці-адаптери поверх attention-шарів. Замість 8B params навчаємо ~10M. Industry standard. 🅠 QLoRA 2023 LoRA + base model квантована у 4-bit. Економить ~4× VRAM. Можна тренувати 8B на Colab T4 (15 GB). 🅓 DoRA 2024 NVIDIA Weight-Decomposed LoRA. Розкладає update на magnitude + direction. +3-5% accuracy над LoRA при тих самих params. 🅐 Adapters / Prefix Tuning 2019 Варіації LoRA. Рідше використовуються у проді — LoRA сімейство \"виграло\". 🅓 DoRA — Weight-Decomposed Low-Rank Adaptation DoRA опублікована NVIDIA Research у лютому 2024 (arXiv:2402.09353), у production-фреймворках з 2025. Інтегрована у PEFT library (HuggingFace), Unsloth, Axolotl. Ідея: класична LoRA додає одну матрицю-update ΔW = B × A. DoRA розкладає кожен weight vector на magnitude (длина) та direction (напрямок), і тренує їх окремо. 🔬 DoRA: magnitude vs direction decomposition [] DoRA Ключова інсайт: під час full fine-tuning ваги змінюються несиметрично у magnitude vs direction. LoRA не може відтворити цей патерн (один update міксує обидва). DoRA розкладає оновлення на дві окремі траєкторії — результат ближчий до full FT при тій самій кількості trainable parameters. LoRA vs DoRA — що показують benchmarks Метрика LoRA r=16 DoRA r=16 Різниця ------------------------------------ ------------ ------------ ------------------------------- Commonsense reasoning (Llama 3 8B) 74.2% 77.5% +3.3pp Image/Video classification (LLaVA) 67.8% 71.1% +3.3pp Trainable params ~10M ~10.3M +3% (magnitude vector) VRAM during training ~7 GB ~7.2 GB +200 MB (ignorable) Training time per epoch ~20 хв ~22 хв +10% (decomposition overhead) Inference latency 0 (merged) 0 (merged) — Коли вибирати DoRA замість LoRA: якщо вам критичні останні 3-5% якості (high-stakes domain: medical, legal, financial), і ви можете дозволити +10% training time. Коли LoRA достатньо: більшість structured tasks (extraction, classification, summarization) — там навіть baseline LoRA близько до ceiling, DoRA дає мінімальний lift. DoRA — це quality optimization, не cost optimization. Як використати DoRA у вашому коді # PEFT library (HuggingFace) — одна зміна параметра from peft import LoraConfig config = LoraConfig( r=16, lora_alpha=32, target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\"], use_dora=True, # ← єдина зміна. Решта identical to LoRA ) Це і все — DoRA активується одним прапорцем. Не треба переписувати training loop. Unsloth, Axolotl, LLaMA-Factory підтримують аналогічно. 🧠 Counter-intuition: чому велика модель + малий датасет ≠ overfit ❌ Класичний ML (CV, 2010-х) ResNet-152 на 500 фото → overfit, бо тренуємо всі ваги. Класичний bias-variance tradeoff: модель ємніша за дані → запам'ятовує. ✅ Сучасний LLM (LoRA, 2024+) Llama 8B + LoRA на 500 прикладах → не overfit, бо тренуємо лише 0.1% параметрів. Адаптер крихітний, для нього 500 прикладів — нормальний обсяг. На практиці у 2026: 99% production-fine-tuning — це QLoRA. Якість майже як у full fine-tuning, вартість у 10-100× нижча. Студенти на цьому уроці робитимуть саме QLoRA. 06 · Anatomy of training dataset — найважливіша частина Найважливіше у fine-tuning — не модель і не GPU. Це датасет. 80% часу проекту з FT йде на роботу з даними, а не на тренування. Структура SFT-датасету для chat-моделей // jsonl — один рядок на приклад {\"messages\": [ {\"role\": \"system\", \"content\": \"You extract structured data...\"}, {\"role\": \"user\", \"content\": \"Hi, I want to cancel my Pro Plan. — John\"}, {\"role\": \"assistant\", \"content\": '{\"customer_name\":\"John\",\"product\":\"Pro Plan\",...}'} ]} Ключові метрики якості датасету - Кількість. Мінімум 500-1000 прикладів для відчутного ефекту. Sweet spot — 5K-50K. Менше 200 — швидше зробіть кращий промпт. - Різноманітність. Покриває edge cases, не лише happy path. Тестуйте на anonymous emails, multiple issues, sarcasm, mixed languages. - Чистота. Одна помилкова відповідь у датасеті = модель її повторює. Garbage in → garbage out. - Версіонування. Датасет у git/DVC. Кожна модель прив'язана до конкретної версії датасету. - Hash-check overlap з eval set. Якщо eval-приклад потрапив у train — метрики стають брехнею. Інженерне правило: якщо у вас немає 500+ якісних прикладів — спершу зберіть дані, потім думайте про FT. Не навпаки. Згенерувати синтетично через GPT-4 можна, але треба переглянути 30-50 прикладів руками щоб переконатись що не junk. 07 · Hyperparameters — рецепт що працює у 95% випадків На відміну від класичного ML, у QLoRA fine-tuning гіперпараметри майже стандартизовані. Не треба grid search — є робочі дефолти. Базовий рецепт для SFT з QLoRA (Llama 3.x / Mistral 7B-70B) # TrainingArguments learning_rate=2e-5, # стандарт для LoRA: 1e-4 до 2e-5 per_device_train_batch_size=8, # макс що влізе у VRAM gradient_accumulation_steps=4, # ефективний batch = 32 num_train_epochs=3, # 1-3; більше → overfitting warmup_ratio=0.03, # 3% steps на warmup lr_scheduler_type=\"cosine\", # cosine decay після warmup bf16=True, # bfloat16 на H100 / A100 # LoraConfig r=16, # rank — 8/16/32; більше = ємніший адаптер lora_alpha=32, # scaling; правило: alpha = 2 × r lora_dropout=0.05, target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\"], Коли крутити параметри Симптом Виправлення ---------------------------------- -------------------------------------------------------------- LR закнизький → loss не падає Підняти до 5e-5 LR зависокий → loss скаче Знизити до 1e-5 Overfit на 3 епохах epochs=1 або більший датасет VRAM OOM Батч ↓, gradient_accumulation ↑ (ефективний batch той самий) Модель надто agressive у форматі Зменшити LoRA r до 8 Не починайте з власних hyperparameters. Візьміть рецепт з Unsloth-документації або з паперу про конкретну модель — там уже все підібрано. Кастомний tuning — це пастка для початківця. 08 · Label masking — silent bug №1 у SFT Класична помилка початківця: тренувати модель копіювати весь діалог, включно з системним промптом і user-запитом. При SFT мають обчислюватись gradients тільки на токенах assistant-відповіді. Що таке label masking — наочно # Pseudo-code label masking у SFT input_ids = [SYS] [USER] [ASSISTANT] response_tokens labels = [-100] [-100] [-100] response_tokens ↑ loss обчислюється тільки тут Спеціальне значення -100 каже PyTorch CrossEntropyLoss ігнорувати ці позиції. System message і user message — це input, не target. Найпопулярніший marker у датасетах ### Response: або <|assistant|>. Tokenizer їх знаходить → label masking автоматично. У сучасних бібліотеках (TRL, Unsloth, Axolotl) це робиться автоматично через train_on_inputs=False параметр. ⚠ Без label masking модель вчиться генерувати свій же user-запит, втрачає вміння instruction-following. Це silent bug — loss падає, метрики виглядають OK, але модель деградує. У production проявляється як \"модель повторює питання користувача замість того щоб відповідати\". 09 · Inference cost — економіка після training Fine-tuning не безкоштовний у production навіть після тренування. Розрахуй inference cost ДО початку. Інакше натренуєте круту модель, яка економічно не виправдана. Три моделі вартості inference Варіант $ / 1M tokens Latency Setup ----------------------------------------------- ---------------------------- ---------- --------------------- API base (Llama 3.3 70B через Together) $0.88 / $0.88 ~300ms Нуль API fine-tuned (dedicated endpoint) $0.43-$0.86 за хвилину ~100ms Endpoint management Self-hosted fine-tuned (vLLM на власному GPU) $0.10-$0.50 (compute only) 50-100ms DevOps складно Breakeven point — коли FT економічно виправданий - < 1M токенів/день → API base + краще prompting / RAG. FT тут не окупається. - 1-10M токенів/день → API fine-tuned (без DevOps). Дешевше за base + якість краща. - > 10M токенів/день → Self-hosted з vLLM. На 5-20× дешевше API, але треба DevOps. Інженерне правило: не починайте з self-hosted. Спочатку API fine-tuning (Together / Fireworks) — щоб дізнатись чи fine-tuning взагалі дає потрібну якість. Потім, якщо traffic виправдовує — переходьте на self-hosted. ⚠ 2026 зміна: OpenAI закрила self-serve FT для нових організацій З 7 травня 2026 OpenAI заблокувала створення нових fine-tuning jobs для організацій що раніше не використовували FT. До 6 січня 2027 — повне закриття для всіх. Для нових AI engineer-ів у 2026 OpenAI FT не є опцією. Стек 2026 — Together AI / Fireworks для cloud або Unsloth + Colab для local. 10 · Production pipeline — 7 кроків Як виглядає реальний fine-tuning цикл у компанії. Без кроку 1 (eval set) не починайте — без нього неможливо зрозуміти що FT щось покращив. 01 Eval set first 100-500 ручних кейсів з очікуваними відповідями 02 Baseline measure Прогнати base model через eval — точка відліку 03 Dataset collection 1K-10K training прикладів, hash-check vs eval 04 Train QLoRA через Unsloth/Together, 1-3 епохи 05 Eval vs baseline Обов'язково. Гірше за base? Рятуй дані, не модель 06 Shadow deploy 5-10% трафіку, порівнюй з base 07 Rollout Поетапне розширення з контрольованими metrics 11 · Що ламається у проді — incident patterns Реальні баги команд що зробили fine-tuning. Кожен з них — це silent failure: метрики виглядають OK, але модель деградує. Студенти на ДЗ зустрінуть мінімум 2 з 5. 🧠 Catastrophic forgetting Модель навчилась domain task, але втратила здатність до general reasoning. Рішення: змішати у train data ~10% general examples (Alpaca, ShareGPT). 🔄 Train/serve skew Тренували на ### Response: маркері, у проді шлемо інший prompt-format. Якість падає до random. Рішення: один tokenization pipeline у train і serve. 🩸 Eval contamination Eval examples попали у training set. Метрики ідеальні, у проді — катастрофа. Рішення: hash-based split до будь-якої роботи з даними. 📉 Безсимптомна деградація Шість місяців тому fine-tuned модель добре працювала, зараз гірша за base. Причини: drift у customer queries, новий тип запитів. Рішення: continuous evaluation з alertами (тема уроку 15). 💥 GPU OOM під inference Quantized model працює локально, у проді (batch=32) валиться. Рішення: load testing перед rollout, vLLM з правильним max_seq_len. 🔁 Repetition / loops Модель повторює training-фрази дослівно. Знак що датасет занадто homogenous або overfit. Рішення: 1 епоха, augmentation, температурний sampling. Інженерне правило: у звіті на ДЗ обов'язково напишіть що НЕ вийшло. Це не fail — це правильний результат. Розпізнати причину важливіше за ідеальні числа. Студент що знайшов train/serve skew у власному коді — кращий за того хто отримав magic 95% accuracy without explanation. 12 · Recap і decision tree Підсумок уроку у вигляді практичних правил, які ви забираєте з собою. ✓ Коли робити fine-tuning - Стійкий output-формат який важко описати промптом (specific JSON schema, code style) - Доменна лексика яку base model не знає (медичний/юридичний/industrial) - Скорочення промпту (system message з 5K токенів → 200 токенів) - Latency-critical: self-hosted fine-tuned model + менший base = швидше за API ✗ Коли НЕ робити fine-tuning - Потрібні актуальні дані → RAG - Не виміряли baseline якість → спершу eval - < 500 якісних training examples → збирай датасет, потім тренуй - < 1M токенів/день у продакшені → ROI негативний Стек 2026 для AI engineer'а який починає з FT # Training Unsloth + QLoRA # Colab T4 (free) або власна RTX 12+ GB Together AI # cloud, $1-5 на середній FT Fireworks # cloud, схожі ціни # Serving vLLM # self-hosted, найшвидший Together API # dedicated endpoint від $0.43/хв # Eval Promptfoo / DeepEval # з версіонованим eval set у git # Що НЕ використовувати у 2026 OpenAI fine-tuning # закрита для нових org з травня 2026 Головне правило уроку: fine-tuning — це інженерна задача про дані і метрики, не про модель. ML-engineering у 2026 = 80% data + 20% training. Студент що навчився вимірювати quality lift важливіший за того хто знає всі гіперпараметри. Що далі — ДЗ Уявіть SaaS-компанію з 50К support emails/день. Потрібно автоматично перетворювати їх у JSON для CRM. Натренуйте власну Llama 3.1 8B через Unsloth у Google Colab. Виміряйте baseline (Llama 3.1 8B base) vs fine-tuned. Чесно опишіть що вийшло і що ні. Звіт: comparison table + cost analysis + бізнес-рекомендація. Час: 3-4 години · Бюджет: $0 (Colab free) · Acceptance: eval set до тренування, обидві моделі на тих самих 30 прикладах, hash-check overlap, чесний розбір failures. LLM Fine-Tuning in Production · Заняття 17 · AI Engineering Course Що залишається після уроку: вміння виміряти quality lift, eval-driven thinking, розуміння коли FT справді варто."}, {"file": "inference.html", "title": "Inference", "badge": "18", "text": "Production LLM Inference Systems Заняття 18 · AI Engineering Course · architecture mindset для AI engineer Inference становить 70-85% операційного бюджету production AI-сервісу. Урок присвячено архітектурним рішенням, які приймає AI engineer: вибір між API та self-hosted інфраструктурою, multi-provider routing, структурованими outputs, багаторівневим кешуванням, дисципліною контролю витрат. Завдання курсу — забезпечити інженерну компетентність для проектування economically sustainable inference systems. 01 · cost framework 02 · three pillars 03 · API vs self-hosted 04 · multi-provider 05 · inference engines 06 · streaming + TTFT 07 · structured outputs 08 · caching strategies 09 · cost discipline 10 · production checklist Розподіл операційних витрат AI-сервісу Структура витрат production AI-системи має асиметричний характер. Основна частка операційного бюджету припадає на inference compute. Інші компоненти (storage, tracing, CI/CD, monitoring) у сукупності складають менше 20%. Inference compute 0% Training + fine-tuning 0% Storage + network 0% Monitoring + observability 0% Training є одноразовою операцією. Inference виконується безперервно протягом життєвого циклу сервісу. Відповідно, оптимізація inference має значно вищий cumulative impact порівняно з іншими компонентами стеку. 01 · Розмежування ролей: AI Engineer та ML Platform Engineer Урок присвячено компетенціям AI engineer у домені inference systems. Тематика низькорівневого tuning (PagedAttention, kernel optimization, GPU sharding) є предметом окремої дисципліни — ML platform engineering. Kubernetes-оркестрація розглянута у lesson 14. Фокус поточного матеріалу — архітектурні рішення, що приймаються на етапах проектування та масштабування системи. Компетенції AI Engineer Обґрунтування вибору API vs self-hosted на основі quantitative analysis. Проектування multi-provider routing зі стратегією fallback. Конфігурація багаторівневого кешування. Інтеграція structured outputs з downstream системами. Реалізація per-user cost controls. Компетенції ML Platform Engineer Тюнінг параметрів PagedAttention. Розробка CUDA kernels. Конфігурація GPU sharding strategies. Імплементація custom quantization pipelines. Налаштування TensorRT inference graphs. Оптимізація GPU memory layout. Принципове розмежування: AI engineer приймає архітектурні рішення щодо inference systems. Глибока оптимізація компонентів інфраструктури належить до іншої професійної області. Орієнтовний обсяг необхідних знань — на рівні tool awareness та decision frameworks. 02 · Three Pillars: Latency, Throughput, Quality Архітектурні рішення у домені inference systems характеризуються trade-off між трьома вимірами. Одночасна оптимізація всіх трьох вимірів є неможливою через фундаментальні обмеження. Ідентифікація домінуючого виміру для конкретного use case є необхідною передумовою вибору технологічного стеку. Інтерактивне порівняння — оберіть pillar для деталізації trade-offs Latency TTFT < 500ms · TPOT < 30ms Час відгуку системи. Домінуючий вимір для chat-assistants та real-time інтерфейсів. Throughput RPS · tokens/sec Кількість запитів за одиницю часу. Домінуючий вимір для batch processing та document pipelines. Quality accuracy · eval scores Точність та коректність output. Домінуючий вимір для medical, legal та financial use cases. Trade-off matrix архітектурних рішень Рішення Latency Throughput Quality -------------------------- ------------------------------ ------------ ---------------- Збільшення batch size погіршення покращення — Quantization int4 (AWQ) покращення покращення деградація ~1% Streaming (SSE) покращення perceived latency — — Менша модель (8B vs 70B) покращення покращення деградація Багаторівневе кешування покращення покращення — Decision rule: ідентифікація домінуючого виміру повинна передувати вибору технологічного стеку. Chat assistants — latency. Batch document processing — throughput. Medical, legal, financial domains — quality. Спроба одночасної оптимізації всіх трьох вимірів є архітектурною помилкою. 03 · Self-hosted vs API: Архітектурне рішення Вибір між API-based та self-hosted інфраструктурою є фундаментальним архітектурним рішенням, що приймається на початковій стадії проекту. Помилка вибору має значні економічні наслідки: масштаб втрат вимірюється десятками тисяч доларів щомісяця або зайвими інвестиціями у DevOps-інфраструктуру. Подальший виклад містить decision framework для обґрунтованого вибору. Порівняння по 7 критеріях Критерій API provider Self-hosted (vLLM) -------------------------- ----------------------------- ------------------------ Setup time Хвилини Дні-тижні Initial cost $0 $5-50K (GPU) Cost / 1M tokens $0.5-15 $0.1-2 (compute) Latency 200-500ms 50-200ms Privacy, compliance Дані йдуть провайдеру Власна інфраструктура Custom fine-tuned models Лише підтримані провайдером Будь-які з HuggingFace DevOps overhead Нуль Великий Decision tree — інтерактивна послідовність критеріїв Завантаження... ↻ Почати з початку Breakeven analysis — параметрична модель порівняння вартості [] $ / 1M tokens (API) $6.00 GPU $/місяць $3000 Інженерний принцип: вибір self-hosted інфраструктури повинен ґрунтуватися виключно на quantitative economic justification. Рекомендована стратегія — старт з API-провайдерів та міграція на self-hosted лише при наявності емпіричних даних, що демонструють економічну доцільність. 04 · Multi-Provider Routing та Fallback стратегії Залежність production-системи від єдиного API-провайдера створює неприйнятні ризики availability. Інциденти на стороні провайдерів (OpenAI, Anthropic) відбуваються з регулярною періодичністю. Rate limits, цінові зміни, регіональна деградація latency є передбачуваними подіями. Архітектура multi-provider routing повинна закладатися на початковій стадії проектування системи. Класифікація операційних інцидентів за частотою та impact Категорія інциденту Частота Наслідок без fallback -------------------------------------- -------------------------- ------------------------------ Provider outage (OpenAI, Anthropic) 2-5 разів на рік Service unavailable Rate limit при пікових навантаженнях Тижнева періодичність HTTP 503 на client side Cost escalation через зміну pricing Квартальна періодичність Перевищення budget forecasts Регіональна деградація latency Безперервна P99 TTFT > 5s Архітектура multi-provider routing: інтерактивна симуляція LiteLLM як gateway шар Запустити симуляцію Reset [] SETUP Конфігурація 3 провайдерів через LiteLLM. Primary — OpenAI gpt-4o-mini. Fallbacks — Anthropic Claude Haiku, потім Together Llama 3.3. Натисніть \"Запустити симуляцію\", щоб побачити що відбувається при outage. Класифікація routing strategies Cost-based routing Primary provider — модель з нижчою вартістю; fallback — модель з вищою точністю. Застосовується коли більшість запитів є типовими, а deep reasoning потрібен рідко. Quality-based routing Primary provider — модель з найвищою точністю; fallback — більш економна. Застосовується для premium tier обслуговування. Latency-based routing Маршрутизація до найшвидшого регіону/провайдера на основі телеметрії. Застосовується для real-time interfaces та geo-distributed deployments. Класифікація tooling-рішень станом на 2026 Tool Functional scope Контекст застосування ------------ ---------------------------------------------------------- ----------------------------------------------------------- LiteLLM Multi-provider routing, fallback, cost tracking, caching Default-вибір. Open-source, Python ecosystem. Portkey LiteLLM + observability + prompt versioning Enterprise deployments з потребою у dashboard-інтерфейсі. OpenRouter Hosted gateway, 100+ моделей Швидкий запуск без локальної інфраструктури. Принцип архітектури: прямий виклик SDK провайдерів з production-коду є антипатерном. Інтеграція gateway-шару (LiteLLM, Portkey) рекомендована незалежно від поточної кількості провайдерів. Vendor lock-in повинен бути проактивно усунений на стадії проектування, до моменту виникнення операційних обмежень. 05 · Inference Engines та Performance Internals Self-hosted сценарії потребують компетенції у виборі inference engine. Глибока конфігурація компонентів належить до сфери ML platform engineering. Обов'язки AI engineer обмежуються коректним вибором інструменту відповідно до characteristics use case та уникненням архітектурних антипатернів. Порівняльна характеристика inference engines Engine Категорія Контекст застосування Обмеження -------------------- ------------------------- ------------------------------------------------- -------------------------------------------------- vLLM High-throughput serving Default для self-hosted. OpenAI-compatible API. Не підтримує multi-modal serving (LLM + vision) HuggingFace TGI Serving Глибока інтеграція з HF stack Throughput нижчий за vLLM NVIDIA Triton Enterprise multi-model Multi-model serving з governance Надмірна складність для single-model deployments Ollama / llama.cpp Local, single-user Прототипування, локальна розробка Непридатний для concurrent production traffic Поширені архітектурні антипатерни - transformers.pipeline() у production — послідовна обробка запитів, throughput у 50-100 разів нижчий за vLLM. Архітектурна помилка з прихованим характером. - model.generate() прямий виклик — призначений для дослідницьких задач, не для serving. - Ollama для multi-user сервісів — модель з single-user семантикою, не масштабується за межі 10 concurrent requests. - vLLM з default max-model-len 32K — призводить до надмірного споживання VRAM на KV cache незалежно від реальної довжини prompts. Параметр повинен відповідати характеристикам use case. Performance internals: концептуальний рівень KV cache Споживання VRAM перевищує розмір weights моделі. Capacity planning повинно враховувати cache, а не лише weights. Залежність між довжиною context та кількістю concurrent users є обернено пропорційною. Continuous batching vLLM та TGI забезпечують обробку batch=32 за час batch=1 завдяки memory-bound характеру операції. Підвищення throughput у ~40 разів порівняно зі static batching. Реалізовано через PagedAttention. Prefix caching Повторне використання KV cache для статичних system prompts. Активація у vLLM: --enable-prefix-caching. Інкрементальне покращення TTFT. Практичний розрахунок capacity // Llama 3.1 8B на H100 80GB — скільки concurrent users? Llama 3.1 8B weights (fp16): 16 GB KV cache на 1 request (4K ctx): ~512 MB Batch 32 users: 32 × 512 MB = 16 GB cache ───────────────────────────────────────── Total на H100 80GB: ~50 concurrent users // З AWQ quantization weights → 4 GB → ~200 users on same GPU Capacity planning principle: для product planning рекомендована метрика users-per-GPU замість tokens-per-second. Перша метрика враховує реальні обмеження KV cache та відповідає operational realities. 06 · Token Streaming та TTFT-driven UX Token streaming є фундаментальною вимогою UX для production AI-сервісів, а не optimization. У відсутності streaming сприйняття responsiveness системи деградує незалежно від objective latency. Розділ присвячено user perception та технічним вимогам реалізації. Ключові метрики латентності Метрика Визначення Acceptable threshold ------------------------------ ------------------------------------------------ --------------------------------------------- TTFT (Time To First Token) Інтервал від запиту до першого видимого токена < 500ms — оптимально, < 1s — допустимо TPOT (Time Per Output Token) Інтервал між послідовними токенами 30-50 tokens/sec — comfortable reading rate Порівняльна симуляція: streaming vs non-streaming БЕЗ streaming 0.0s Очікування відповіді... Натисніть \"Запустити\", щоб побачити різницю ЗІ streaming (SSE) 0.0s Натисніть \"Запустити\" Запустити порівняння Reset Implementation pattern: Server-Sent Events (SSE) # Backend (FastAPI) from fastapi.responses import StreamingResponse @app.post(\"/chat\") async def chat(request): return StreamingResponse( llm_stream(request), media_type=\"text/event-stream\" ) // Frontend (browser) const eventSource = new EventSource('/chat'); eventSource.onmessage = (e) => { ui.append(e.data); } eventSource.onerror = () => { eventSource.close(); } Додаткові переваги streaming архітектури Request cancellation Інтеграція AbortController на client side забезпечує переривання generation при відмові клієнта від результату. Економія GPU resources на abandoned requests. Неможливо реалізувати без streaming. Progressive rendering Інкрементальний рендеринг markdown, code blocks, lists у міру генерації. Забезпечує feedback користувачу про активний стан системи. Mobile network resilience Скорочення часу утримання TCP connection. Стійкість до network switching (WiFi → cellular) під час сесії. UX принцип: streaming є обов'язковою вимогою для всіх user-facing chat interfaces. Для batch processing (звіти, аналітика, document pipelines) streaming не застосовується. Прийняття рішення повинно відбуватися на стадії проектування системи. 07 · Structured Outputs та Function Calling Output production AI-сервісів переважно має структурований характер: JSON-документи для downstream систем або tool/function calls. Реалізація надійних структурованих outputs є окремою інженерною дисципліною, відсутність якої призводить до системних збоїв у production-середовищі. Класифікація проблем без structured outputs enforcement Проблема Технічний наслідок ------------------------------ -------------------------------------------------------------- Невалідний JSON output Parsing exception, retry overhead, додаткова latency та cost Втрата полів або зміна типів HTTP 500 на downstream API Markdown-обгортка ```json``` Необхідність regex preprocessing, fragile код Hallucinated field values Інконсистентність даних у persistence layer Рівні schema enforcement у порядку зростання надійності Рівень 1: Prompt engineering System prompt з instructions (\"respond as JSON\") та few-shot examples. Надійність 70-90% valid. Висока ймовірність збоїв на edge cases. Рівень 2: JSON mode response_format: {\"type\": \"json_object\"}. Гарантує 99%+ syntactic validity. Не гарантує відповідність schema на рівні полів та типів. Рівень 3: Structured outputs з schema Constrained decoding на основі Pydantic або JSON Schema. 100% schema compliance. Industry standard. Приклад: structured output з Pydantic from openai import OpenAI from pydantic import BaseModel from typing import Literal class CustomerIssue(BaseModel): customer_name: str | None urgency: Literal[\"low\", \"medium\", \"high\", \"critical\"] summary: str response = client.beta.chat.completions.parse( model=\"gpt-4o-mini\", messages=[...], response_format=CustomerIssue, # ← schema enforced ) issue = response.choices[0].message.parsed # ← typed object Function calling latency: архітектурний аналіз Agent з N tool calls характеризується мультиплікативним зростанням total latency. Цей фактор є критичним для UX agent-based систем. // Типовий agent loop LLM call 1 (decide tool) → 800ms Tool execution → 200ms LLM call 2 (process result) → 800ms Tool execution → 200ms LLM call 3 (final answer) → 1200ms ──────────────────────────────────────── Total: 3200ms # 4× longer than single call Стратегії оптимізації agent loops Оптимізація Effect ---------------------------------------- --------------------------------------------------- Parallel tool calls (OpenAI native) Зниження latency на 30-50% при наявності 2+ tools Streaming agent reasoning Покращення perceived latency Tool call caching для idempotent tools До 80% скорочення для повторюваних запитів Менша модель для tool selection 2-3× прискорення на routing steps Класифікація tooling-рішень OpenAI native Structured outputs, parallel tool calls, JSON schema enforcement. Найбільш зрілий developer experience. Anthropic Claude Tool use API, prompt caching, structured XML output. Instructor Python-бібліотека для застосування Pydantic schema до довільного LLM-провайдера. LangGraph Framework для agent loops зі state management. Орієнтований на складні agent workflows. Architectural principle: структуровані outputs зі schema enforcement є обов'язковими для будь-якого output, що передається у downstream систему. Free-form text допустимий виключно для presentation layer. Це вимога correctness, а не optimization. 08 · Стратегії кешування Кешування у LLM-системах забезпечує 30-70% скорочення inference costs за умови коректної імплементації. AI engineer повинен володіти знаннями про три рівні кешування та вміти оцінити очікувану economy для конкретного use case. Багаторівнева архітектура кешування L1 Exact Match Cache (Redis) Hash(prompt + system_message) → cached response. Найнижчий рівень latency та operational cost. Hit rate: 5-15% Setup: 1 година Cost: $0 L2 Prefix Cache (vLLM, OpenAI native) Повторне використання KV cache для system prompt prefix. При ідентичному system prompt prefill пропускає system tokens. Hit rate: 70-90% Setup: 1 прапор TTFT win: 10-21× L3 Semantic Cache (embeddings + similarity) Query → embedding → similarity search → cached response для семантично подібного запиту. Покриває не лише ідентичні, а й семантично еквівалентні запити. Hit rate: 20-60% Setup: 1 день Cost: ~$0.02 / 1M 0% кумулятивне скорочення inference cost L1: Exact Match — приклад реалізації import hashlib, redis, json cache = redis.Redis(host=\"localhost\", port=6379) def cached_completion(messages, model): key = hashlib.sha256( json.dumps(messages, sort_keys=True).encode() ).hexdigest() if hit := cache.get(key): return json.loads(hit) resp = client.chat.completions.create(model=model, messages=messages) cache.setex(key, 3600, json.dumps(resp)) # TTL 1 hour return resp L2: Prefix Cache — конфігурація # vLLM — активація через CLI-параметр docker run vllm/vllm-openai \\ --model TheBloke/Llama-3.1-8B-AWQ \\ --quantization awq \\ --enable-prefix-caching # OpenAI — автоматична активація у GPT-4o, discount 50% на cached tokens # Anthropic — явна конфігурація через cache_control блоки у messages Cumulative effect production caching stack Layer Hit rate Operational cost Scope економії ------------------------------ ---------- -------------------- --------------------------------------------- L1: Exact match Redis 10-20% $0 Direct API calls на дублікатах запитів L2: Prefix cache (vLLM) 70-90% $0 Prefill tokens для статичних system prompts L3: Semantic cache (LiteLLM) 20-40% ~$0.02 / 1M tokens Семантично еквівалентні запити Cumulative 40-60% ~$0 Загальне inference cost reduction Принцип оптимізації: впровадження caching strategy передує оптимізації моделі. Це інженерне рішення з найвищим ROI у домені inference cost reduction. Імплементація трирівневого кешу забезпечує 30-50% cost reduction за порівняно низькі інвестиції розробки. 09 · Cost Discipline та Abuse Protection AI engineer несе відповідальність за economic integrity сервісу. Один компрометований обліковий запис здатний вичерпати monthly budget за добу. Cost tracking та budget enforcement є обов'язковими інженерними практиками, що впроваджуються на початковій стадії проектування. Інтерактивний калькулятор: моделювання витрат Запитів / користувач / день 50 Tokens / запит (avg) 3000 Активних користувачів 5000 $ / 1M tokens (gpt-4o-mini) $0.6 Cache hit rate (%) 0% Місячний bill $0 0 tokens/день Структура вартості одного запиту: декомпозиція // Total request cost = input_tokens × in_price + output_tokens × out_price // + embedding_calls × embedding_price (часто не враховуються) // + tool_call_chain × per_call_overhead (мультиплікативно у agent loops) Приклад: gpt-4o-mini agent loop Input: 5000 tokens × $0.15/1M = $0.00075 Output: 1500 tokens × $0.60/1M = $0.00090 Embeddings: 10 calls × $0.00002 = $0.0002 Tool calls: 5 × overhead 1K tokens = $0.0008 ───────────────────────────────────────────────── Total: ~$0.005 per agent run 100K agent runs / day = $500/day = $15K/month Patterns abuse protection Pattern Імплементація ---------------------- ------------------------------------------------------------ Per-user rate limit Redis sliding window: N requests/hour, N tokens/day Per-user budget cap $X/month hard limit, request rejection при перевищенні Anomaly detection Статистичний аналіз cost-per-user (z-score deviation) Prompt length limits Обмеження max input tokens для anonymous tier Tiered quotas Free tier з token allocation, upgrade path для перевищення LiteLLM: реалізація per-user budget import litellm litellm.success_callback = [\"langfuse\"] # auto-track usage user_budgets = { \"user_123\": {\"max_budget\": 100.0, \"current_spend\": 0} } response = litellm.completion( model=\"gpt-4o-mini\", messages=[...], user=\"user_123\", # tracked per-user metadata={\"feature\": \"summarizer\"} # tracked per-feature ) # LiteLLM auto-blocks when budget exceeded Принцип безпеки: AI-сервіс не повинен deployitis у production без імплементованого per-user cost cap. Відсутність budget enforcement створює неприйнятний фінансовий ризик: 100K-token промпт від одного джерела може вичерпати daily budget. 10 · Production Checklist та Latency Budget SLA для AI-систем не може бути визначений єдиним threshold (як \"< 500ms\" для REST API). Необхідною є побудова latency budget — декомпозиції часу за компонентами системи. Розділ містить production deployment checklist для верифікації готовності системи. Latency budget для RAG chatbot: декомпозиція Network round-trip 50ms Auth + rate limit + tracing 30ms RAG: embed + vector search 80ms Context assembly 40ms LLM TTFT (prefill) 300ms LLM generation (streamed) ~10s streamed Post-processing 20ms User-facing TTFT: 500ms · Full response duration: ~11s · Perceived latency через streaming: 500ms Production SLA targets для AI-системи Метрика P50 P95 P99 ------------------------------------- ------------ ------------ ------------ TTFT < 500ms < 1s < 2s TPOT < 30ms < 60ms < 100ms Error rate < 0.1% < 0.5% < 1% End-to-end perceived (зі streaming) responsive responsive responsive Case studies: типові production failures 1. silent update 2. no cost cap 3. huge prompt 4. no streaming 5. semantic leak Production deployment checklist Architecture decisions - Self-hosted vs API обґрунтовано через breakeven analysis - Multi-provider routing з fallbacks (LiteLLM/Portkey) - Caching strategy на 2-3 рівнях - Inference engine обраний під use case API design - OpenAI-compatible endpoint для tooling compatibility - Token streaming через SSE - Structured outputs з schema для downstream JSON - Cancellation handling (AbortController) - Rate limiting per user (не лише global) Cost discipline - Per-user budget cap (hard stop) - Cost tracking per user, feature, provider - Daily cost forecast і anomaly alerts - Semantic cache hit rate dashboard Monitoring (з уроку 15) - TTFT, TPOT, cache hit rate у Prometheus - Alerts на P99 TTFT > 2s, cost spike > 3× baseline - Per-request cost tracking - Eval-based quality monitoring Reference architecture stack Шар Tool Альтернатива ------------------------- ---------------------------------------------- --------------------- Gateway, routing LiteLLM Portkey, OpenRouter Inference (self-hosted) vLLM з AWQ моделями TGI, Triton Caching vLLM prefix + Redis exact + LiteLLM semantic — Frontend streaming OpenAI-compatible + SSE WebSockets Structured outputs Instructor (Pydantic) або native OpenAI LangGraph Orchestration K8s + KEDA (lesson 14) ECS Monitoring Prometheus + Grafana (lesson 15) Datadog Tracing OpenTelemetry → Langfuse Honeycomb П'ять архітектурних принципів production LLM inference: 1. Прямий виклик LLM API з production-коду є антипатерном. Gateway layer є обов'язковим. 2. Deployment без streaming недопустимий для user-facing interfaces. TTFT є критичною метрикою. 3. Caching strategy є обов'язковою компонентою архітектури. Очікуване cost reduction — 30-70%. 4. Per-user cost cap є обов'язковою вимогою безпеки. Відсутність створює неприйнятний фінансовий ризик. 5. Output для downstream систем повинен мати enforced schema. Free-form JSON є джерелом regressions. Підсумок розділу Урок формує architecture mindset у домені inference systems: економічний аналіз, decision frameworks, awareness технологічного landscape. Практичні Colab-вправи (vLLM benchmark, caching ROI, structured outputs comparison, multi-provider routing, latency budget audit) є опційним поглибленням. Ключова теза: компетенції AI engineer полягають у прийнятті архітектурних рішень щодо inference systems, не у низькорівневій оптимізації компонентів. Глибокий tuning належить до окремої професійної області з відмінною глибиною спеціалізації. Production LLM Inference Systems · Заняття 18 · AI Engineering Course Освітні результати: decision frameworks (API vs self-hosted, multi-provider routing, caching architecture), розуміння cost structure AI-сервісів, production deployment checklist."}];
PAGES.forEach(p => { p._lc = p.text.toLowerCase(); p._tlc = p.title.toLowerCase(); });

const input = document.getElementById('q');
const list  = document.getElementById('list');
const count = document.getElementById('count');
const empty = document.getElementById('empty');
const clear = document.getElementById('clear');

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const reEsc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

function highlight(escaped, terms){
  for(const t of terms){
    if(!t) continue;
    escaped = escaped.replace(new RegExp('('+reEsc(esc(t))+')','gi'), '<mark>$1</mark>');
  }
  return escaped;
}
function makeSnippet(text, i, len){
  const s = Math.max(0, i-55), e = Math.min(text.length, i+len+95);
  return (s>0?'… ':'') + text.slice(s,e).trim() + (e<text.length?' …':'');
}

function render(){
  const q = input.value.trim();
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  clear.style.display = q ? 'block' : 'none';
  list.innerHTML = '';
  let shown = 0;

  for(const p of PAGES){
    if(terms.length && !terms.every(t => p._tlc.includes(t) || p._lc.includes(t))) continue;
    shown++;

    let snip = '';
    if(terms.length){
      for(const t of terms){
        if(p._tlc.includes(t)) continue;          // prefer a body match for the snippet
        const i = p._lc.indexOf(t);
        if(i >= 0){ snip = highlight(esc(makeSnippet(p.text, i, t.length)), terms); break; }
      }
    }

    const a = document.createElement('a');
    a.className = 'nav-link';
    a.href = p.file;
    const extra = !/^\d+$/.test(p.badge);
    a.innerHTML =
      '<span class="badge'+(extra?' extra':'')+'">'+esc(p.badge)+'</span>'+
      '<span class="meta"><span class="title">'+highlight(esc(p.title), terms)+'</span>'+
      (snip ? '<span class="snippet">'+snip+'</span>' : '')+
      '</span><span class="arrow">&rsaquo;</span>';
    list.appendChild(a);
  }

  count.textContent = q ? ('Знайдено: '+shown+' з '+PAGES.length) : (PAGES.length+' матеріалів');
  empty.hidden = shown > 0;
}

input.addEventListener('input', render);
clear.addEventListener('click', () => { input.value=''; render(); input.focus(); });
render();
</script>
