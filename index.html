st Token p95 < 2s, p99 < 5s Error rate < 1% (всі 5xx, включно з content filter — окремо) End-to-end latency p95 < 15s для chat, < 60s для агентів Cache hit rate > 30% (як cost guardrail) Архітектурні рішення для високого uptime Multi-provider failover 2+ незалежних LLM провайдери (Anthropic + OpenAI + self-hosted). Auto-switching при degradation. Circuit breakers Не перевантажуй провайдера, який і так падає. Швидкий switch на здорового. Multi-region Active-active в 2+ regions. Якщо AWS us-east-1 впав — eu-west-1 продовжує. Graceful degradation Все провайдери down → cached responses, lower-quality model, або static fallback. Error budgets 99.9% SLO = 43.2 хвилин downtime/місяць. Спалив — фрізимо релізи, фокус на стабільність. Status page + transparency Чесні incident reports. Користувачі прощають падіння, не прощають мовчання. Що НЕ обіцяти в SLA - Якість відповідей — модель недетермінована, \"правильність\" суб'єктивна - Точне latency — залежить від upstream, який ти не контролюєш - 100% no-hallucinations — фізично неможливо гарантувати - Сумісність моделей — провайдер може deprecated модель з 30 днями попередження Заняття 10 · API Layer for AI Systems · Курс AI Engineering"}, {"file": "agents.html", "title": "Agents", "badge": "11", "text": "AI Agents & Tool Orchestration Заняття 11 · як LLM перестає бути \"відповідалкою\" і стає актором, що думає, діє, спостерігає Інтерактивна лекція з ReAct-симуляцією, tool calling, агентними патернами і метриками. Натискай кнопки — все живе. Що таке агент Архітектура ReAct цикл Tool calling Агентні патерни LangGraph Інші фреймворки Deep Agents Memory & State Метрики Pitfalls 01. Що таке AI агент LLM сам по собі — це чорна скринька, що генерує токени. Агент — це система навколо LLM: думає, викликає інструменти, дивиться результат, повторює — поки не закінчить задачу. LLM (звичайний chat) Один запит → одна відповідь. Stateless. Не може діяти у зовнішньому світі. Знання обмежене training cutoff. Agent (LLM + loop + tools) Багатокрокова взаємодія. Має tools (web search, code exec, DB queries). Сам вирішує коли і що викликати. Має пам'ять і стан. Anatomy агента 🧠 Brain (LLM) Основна reasoning модель — Claude/GPT-4o. Вирішує що робити далі. 🔧 Tools Функції, які агент може викликати: search, calculator, API, code run. 💾 Memory Conversation history, scratchpad для думок, long-term knowledge. 🎯 Goal System prompt + user task. Critically — критерій \"готово\". Коли потрібен агент, а коли — звичайний LLM Просто LLM Потрібен агент ----------------------- --------------------------------------------------------- Класифікація тексту Customer support з доступом до DB Summarization Coding assistant (читає, пише, тестує файли) Translation Research assistant (web search + synthesis) Single-shot Q&A Multi-step booking (check → reserve → confirm → notify) Structured extraction SQL agent (генерує → виконує → виправляє) 02. Базова архітектура агента Від AutoGPT до Claude Code — усі агенти крутять той самий цикл \"думка → дія → спостереження\", поки модель не вирішить що задача закрита. Live Базова архітектура агента # Псевдокод того, що відбувається всередині будь-якого агента def agent_loop(user_task: str, tools: list, max_iters: int = 10): messages = [ {\"role\": \"system\", \"content\": SYSTEM_PROMPT}, {\"role\": \"user\", \"content\": user_task}, ] for step in range(max_iters): response = llm.chat(messages, tools=tools) if response.tool_calls: # Агент хоче викликати інструмент for call in response.tool_calls: result = execute_tool(call.name, call.arguments) messages.append({\"role\": \"tool\", \"content\": result}) elif response.content: # Фінальна відповідь — агент вирішив що мета досягнута return response.content raise MaxItersExceeded() Що додається до базового циклу в продакшні medStep limit Максимум 10-30 ітерацій. Без цього агент може зациклитись і спалити $100 за хвилину. medToken budget Контекст росте з кожним кроком. Треба обрізати/стискати історію щоб не вилетіти за ліміт. critTool authorization RBAC на кожен tool call. LLM не має повного доступу до production DB. medTracing Кожна ітерація — окремий span. Без цього debugging агента — це пекло. lowStreaming Користувач бачить \"thinking...\" → \"calling tool X...\" → \"got result, analyzing...\" в real-time. critCost guardrails Per-task budget cap. Якщо досяг — або abort, або escalate до людини. 03. ReAct — Reasoning + Acting ReAct — найпопулярніший агентний паттерн (Yao et al, 2022). Замість того щоб LLM одразу видавав відповідь, він явно думає вголос, обирає дію, спостерігає результат і повторює. Дозволяє моделі виправляти помилки в процесі. Live Demo ReAct цикл — \"Яка погода в Києві в цельсіях?\" 💭 Thought reasoning → ⚡ Action tool call → 👁 Observation tool result ↺ ▶ Натисни Run щоб запустити симуляцію ReAct циклу ▶ Run ReAct cycle ↺ Reset Чому ReAct працює краще ніж \"пряма відповідь\" Без ReAct (прямий запит) \"Яка погода в Києві?\" → модель галюцинує \"23°C сонячно\" з training data 2023 року. Може бути неправильно. З ReAct Модель явно каже \"мені треба викликати weather API\" → викликає → отримує реальні дані → дає актуальну відповідь. Grounded в фактах. ReAct повний цикл — мінімальна реалізація з нуля Без LangChain і фреймворків — ~60 рядків Python. Показує що \"агент\" це не магія, а prompt + parser + loop. Один файл, можна запустити локально. # pip install openai import json, re from openai import OpenAI client = OpenAI() # OPENAI_API_KEY у env # 1. Tools — звичайні Python функції def get_weather(city: str) -> str: # у проді — реальний API виклик return json.dumps({\"city\": city, \"temp_c\": 18, \"sky\": \"partly cloudy\"}) def celsius_to_fahrenheit(c: float) -> str: return str(round(c * 9/5 + 32, 1)) TOOLS = {\"get_weather\": get_weather, \"celsius_to_fahrenheit\": celsius_to_fahrenheit} TOOLS_DESCRIPTION = \"\"\" - get_weather(city: str) -> JSON {temp_c, sky} - celsius_to_fahrenheit(c: float) -> str \"\"\" # 2. ReAct prompt template SYSTEM = f\"\"\"Answer the question by reasoning step by step. You have access to: {TOOLS_DESCRIPTION} Use EXACTLY this format on each step: Thought: <your reasoning> Action: <tool_name> Action Input: <JSON args> After you see Observation, continue with another Thought/Action, or finish with: Thought: I now know the final answer Final Answer: <your answer> \"\"\" # 3. Parser для відповіді LLM ACTION_RE = re.compile(r\"Action:\\s*(\\w+)\\s*Action Input:\\s*(\\{.*?\\})\", re.DOTALL) FINAL_RE = re.compile(r\"Final Answer:\\s*(.+)\", re.DOTALL) def parse(text: str): if m := FINAL_RE.search(text): return (\"final\", m.group(1).strip()) if m := ACTION_RE.search(text): return (\"action\", m.group(1), json.loads(m.group(2))) raise ValueError(f\"Cannot parse: {text}\") # 4. ReAct loop def run_agent(question: str, max_steps: int = 6) -> str: history = f\"Question: {question}\\n\" for step in range(max_steps): resp = client.chat.completions.create( model=\"gpt-4o-mini\", messages=[ {\"role\": \"system\", \"content\": SYSTEM}, {\"role\": \"user\", \"content\": history}, ], stop=[\"Observation:\"], # важливо — модель не вигадує спостереження temperature=0, ) text = resp.choices[0].message.content print(f\"\\n— step {step} —\\n{text}\") history += text + \"\\n\" kind, *rest = parse(text) if kind == \"final\": return rest[0] tool_name, args = rest observation = TOOLS[tool_name](**args) print(f\"Observation: {observation}\") history += f\"Observation: {observation}\\n\" raise RuntimeError(\"max_steps exceeded — агент зациклився\") # 5. Запуск if __name__ == \"__main__\": answer = run_agent(\"What is the weather in Kyiv in Fahrenheit?\") print(f\"\\nFinal: {answer}\") Що показує цей приклад: (1) ReAct — це по суті regex-парсинг тексту LLM, (2) stop=[\"Observation:\"] критично — без нього модель сама вигадує спостереження і виходять галюцинації, (3) кожен tool call — детермінований Python виклик, не \"магія агента\". Limitations: цей формат застарів — продакшн-агенти використовують native tool calling API (Claude/GPT-4o), де структура — JSON з боку моделі, не regex. Перейдемо до цього у наступній секції. 04. Tool Calling — як агент взаємодіє зі світом Tools — це Python функції з описом для LLM. Agent отримує список доступних tools, сам обирає коли і що викликати, з якими аргументами. Модерні моделі (Claude 4, GPT-4o) мають native tool use API. Animated Як агент викликає tools 🤖 Agent (Claude) \"Знайди погоду і конвертуй у F\" ⟷ 🔧 Tools 3 функції доступні web_search query: \"Kyiv weather today\" — get_weather city: \"Kyiv\" — celsius_to_fahrenheit celsius: 18 — ▶ Simulate tool calls ↺ Reset Tool definition в Anthropic API tools = [ { \"name\": \"get_weather\", \"description\": \"Get current weather for a city. Returns temp in Celsius.\", \"input_schema\": { \"type\": \"object\", \"properties\": { \"city\": {\"type\": \"string\", \"description\": \"City name\"} }, \"required\": [\"city\"] } } ] response = client.messages.create( model=\"claude-opus-4-7\", tools=tools, messages=[{\"role\": \"user\", \"content\": \"What's the weather in Kyiv?\"}] ) # Модель повертає tool_use блоки з аргументами: # response.content[0] = {type: \"tool_use\", name: \"get_weather\", input: {\"city\": \"Kyiv\"}} Best practices для tool design ✅ Описуй що робить, не як \"Get current weather for a city\" — не \"Calls OpenWeatherMap API endpoint\". ✅ Вузькі, атомарні tools get_user(id), update_email(id, email) — а не один do_user_stuff(action, ...). ✅ Parameter validation JSON Schema з типами і `required`. LLM сам не валідує — твій код мусить. ✅ Idempotency Якщо tool викликається двічі з тими ж аргументами — результат той самий. Без сюрпризів. ❌ НЕ давай \"god tools\" execute_sql(query) — катастрофа. Натомість get_orders_by_user(id). ❌ НЕ покладайся на самовалідацію LLM може передати email=\"aaa\". Перевіряй у коді tool, не в prompt. 05. Агентні патерни (Anthropic's Building Effective Agents) Anthropic у грудні 2024 випустила \"Building Effective Agents\" — там 5 патернів, з яких реальні системи зазвичай збирають 2-3. Не все варто будувати як агент — часто простий workflow працює краще. Interactive 5 базових патернів — клікни щоб переглянути 1. Prompt Chaining 2. Routing 3. Parallelization 4. Orchestrator-Workers 5. Evaluator-Optimizer Workflow vs Agent — критична відмінність Workflow (хардкоджений flow) Послідовність LLM викликів задана в коді розробником. Передбачуваний, дешевий, легше дебажити. Patterns 1-3 — це workflows. Agent (LLM сам обирає кроки) LLM динамічно вирішує що робити далі. Гнучкий, але дорогий і непередбачуваний. Patterns 4-5 — це справжні agents. 06. LangGraph — побудова агентних workflows як графів LangGraph (від LangChain команди) — це фреймворк, який дозволяє описати агента як state machine: вузли = функції/LLM calls, ребра = переходи між станами. Працює добре з ReAct, routing, multi-agent системами. Animated Customer Support Agent — LangGraph workflow [] LLM node Tool/Action node Decision/Router Final state ▶ Запит на refund ▶ Технічна проблема ▶ Складний кейс → ескалація ↺ Reset Чому LangGraph, а не просто Python код State management Один shared state об'єкт ходить між нодами. Не треба пробрасувати dict через 10 функцій. Conditional routing \"Якщо score < 0.7 → escalate\" — декларативно, не if/else в коді. Streaming + checkpointing Кожен node може стрімити progress. State зберігається — можна resume з midpoint. Human-in-the-loop Pause перед критичним кроком, чекати на людську approval, продовжити. Visualization Graph рендериться як діаграма — видно архітектуру, не треба читати код. Native LangSmith trace Кожен node автоматично логується — debugging стає реальним. Простий LangGraph приклад from langgraph.graph import StateGraph, END from typing import TypedDict class AgentState(TypedDict): query: str classification: str answer: str def classify(state): return {\"classification\": llm.classify(state[\"query\"])} def handle_billing(state): return {\"answer\": billing_agent(state[\"query\"])} def handle_technical(state): return {\"answer\": tech_agent(state[\"query\"])} def router(state): return state[\"classification\"] # \"billing\" or \"technical\" graph = StateGraph(AgentState) graph.add_node(\"classify\", classify) graph.add_node(\"billing\", handle_billing) graph.add_node(\"technical\", handle_technical) graph.set_entry_point(\"classify\") graph.add_conditional_edges(\"classify\", router, { \"billing\": \"billing\", \"technical\": \"technical\", }) graph.add_edge(\"billing\", END) graph.add_edge(\"technical\", END) app = graph.compile() result = app.invoke({\"query\": \"My card was charged twice\"}) 07. Інші фреймворки — OpenAI Agents SDK, CrewAI, AutoGen, n8n LangGraph — не єдиний варіант. У 2024-2025 фреймворків стало багато — від тонких SDK до no-code візуальних редакторів і multi-agent тулзи для research. Вибір залежить від хто буде підтримувати агента, наскільки складна логіка, і чи треба self-host. Порівняння — коли який фреймворк брати Фреймворк Філософія Цільова аудиторія Сильні сторони Коли НЕ брати ------------------- ------------------------------------------------- --------------------------------------- -------------------------------------------------------------------- ----------------------------------------------------------------- LangGraph Граф з explicit state/edges Python інженери Контроль, debuggability, native LangSmith, human-in-the-loop Простий single-agent — overkill OpenAI Agents SDK Lightweight Python SDK з handoffs між агентами Python інженери, OpenAI ecosystem Мінімум boilerplate, agent-to-agent handoffs, guardrails з коробки Не-OpenAI стек, складна state machine CrewAI Role-based \"crews\" — агенти з ролями і задачами Швидкі прототипи, продуктові команди High-level абстракція (Agent + Task + Crew), швидкий старт Custom routing logic, low-level control AutoGen Conversational multi-agent (Microsoft Research) Research, складні дослідницькі задачі Agent-to-agent dialogues, code execution з коробки, GroupChat Production з SLA — async event-driven core складніший за CrewAI n8n Visual workflow editor (no-code) з AI nodes Не-інженери, ops/business, automation Drag-and-drop, 400+ інтеграцій, self-host, можна не писати код Складна агентна логіка, custom evaluators OpenAI Agents SDK — мінімалістичний приклад Вийшов у березні 2025 як спадкоємець експериментального Swarm. Філософія: агент = LLM + tools + instructions, multi-agent — через handoffs (агент передає управління іншому як tool call). from agents import Agent, Runner, function_tool # Tools — звичайні Python функції з декоратором @function_tool def query_transactions(category: str, days: int) -> str: return db.query(category, days) # Спеціалізовані агенти analyst = Agent( name=\"Analyst\", instructions=\"Аналізуй транзакції користувача. Числа — з даних, не вигадуй.\", tools=[query_transactions], model=\"gpt-4o\", ) educator = Agent( name=\"Educator\", instructions=\"Пояснюй фінансові терміни простими словами.\", model=\"gpt-4o-mini\", ) # Coordinator з handoffs — передає управління спец-агенту coordinator = Agent( name=\"Coordinator\", instructions=\"Якщо запит про статистику — handoff до Analyst. Якщо про термін — до Educator.\", handoffs=[analyst, educator], ) result = Runner.run_sync(coordinator, \"скільки витратив на каву минулого тижня?\") print(result.final_output) CrewAI — role-based crew Найпопулярніший high-level фреймворк для multi-agent у 2024-2025. Парадигма: ти описуєш агентів з ролями (як співробітників), кожен має goal і backstory, а потім складаєш з них Crew з задачами. from crewai import Agent, Task, Crew, Process analyst = Agent( role=\"Financial Analyst\", goal=\"Знайти топ статті витрат і impulse spending\", backstory=\"Ти 10 років працюєш з персональними фінансами\", tools=[query_transactions_tool, categorize_tool], llm=\"gpt-4o\", ) advisor = Agent( role=\"Money Coach\", goal=\"Дати 3 actionable поради на основі аналізу\", backstory=\"Ти емпатичний, без менторства, поради конкретні з числами\", llm=\"claude-sonnet-4\", ) analyze_task = Task( description=\"Проаналізуй транзакції за {period} і знайди де можна зекономити\", agent=analyst, expected_output=\"Список топ-5 категорій з amounts і паттернами\", ) advise_task = Task( description=\"На основі аналізу дай 3 поради як зекономити ${target}\", agent=advisor, expected_output=\"3 actionable поради з числами\", context=[analyze_task], # отримує output попередньої таски ) crew = Crew( agents=[analyst, advisor], tasks=[analyze_task, advise_task], process=Process.sequential, # або Process.hierarchical з manager_llm ) result = crew.kickoff(inputs={\"period\": \"last 3 months\", \"target\": 200}) AutoGen — multi-agent conversations Від Microsoft Research, оригінально (v0.2) — як conversational multi-agent через двох-сторонні чати, у v0.4 (2025) переписаний на async event-driven core. Сильна сторона — code execution agent з коробки і GroupChat, де декілька агентів спілкуються між собою з manager-агентом, що обирає наступного speaker-а. from autogen_agentchat.agents import AssistantAgent from autogen_agentchat.teams import RoundRobinGroupChat from autogen_agentchat.conditions import TextMentionTermination from autogen_ext.models.openai import OpenAIChatCompletionClient model = OpenAIChatCompletionClient(model=\"gpt-4o\") analyst = AssistantAgent( \"analyst\", model_client=model, tools=[query_transactions], system_message=\"Аналізуй транзакції. Числа — з даних, не вигадуй.\", ) advisor = AssistantAgent( \"advisor\", model_client=model, system_message=\"Дай 3 actionable поради на основі аналізу. Закінчи фразою TERMINATE.\", ) # Агенти по черзі спілкуються поки advisor не скаже TERMINATE team = RoundRobinGroupChat( [analyst, advisor], termination_condition=TextMentionTermination(\"TERMINATE\"), ) await team.run(task=\"де можу зекономити $200 цього місяця?\") Коли AutoGen виграє у CrewAI: треба conversation loop між агентами (не просто послідовні tasks), code execution sandbox, або research-стиль експерименти з різними patterns. Коли програє: production система з SLA — async core складніший в дебагу, observability слабша, і \"чат\" як абстракція додає overhead якщо тобі насправді треба simple pipeline. n8n — agentic workflow без коду n8n — open-source visual workflow editor (як Zapier/Make), але self-host і з більшим контролем над workflow. У 2024 додали AI Agent node на базі LangChain. Композиція drag-and-drop: HTTP trigger → Memory node → Agent node з tools → Output. Чому n8n у lecture про агентів Багато бізнес-задач не потребують Python — admin/ops роблять автоматизацію самі через UI. n8n — найпопулярніший варіант коли агент має жити поряд з 400+ інтеграціями (Slack, Notion, GSheets, Jira). Структура AI Agent node Memory (Redis/Postgres/Window Buffer) + Chat Model (OpenAI/Anthropic/local) + Tools (HTTP, code, sub-workflows, vector store). Все вибирається з dropdown. Self-host first Безкоштовно self-hosted, є cloud за фіксовану ціну. На відміну від Zapier — workflow можна version control (export як JSON), писати custom code nodes, deploy у власну infra. Обмеження для складних агентів Custom routing з conditional edges — через Switch nodes (не граф). Multi-agent crew — складніше ніж у CrewAI. Eval і observability — слабші ніж у LangSmith. Sweet spot \"Підключи AI до 5 систем і автоматизуй task X\" — n8n. \"Multi-agent reasoning з 4 ролями і memory compression\" — Python фреймворк. Коли вибрати n8n у компанії Команда не має сильного Python-розробника, але треба швидко інтегрувати LLM у внутрішні процеси. Або product-owner хоче сам редагувати агента без релізу. Як обирати в реальному проєкті Ситуація Що брати Чому ------------------------------------------------------- --------------------------- ------------------------------------------------- Single-agent з 2-3 tools, OpenAI стек OpenAI Agents SDK Менше boilerplate, native handoffs Multi-agent crew (3-5 ролей), швидкий MVP CrewAI High-level абстракція, role-first дизайн Research, conversational multi-agent з code execution AutoGen GroupChat, code executor agent, гнучкі patterns Складна state machine, human-in-the-loop, production LangGraph Граф, checkpointing, native LangSmith Інтеграція з 5+ SaaS, ops/business team n8n Visual editor, 400+ інтеграцій, self-host Дослідження, кастомний дизайн Plain SDK + tool_use loop Нуль залежностей, повний контроль Anti-pattern: брати multi-agent фреймворк (CrewAI/AutoGen) для задачі що розв'язується одним агентом з 3 tools. \"Multi-agent overhead\" — context-passing між агентами часто з'їдає 30-50% токенів. Спочатку single-agent baseline, потім — якщо реально треба — multi-agent. 08. Deep Agents — agent harness для складних multi-step задач Deep Agents від LangChain — це готовий \"набір агента з коробки\". Той самий tool-calling loop, але вже вшиті планування, файли для контексту, subagents і пам'ять. Ідея проста: складні задачі (research, coding) ламаються не через слабку модель, а через те що агент губиться у своїх же думках і tool-результатах. Бібліотека deepagents — окремий пакет, всередині LangChain і LangGraph. Що таке \"agent harness\" і чим відрізняється від фреймворку Framework (LangChain, CrewAI) Дає будівельні блоки: tools, prompts, chains. Ти сам збираєш агента — пишеш loop, обираєш tools, продумуєш context management. Гнучко, але багато boilerplate. Agent harness (Deep Agents, Claude Agent SDK) Готова опінійована конструкція з вбудованими tools (todos, файли, subagents) і system prompts, що навчають модель правильно ними користуватися. Запускаєш — і агент уже вміє планувати і керувати контекстом. Core capabilities — що Deep Agents додає поверх звичайного агента 📋 Planning (write_todos) Вбудований tool для декомпозиції складних задач у список TODO. Агент сам розбиває \"побудуй CRM dashboard\" на 8 кроків і трекає прогрес. 📁 Virtual filesystem Tools ls, read_file, write_file, edit_file дозволяють офлоадити великий контекст з messages у файли. Tool result не з'їдає вікно. 👥 Subagents (task tool) Спавн ізольованих subagents для специфічних підзадач. Контекст головного агента залишається чистим — subagent повертає лише результат. 💾 Long-term memory Persistent memory між threads через LangGraph Memory Store. Агент пам'ятає попередні розмови з користувачем. 🔌 Pluggable backends Filesystem swap-able: in-memory, local disk, LangGraph store, sandboxes (Modal/Daytona/Deno) для безпечного code execution. Або власний backend. 🔒 Permissions + HITL Декларативні permission rules — які файли можна читати/писати. Human-in-the-loop approval для sensitive операцій через LangGraph interrupts. 🖥️ Shell execution З sandbox backend агент отримує execute tool — запуск тестів, build, git, system tasks в ізольованому середовищі. 🧩 Skills Reusable workflows і domain knowledge — як розширення агента специфічними процедурами без зміни core коду. ✂️ Auto-summarization Старі повідомлення стискаються коли вікно росте. Агент залишається ефективним у довгих сесіях без overflow. Quickstart — створити Deep Agent за 5 рядків # pip install -qU deepagents langchain-anthropic from deepagents import create_deep_agent def get_weather(city: str) -> str: \"\"\"Get weather for a given city.\"\"\" return f\"It's always sunny in {city}!\" agent = create_deep_agent( model=\"anthropic:claude-sonnet-4-6\", tools=[get_weather], system_prompt=\"You are a helpful assistant\", ) # Агент вже вміє планувати, користуватись filesystem, спавнити subagents agent.invoke( {\"messages\": [{\"role\": \"user\", \"content\": \"what is the weather in sf\"}]} ) Підтримуються провайдери: Anthropic, OpenAI, Google Gemini, OpenRouter, Fireworks, Baseten, Ollama — модель задається рядком \"provider:model_id\". Коли брати Deep Agents Сценарій Чому Deep Agents ------------------------------------------------------ ------------------------------------------------------------------------------------- Multi-step research з web search → analysis → report Планування + filesystem для проміжних артефактів + subagents для глибоких рисьорчів Coding agent що читає, пише, тестує файли Sandbox backend з execute tool + filesystem permissions Long-running agent з пам'яттю про користувача LangGraph Memory Store з коробки, persistent across threads Агент з 10+ tools і змінною кількістю кроків Auto-summarization не дає контексту overflow-нути Production з HITL approval Built-in interrupts для sensitive tool calls Коли НЕ брати Deep Agents Single-shot агент з 2-3 tools Overhead opinionated harness не виправдовує себе — простіше create_agent з LangChain або custom loop. Простий routing/classification Не треба планування і filesystem — звичайний LangGraph workflow буде легший. Multi-agent crew з ролями Якщо парадигма \"team з ролями і task-ами\" — CrewAI ближча по абстракції, ніж harness з subagents. Deep Agents vs Claude Agent SDK Обидва — agent harnesses з тією ж філософією (планування + файли + subagents + skills). Різниця: Claude Agent SDK — від Anthropic, оптимізований під Claude, частина екосистеми Claude Code; Deep Agents — provider-agnostic, побудований на LangChain/LangGraph, краще інтегрується якщо вже маєш LangSmith tracing і хочеш swapability моделей. Архітектурно дуже схожі — обирай за тим, який стек уже в команді. Документація і ресурси Documentation Index Повний індекс документації LangChain: https://docs.langchain.com/llms.txt — використовуй для навігації по доступних сторінках. PyPI пакет pip install deepagents — standalone бібліотека, не вимагає повного LangChain stack. Repo github.com/langchain-ai/deepagents — SDK + CLI (terminal coding agent) + ACP integration для Zed/інших редакторів. TL;DR: Deep Agents — це \"batteries-included\" опінійований harness для випадків, де агент має планувати, керувати великим контекстом і делегувати підзадачі. Якщо твій агент робить research, coding або deep analysis з 5+ кроками — починай звідси, а не зі збирання loop вручну. 09. Memory & State Management Агент без пам'яті — це Memento. Йому треба зберігати: conversation history, scratchpad (intermediate thoughts), tool results, і часто long-term knowledge (попередні розмови з цим юзером). Типи пам'яті в агентах Тип Що зберігає Де TTL --------------------- --------------------------------------------- ------------------------ -------------- Working memory Current step thoughts, intermediate results messages array 1 task Conversation memory Усі повідомлення в чаті Redis / DB per session 1 session Episodic memory Попередні розмови, tool calls history Vector DB weeks-months Semantic memory Факти про користувача, preferences Structured DB persistent Procedural memory Як вирішувати задачі (cached patterns) Prompt cache / DB persistent Стратегії стиснення історії Sliding window Тримаємо останні N повідомлень. Старі скидаємо. Простий, але втрачає контекст. Summarization Стара історія → 1-параграф summary. Зберігає зміст, втрачає деталі. Hierarchical Recent — full. Mid-age — summarized. Old — vector retrieval за релевантністю. Selective compression Tool calls/results → стискаємо. User messages — залишаємо. Прагматичний підхід. External scratchpad Думки агента пишуться в окремий файл/DB, не в messages. Контекст не росте. Anthropic prompt cache System + tool definitions кешуються на стороні провайдера → 90% economy на повторах. 10. Метрики агентів — як виміряти що працює Звичайний LLM міряєш latency і accuracy. Агент — складніше. Багато викликів LLM, багато tool calls, multi-step trajectories. Метрики мають охоплювати якість, ефективність і надійність. Live dashboard — типові метрики продакшн-агента Task Success Rate 87% ↑ +3% vs last week Avg Steps per Task 4.2 target: < 8 Tool Call Errors 6.4% ↑ +1.2% — investigate Cost per Task $0.18 avg 12K tokens P95 Latency 8.4s below 12s SLO Loop Detection 2.1% tasks hit max_iters Hallucination Rate 3.8% via LLM-judge eval Human Escalations 11% target: < 15% ↻ Refresh metrics Категорії метрик 🎯 Якість (Quality) Task success rate — чи виконано мету (LLM-judge або human eval). Hallucination rate — частка відповідей з невірними фактами. Faithfulness — наскільки відповідь grounded у retrieved tools/docs. ⚡ Ефективність (Efficiency) Steps per task — скільки ітерацій ReAct loop. Tokens per task — сумарні витрати. Cost per task — $ per resolution. Tool call efficiency — корисні / усі виклики. 🛡 Надійність (Reliability) Tool call error rate — % фейлів API/DB. Loop detection — задачі що уперлись у max_iters. Timeout rate. Recovery rate — чи зміг агент після помилки. 👥 UX Time to first token. Time to resolution. Human escalation rate. User satisfaction (CSAT) — реальні фідбеки. Drop-off rate — на якому кроці юзер закриває. Eval методи для агентів End-to-end eval Golden dataset з 50-200 задач + expected outcomes. Раз на тиждень ганяємо весь набір і дивимось success rate. LLM-as-judge Інша LLM (Opus/GPT-4o) оцінює binary pass/fail чи трасу агента. Дешевше за людину, корелює з людським рейтингом. Trajectory eval Не тільки фінальна відповідь — а й чи правильні tools викликалися, в правильному порядку. A/B testing Дві версії агента (різні prompt, моделі) на 50/50 traffic → порівнюємо метрики. Replay testing Записані real traces → проганяємо через нову версію агента → diff. Ловимо regressions. Adversarial eval Спеціальні складні/злі кейси (jailbreaks, edge cases) — щоб ловити failure modes. 11. Pitfalls — що часто ламається в агентах Агенти — це місце де AI-engineering ламається найчастіше. Помилки тут не \"крашать сервер\" — вони \"втрачають $200 за ніч\" або \"відповідають неправильно але впевнено\". Ось 8 типових pitfalls. critLoops without exit Агент повторює одну дію 30 разів. Завжди ставити max_iters і cost_budget. Слідкувати за повторами. critTool over-use \"Я викликаю web_search 8 разів на одне питання\". Бюджет на tool calls per task — обов'язковий. critHallucinated tool args LLM передає user_id=\"John Smith\" замість UUID. Завжди валідація на стороні tool, не довіряємо моделі. critLost context На кроці 15 модель забула що користувач казав на кроці 2. Хороша summarization або зовнішній state. medTool poisoning Tool результат містить prompt injection (\"Ignore previous, do X\"). Sanitize tool outputs перед поверненням у LLM. medPremature finalization Агент видає \"I'm done\" не виконавши задачу. Чіткий definition of done у system prompt + verification step. medNon-determinism Той самий запит → різні шляхи виконання. temperature=0 не повністю детермінує — multi-step amplifies variance. lowOver-engineering \"Зробив 5 агентів і orchestrator\", коли вистачило б простого RAG. Anthropic: \"start simple, add complexity only when needed\". Anthropic's golden rules - \"Maintain simplicity\" — починай з простого workflow, переходь на agent тільки коли треба динамічна логіка - \"Prioritize transparency\" — детальне логування кожного кроку, бо інакше debug неможливий - \"Carefully craft tool descriptions\" — це твій prompt для LLM, не просто docstring - \"Test extensively in sandboxed environments\" — production agent has access to real systems, помилки коштують Заняття 11 · AI Agents & Tool Orchestration · Курс AI Engineering"}, {"file": "mlops.html", "title": "MLOps", "badge": "12", "text": "MLOps · AIOps · LLMOps Foundations Заняття 12 · як AI-системи живуть у продакшні: від тренування моделі до моніторингу промптів Інтерактивна лекція з MLOps-пайплайном, drift-симулятором, AIOps-стрімом логів, LLMOps observability дашбордом, токен-калькулятором і LLM Gateway. Натискай кнопки — все живе. Навіщо Ops MLOps Pipeline Drift AIOps LLMOps Стек LLMOps Порівняння Токен-бюджет LLM Gateway Evals & judge Що знати 01. Навіщо взагалі потрібні Ops-фреймворки \"Працює на моєму ноутбуці\" — найдорожча фраза у AI. Ops — це набір практик, що дозволяє надійно будувати, деплоїти і підтримувати AI-системи у реальному середовищі. ⚠️ Без Ops • Модель працює на ноутбуці — але не в продакшені • Немає контролю версій промптів та конфігів • Неможливо відтворити результати • Система падає — ніхто не знає чому ✓ З Ops • CI/CD пайплайн, версіювання, відтворюваність • Моніторинг latency, cost, quality в реальному часі • Алерти спрацьовують до того як юзер помітив • Нова версія котиться canary → progressive → 100% 3 фреймворки, що працюють разом 🔧 MLOps DevOps для класичного ML. Тренування, версіювання даних, деплой моделей, моніторинг точності. 🛰 AIOps AI для керування IT-інфраструктурою. Аналіз логів, anomaly detection, root cause, MTTR. 💬 LLMOps Operations для LLM-систем. Промпти, evals, guardrails, токен-бюджети, gateway, RAG. 02. MLOps: що це і навіщо знати MLOps = Machine Learning Operations — це DevOps, але для машинного навчання. Включає тренування, версіювання даних і моделей, автоматизацію пайплайнів та моніторинг точності у проді. Що робить MLOps - Тренування та деплой ML-моделей (Docker → K8s) - Версіювання даних та моделей (DVC + Model Registry) - Автоматизація пайплайнів (Airflow, Kubeflow) - Моніторинг точності у продакшені (drift detection) - A/B тестування та canary deploy Хто використовує Google, AWS, Uber, Spotify, Netflix — будь-яка компанія з ML у продакшні. Для AI-інженера MLOps — це мова команди. Ти не налаштовуєш Kubeflow сам, але маєш розуміти що таке Model Registry, чому потрібен canary deploy, і коли треба перетренувати модель. Ключові метрики MLOps Accuracy / F1 Якість моделі на golden set. Падає → треба retrain. Latency p95 Інференс має вкладатись у SLA (наприклад <100ms). Throughput Скільки запитів на секунду тримає твій сервіс. Drift Зміна розподілу даних або точності з часом. 03. MLOps пайплайн: від даних до проду Класичний MLOps-цикл — це 5 етапів, які повторюються щотижня або щодня. Натисни Run pipeline — побачиш як це виглядає у проді. Live End-to-end MLOps пайплайн (CI/CD для моделі) ▶ Run pipeline Reset 📥 Ingest Дані з S3 / DB → 🧠 Train PyTorch + MLflow → 📊 Evaluate Golden set → 🚀 Deploy Canary → 100% → 📡 Monitor Drift + alerts Натисни \"Run pipeline\" щоб побачити повний цикл… Інструменти для кожного етапу Етап Що робить Інструменти ---------- ----------------------------------------------- ----------------------------- Ingest Тягне дані, валідує схему, версіює DVC · LakeFS · Airflow Train Тренує модель, логує гіперпараметри і метрики MLflow · W&B · SageMaker Evaluate Прогон на golden set, regression check pytest · Great Expectations Deploy Canary, A/B тест, rollback за метрикою BentoML · Seldon · KServe Monitor Latency, accuracy, data drift, model drift Evidently · WhyLabs · Arize 04. Data drift: чому модель ламається у проді Модель навчилась на даних 2024 — а у 2025 розподіл змінився (нові юзери, новий продукт, сезон). Drift — головна причина того що \"модель раптом стала тупою\". Натисни Simulate drift. Simulator Distribution drift і падіння accuracy 📈 Simulate drift Reset [] Accuracy (live) 92% Drift score (PSI) 0.02 Status HEALTHY Типи drift Data drift Розподіл вхідних фіч змінився (нова географія, новий вік юзерів). PSI > 0.2 — alert. Concept drift Зв'язок X → Y змінився (юзери стали по-іншому реагувати на ціни). Acc падає — model знає неправильно. Label drift Розподіл цільової змінної змінився (раніше 5% fraud, тепер 15%). Класифікатор перестає тримати recall. 05. AIOps: AI для керування IT-інфраструктурою AIOps — не плутати з MLOps. Це AI для Operations: алгоритми аналізують мільйони логів і метрик у real-time, знаходять аномалії, визначають root cause і скорочують MTTR (mean time to resolution). AIOps Live log stream з anomaly detection ▶ Start stream ⏸ Stop 💥 Inject incident Натисни \"Start stream\" щоб увімкнути потік логів… AIOps моделі шукають патерн \"раптовий стрибок latency + 5xx + memory pressure\" → тригер root cause analysis. Тут спрощено: коли в потоці зʼявляється трійка ERROR підряд — alert. Хто використовує AIOps IT Ops / SRE Зменшити пейджер-ноіз і MTTR на проді. DevOps Корелювати деплой з регресіями метрик. Cloud admins Передбачати overload до того як впаде. Enterprise Складна гетерогенна інфра — банки, телеком. Інструменти AIOps IBM Watson AIOps · Splunk ITSI · Dynatrace · ServiceNow · New Relic · Datadog Watchdog 📋 Реальний кейс Великий банк фіксує аномальні стрибки мережевого трафіку. AIOps миттєво аналізує логи, знаходить першопричину (новий деплой mobile API + DDoS-патерн з 1 IP) і сповіщає команду — ще до того як юзери відчули збій. Для AI-інженера AIOps — суміжна область. Корисно розуміти концепцію (бо твій LLM-сервіс теж під AIOps моніторингом), але не основний фокус. 06. LLMOps: твій основний інструментарій LLMOps — найновіший і найбільш зростаючий напрям 2025. Якщо ти AI-інженер — це твій повсякденний інструментарій. Promptи, evals, guardrails, токен-бюджети, gateway. Що робить LLMOps 📊 Observability Кожен LLM call — trace з prompt, response, токенами, latency, cost. 🎯 Prompt management Версіювання промптів, A/B тести, rollback як для коду. 🛡 Guardrails Фільтр шкідливого контенту, prompt injection, PII redaction. 🧪 Evals Автоматична оцінка якості: golden set + LLM-as-a-judge. 💰 Cost control Токен-бюджети, кешування, маршрутизація на дешевшу модель. 🚪 Gateway Єдина точка входу до всіх LLM провайдерів з fallback. Live mock LLMOps observability dashboard 🔄 Refresh Requests / 5min 12 480 +4.2% Avg latency 820ms +12% slow Cost / 5min $3.18 -8% saved Error rate 0.4% stable Trace ID Endpoint Tokens Cost Latency Span ---------- ---------- -------- ------ --------- ------ 07. LLMOps: повний стек інструментів Кожна категорія має 2-3 топ-гравців. Не треба знати всі — обирай один з кожної категорії і будуй стек. Категорія Інструменти Що робить --------------- ------------------------------------------- -------------------------------------------------------------------- Observability Langfuse · LangSmith · Arize Phoenix Trace кожного LLM-виклику: prompt, response, tokens, latency, cost Prompt mgmt PromptLayer · Agenta · Langfuse Prompts Версіювання, A/B тести, rollback промптів — як Git, але для тексту Gateway LiteLLM · Portkey · OpenRouter Єдина точка входу, fallback між провайдерами, rate limit, кеш Evals RAGAS · DeepEval · PromptFoo · Braintrust Автоматична оцінка: golden set + LLM-as-a-judge Guardrails NeMo Guardrails · Guardrails AI · Lakera Фільтр PII, prompt injection, шкідливий контент Vector DB Pinecone · Weaviate · Qdrant · pgvector Embeddings storage та semantic search для RAG Fine-tuning Together AI · OpenAI FT · Axolotl LoRA / full fine-tune під свій домен 08. MLOps vs AIOps vs LLMOps Часта плутанина: ці три фреймворки не заміняють одне одного. Вони працюють паралельно для різних задач. Натисни вкладки — побачиш ключові відмінності. 🔧 MLOps 🛰 AIOps 💬 LLMOps Повна таблиця порівняння Аспект MLOps AIOps LLMOps ------------------ -------------------- ----------------------- --------------------------------- Фокус ML моделі IT інфраструктура LLM системи Версіювання Дані + моделі — Промпти + конфіги Моніторинг Accuracy, drift Logs, traces, metrics Quality, hallucinations, tokens Тестування Unit + integration Synthetic monitoring Evals, LLM-as-a-judge Деплой Docker + CI/CD — Gateway + API routing Безпека Валідація даних Anomaly detection Guardrails, prompt injection Метрика вартості Compute $ MTTR, downtime $ Tokens / API $ Для AI Engineer Базове розуміння Контекст Основний фокус 09. Токен-бюджет: рахуємо реальні гроші Якщо у тебе 10K юзерів × 20 запитів/день — будь-яка помилка вибору моделі коштує тисячі $/місяць. Покрути слайдери і подивись як мінятиметься рахунок. Calc Місячний LLM-рахунок Користувачів за місяць Запитів на користувача / день Tokens in / запит Tokens out / запит Модель Claude Haiku 4.5 — $1 / $5 per 1M Claude Sonnet 4.6 — $3 / $15 per 1M Claude Opus 4.7 — $15 / $75 per 1M GPT-4o mini — $0.15 / $0.60 per 1M GPT-4o — $2.50 / $10 per 1M Gemini 2.5 Flash — $0.30 / $2.50 per 1M Cache hit rate 0% Запитів / місяць — Токенів / місяць — Рахунок / місяць — Способи скоротити рахунок Prompt caching Anthropic / OpenAI: до 90% знижки на cached input. Найбільший ефект для довгого system prompt. Routing Простий запит → Haiku/Flash. Складний → Opus/4o. Економія 5-10×. Batch API Async batch — 50% знижка. Підходить для аналітики, summaries, не для real-time. 10. LLM Gateway: одна точка для всіх моделей Gateway (LiteLLM, Portkey, OpenRouter) — це nginx для LLM. Один API → роутинг по моделях, fallback при падінні провайдера, rate limit, cache, observability. Live Gateway з fallback ланцюжком 📤 Send request 💥 Kill primary Reset 📱 Your app POST /v1/chat → 🚪 LiteLLM Gateway retry + fallback + cache OpenAI · gpt-4oprimary Anthropic · Sonnet 4.6fallback 1 Google · Gemini 2.5fallback 2 // натисни \"Send request\" щоб подивитись як працює routing 11. Evals: як вимірювати якість LLM-відповідей У класичному ML accuracy — одне число. У LLM \"правильна відповідь\" нечітка. Тому ми використовуємо LLM-as-a-judge: одна модель оцінює іншу за критеріями (correctness, relevance, safety, citation). Judge Live LLM-as-a-judge eval ⚖️ Run eval Q: Який зворотний термін для refund на amazon? A (model): Зазвичай 30 днів з моменту отримання товару, але є категорії (електроніка) — 14 днів. Correctness — Relevance — Citation — Safety — Hallucination risk — Judge verdict: відповідь точна по структурі, але не цитує джерело. У RAG-системі такий output має тригерити warning або retry з instruction \"cite the source\". Типи evals Reference-based Є golden answer. Порівняння через BLEU, ROUGE, exact match або embedding similarity. Reference-free Немає еталона. LLM-as-a-judge оцінює за критеріями (RAGAS, G-Eval). Human-in-the-loop Експерти оцінюють sample (5-10%). Дорого, але critical для high-stakes. 12. Що AI-інженер має знати з кожної теми Не треба ставати MLOps SRE. Треба знати достатньо щоб говорити з командою і будувати свій LLMOps стек. 🔧 MLOps — розуміти • Концепцію MLflow та Model Registry • Як працює CI/CD для ML (build → train → eval → deploy) • Принцип canary deploy і shadow traffic • Що таке drift і коли треба retrain 🛰 AIOps — знати що існує • Які задачі вирішує (anomaly, RCA, MTTR) • Які компанії та інструменти є (Splunk, Dynatrace) • Не потрібно глибоко — це сфера SRE команди 💬 LLMOps — вміти руками • Інтегрувати Langfuse у свій LLM-застосунок • Версіювати промпти через Langfuse Prompts або PromptLayer • Налаштувати LLM Gateway через LiteLLM (з fallback) • Оцінювати якість через evals (RAGAS, DeepEval, або LLM-as-a-judge) • Додати guardrails на input/output 🎯 Головний висновок LLMOps не замінює MLOps — це розширення для нової реальності, де основний інструмент — LLM, а не класична ML-модель. У великих компаніях вони співіснують: ML-команда тримає рекомендаційні моделі, LLM-команда — чат-інтерфейс і RAG."}, {"file": "containers.html", "title": "Containers", "badge": "13", "text": "Containers for AI Чому AI-сервіси (RAG, agents, LLM API) ламають звичайні Docker-патерни, як це фіксити multi-stage збірками, як запускати GPU-контейнери для inference і де це деплоїти на AWS. Все з інтерактивами — клікай і дивись як числа змінюються. 1. Чому AI ≠ web 2. Anatomy of an AI image 3. Dockerfile минимум 4. Multi-stage build 5. Layer cache 6. GPU containers 7. Model loading strategies 8. Production patterns 9. AWS для AI 10. Recap 01 · Чому AI-сервіси — це не звичайні веб-сервіси Більшість Docker-туторіалів пишуть люди які деплоять Flask + Postgres. У AI ти стикаєшся з накладеннями які звичайний веб не має: GPU runtime, мегабайтні залежності, мультигігабайтні ваги моделей, повільний cold start. Стандартні поради (\"просто додай Dockerfile\") ламаються. 🌐 Звичайний веб-сервіс Flask + requests + sqlalchemy. Image ~150 MB. Cold start < 1 сек. Зміна коду = новий деплой за 30 сек. State у базі. CPU + 512 MB RAM. Будь-яка машина у будь-якій cloud. 🧠 LLM inference сервіс FastAPI + PyTorch + transformers + vLLM. Image 8-15 GB. Cold start 30-180 сек (завантаження ваг). Зміна коду = новий деплой 5-15 хв. State у GPU memory + model cache. Потребує GPU драйвер + CUDA toolkit. Хост повинен мати NVIDIA Container Toolkit. Конкретні pain points 🪜 GPU runtime Драйвер на хості, CUDA в контейнері. Версії повинні бути сумісними. Без NVIDIA Container Toolkit твій --gpus all не побачить жодної відеокарти. 📦 Розмір артефакту Модель 7B у fp16 = 14 GB. Python image = 1 GB. Стандартний \"запхай все в image\" дає 15+ GB і push 20 хв. ⏱️ Cold start Завантаження ваг моделі у GPU memory — 10-120 сек. Звичайний healthcheck /health → 200 бреше: порт відкритий, але запит впаде. 🔌 Зовнішні залежності Твій AI сервіс рідко самостійний. Це контейнер + vector DB + LLM API + observability. docker-compose = твій базовий стек локально, ECS task / k8s pod = той самий стек у проді. Головна ідея уроку: Docker для AI — це не \"запакуй Python\". Це оптимізація image size (інакше CI/CD задушиться), правильний model loading (інакше скейлінг неможливий) і розуміння GPU runtime (інакше воно просто не запускається). 02 · Anatomy of an AI image — на що йдуть гігабайти Перш ніж оптимізувати — треба бачити що саме розпухає. Це real breakdown naive Dockerfile для PyTorch FastAPI сервісу. Клікни на шар щоб дізнатись що там. interactive Layer cake — клікай на шари Кожен прямокутник = 1 шар у Docker image. Висота ∝ розмір. 👈 Клікни на будь-який шар вище Побачиш звідки беруться мегабайти, чи можна цей шар прибрати або зменшити, і що буде якщо лишити \"як є\". Total: 8.2 GB для naive image з PyTorch CUDA wheels + transformers + dev tools. Multi-stage версія (далі) робить ~1.2 GB. 03 · Dockerfile minimum для AI-інженера Без занурення в DevOps. Топ-10 команд яких достатньо для 99% AI кейсів. Базовий шаблон FROM python:3.11-slim WORKDIR /app # 1) залежності окремо — для cache COPY requirements.txt . RUN pip install --no-cache-dir -r requirements.txt # 2) код останнім — змінюється часто COPY app/ ./app/ EXPOSE 8000 CMD [\"uvicorn\", \"app.main:app\", \"--host\", \"0.0.0.0\"] Що означає кожна інструкція Команда Що робить ------------- -------------------------------------------------------------------------- FROM База на якій будуємо. Для AI = python:slim, nvidia/cuda, pytorch/pytorch WORKDIR cd всередині контейнера. /app — конвенція COPY Хост → image. Порядок важливий для cache RUN Виконати команду на build time. Створює новий layer ENV Env var що лишиться у runtime EXPOSE Документація — який порт. Не публікує CMD Що запускати при docker run HEALTHCHECK Команда яку Docker запускає для перевірки що контейнер живий USER Не запускати від root. Обов'язково для прод ARG Build-time змінна. Доступна тільки на білді, не у runtime ------------------------------------------------------------------------ 🚫 Топ-5 анти-патернів 1. COPY все, потім pip install COPY . . RUN pip install -r requirements.txt COPY requirements.txt . RUN pip install -r requirements.txt COPY . . Чому: при першому варіанті будь-яка зміна коду (1 байт) інвалідує cache для pip install — повторний білд 4 хв замість 5 сек. 2. Запуск від root # нічого про USER, default = root RUN useradd --create-home --uid 1000 app USER app Чому: якщо хтось пробʼє Python — він root всередині container. На k8s з privileged mounts це = root на хості. Безкоштовна best practice. 3. Не закріплені версії torch transformers fastapi torch==2.3.0 transformers==4.46.2 fastapi==0.115.5 Чому: сьогодні білд проходить, завтра нова версія transformers ламає API. Reproducibility = закріплені версії. 4. pip install без --no-cache-dir RUN pip install -r requirements.txt RUN pip install --no-cache-dir -r requirements.txt Чому: pip за замовчуванням кешує .whl у ~/.cache/pip → +200-500 MB зайвого у фінальному image. У контейнері кеш не потрібен. 5. Немає .dockerignore # файл просто відсутній .venv/ __pycache__/ .git/ .env data/cache/ *.ipynb Чому: без нього COPY . . тягне 5+ GB сміття: твоє venv, .git history, дата-кеші. Image розпухає, build повільніший. 6. Ваги моделі всередині image RUN python -c \"from transformers import ...; .from_pretrained(...)\" # mount як volume # або download at startup # або bake тільки для маленьких моделей Чому: image на 15 GB. Push у registry — 20 хв. Pull при автоскейлі — 8 хв. Розглянемо стратегії у секції 7. 04 · Multi-stage build — головна tool для AI образів Multi-stage = декілька FROM у одному Dockerfile. Build dependencies (gcc, dev headers) живуть у проміжному stage і не потрапляють у фінальний image. Для AI це різниця між 8 GB і 1.2 GB. Шаблон multi-stage для PyTorch FastAPI # --- Stage 1: builder --- FROM python:3.11 AS builder RUN apt-get install -y gcc g++ COPY requirements.txt . RUN pip install --no-cache-dir \\ --target=/deps -r requirements.txt # --- Stage 2: runtime --- FROM python:3.11-slim AS runtime RUN useradd --uid 1000 app USER app COPY --from=builder /deps /deps COPY --chown=app:app app/ ./app/ ENV PYTHONPATH=/deps HEALTHCHECK --interval=10s \\ CMD python -c \"import httpx; ...\" CMD [\"python\", \"-m\", \"uvicorn\", \"app.main:app\"] Builder має gcc/g++ для компіляції C-розширень (flash-attn, vllm). Runtime — чистий slim без жодного компайлера. Що дає multi-stage у цифрах (реальні заміри з boilerplate ДЗ) Naive Multi-stage --------------------------- --------- ------------- Image size 1.26 GB 251 MB 5x Build cold 102 s 22 s 4.6x Rebuild after code change 17 s 1 s 17x Push до registry ~90 s ~18 s Pull на новій ноді ~60 s ~12 s Cold start (image-only) 1.0 s 3.3 s Naive cold start швидший — slim base мікроскопічно повільніше імпортує. Це нормальний trade-off за 5x менший образ і 17x швидший rebuild. animation Multi-stage: дивись як stages працюють ▶ Run build Reset Stage 1: builder python:3.11 (повний) 📦 gcc, g++, headers 📥 pip download wheels 🔨 compile C extensions 📁 install → /deps — MB → Stage 2: runtime python:3.11-slim (мінімум) 👤 useradd app, non-root 📋 COPY --from=builder /deps 📄 COPY app/ ./app/ ⚙️ HEALTHCHECK — MB → Final image що піде у registry очікую завершення build... — MB Чому це працює: Docker зберігає тільки stages які мають тег (тобто фінальний). Builder з gcc, апт-кешами, тимчасовими файлами — викидається. У фінальний layer потрапляє лише те що ти явно COPY --from=builder. 05 · Layer cache — чому порядок інструкцій критичний Docker кешує кожен layer. Якщо інструкція не змінилась — використовується кеш. Найменша зміна у файлі/команді інвалідує цей layer і всі наступні. Один зайвий \"miss\" і твій pip install йде 4 хв замість 0 сек. interactive Cache simulator — зміни код, дивись які layers перебудовуються 📝 Change app/main.py 📦 Update requirements.txt ↻ Clean rebuild FROM python:3.11-slimhit WORKDIR /apphit COPY requirements.txt .hit RUN pip install -r requirements.txthit COPY app/ ./app/hit CMD [\"uvicorn\", \"app.main:app\"]hit Cache misses 0 / 6 Час повторного білду ~0.5 s Що сталось Все з кеша. Білд миттєвий. Правило: часто-змінюване — нижче. requirements.txt змінюється раз на тиждень, твій код — 50 разів на день. Тому requirements йде перед code copy. Чому це жирно для AI: якщо у тебе torch==2.3.0 у requirements.txt — це 2.5 GB pip install з компіляцією CUDA wheels. Кожен miss = 4 хв чекання. Правильний порядок layers = ця компіляція виконується один раз на тиждень, а не на кожен push коду. 06 · GPU containers — коли потрібен і як працює Якщо ти ходиш у OpenAI/Anthropic/Bedrock через API — GPU тобі не потрібен, провайдер вже все має. GPU стає потрібен коли ти запускаєш модель сам: vLLM з Llama, Ollama локально, Whisper для транскрипції, embeddings через sentence-transformers, image generation (Stable Diffusion / Flux). Розглянемо різницю CPU vs GPU. 🧮 CPU — універсал-послідовник 4-16 ядер, кожне дуже розумне і швидке. Виконує складні гілкові обчислення один за одним. Чудово для бізнес-логіки, баз даних, API. Для матричного множення (а LLM = багато матриць) — повільно. Llama 3.1 8B на CPU: ~3-5 токенів/сек. Користувач чекає 30 сек на відповідь. UX зламано. ⚡ GPU — паралельний робочий завод Тисячі простих ядер (RTX 4090 = 16,384 CUDA cores). Кожне окремо тупе, але всі разом множать матриці одночасно. Створювалися для графіки (це і є матриці), випадково ідеально підійшли для нейромереж. Llama 3.1 8B на GPU (A10G): ~80-120 токенів/сек. 2-3 сек на відповідь. UX живий. У числах — той самий запит на різному заліз Workload CPU (32 vCPU Xeon) T4 (entry GPU) A10G A100 (40GB) --------------------------------------- -------------------- ----------------- ---------------- ------------- Embedding 1 doc (MiniLM) ~40 ms ~5 ms ~2 ms ~1 ms Llama 3.1 8B inference (tok/s) 3-5 ~30 80-120 ~180 Llama 3.1 70B inference не влізе у RAM не влізе тісно (~40 GB) ~50 Whisper-large транскрипція 1 хв аудіо ~25 s ~3 s ~1.5 s ~0.8 s Stable Diffusion XL 1 image ~120 s ~12 s ~5 s ~3 s Ціна $/год AWS (приблизно) $1.4 (c6i.8xl) $0.53 (g4dn.xl) $1.21 (g5.xl) $3.06 (p4d) 📐 VRAM як ліміт На GPU модель має влізти в VRAM цілком. Llama 8B у fp16 = 16 GB → не влізе в T4 (16 GB треба ще для KV cache). Тому квантизація (Q4, Q8) — щоб втиснути в дешеву карту. 📊 Batch size — секрет throughput 1 запит на GPU = недовикористання. 32 паралельних запити на тій самій GPU = майже та ж latency, але throughput ×30. vLLM зі своїм paged attention робить це автоматично — тому в проді не запускають \"просто transformers.generate()\". 🧠 Що CUDA робить за тебе CUDA = API + бібліотека від NVIDIA яка перетворює \"помнож ці дві матриці\" → 16k паралельних операцій на ядрах. PyTorch під капотом тільки кидає виклики у CUDA. У контейнері тобі треба матчити CUDA Toolkit версію у image з driver на хості. Правило для AI-інженера: якщо твій сервіс ходить у API (OpenAI/Bedrock/Anthropic) — забудь про GPU, деплой на Fargate, image < 500 MB. GPU потрібен тільки якщо запускаєш модель сам. І навіть тоді — спочатку подивись чи можна обійтись API (90% RAG-кейсів — можна). ------------------------------------------------------------------------ Як GPU потрапляє в контейнер У 95% випадків AI-інженер цього не торкається — host driver встановлює платформа (AWS, RunPod, Lambda Labs). Достатньо знати 4 факти: - На хості встановлений NVIDIA driver + nvidia-container-toolkit (це менеджмент платформи) - Ти запускаєш контейнер з прапором --gpus all — toolkit прокидає driver libs з хоста всередину - У image у тебе CUDA Toolkit (через nvidia/cuda:12.2-runtime base) + PyTorch CUDA wheels - CUDA у image ≤ driver на хості. Якщо взяв nvidia/cuda:12.6 а на нозі driver 525.x → впаде з CUDA driver version is insufficient. Це єдиний симптом який треба впізнавати ------------------------------------------------------------------------ terminal Demo: запустити vLLM контейнер з GPU ▶ docker run Kill GPU Reset $ _ 📦 Inference container Read-only ваги, low-memory churn, оптимізація на throughput. --gpus all, --shm-size=16g (для tensor parallelism), HF cache як volume. docker run --gpus all \\ --shm-size=16g \\ -v ~/.cache/hf:/root/.cache/hf \\ -p 8000:8000 \\ vllm/vllm-openai \\ --model llama-3.1-8b 🔀 LLM Gateway (CPU) Більшість AI-інженерів не тримають GPU. Звичайний паттерн — твій FastAPI сервіс ходить у OpenAI / Anthropic / Bedrock, плюс окремий gateway контейнер (LiteLLM) для fallback chain. CPU-only, image < 300 MB. docker run -p 4000:4000 \\ -e OPENAI_API_KEY=$OPENAI_KEY \\ -e ANTHROPIC_API_KEY=$ANT_KEY \\ ghcr.io/berriai/litellm \\ --model gpt-4o-mini \\ --fallbacks claude-3-5-haiku 07 · Model loading strategies — bake, volume, download Якщо ти запускаєш модель сам (не через API), у тебе є файл з вагами на 1-20 GB. Цей файл треба якось дати контейнеру. Є 3 способи — і кожен має свою ціну. Що означає \"ваги моделі\"? \"Llama 3.1 8B\" = 8 мільярдів чисел у файлі. Кожне число — float у 2 байти. 8 × 2 = ~16 GB файл з якого LLM \"думає\". Цей файл треба покласти в GPU memory перш ніж сервіс зможе відповідати. Поки не покладений — контейнер живий, але /ask повертає 503. Три стратегії — одна ідея на трьох Запам'ятай по ключовому слову: - 🥧 Bake — ваги всередині image. \"запекли разом з кодом\" - 💾 Volume — ваги поруч з image. \"лежать на диску, контейнер читає\" - ⬇️ Download — ваги тягнуться з інтернету при старті. \"кожен новий контейнер качає з HuggingFace\" Трейдоф простий: чим швидший cold start, тим більший image. Чим менший image, тим повільніший cold start. Третього не дано — або ти платиш розміром, або часом старту. Основні метрики 📦 Image size Скільки місця займає твій Docker image. Перевіряється: docker images. Чому важливо: великий image → довгий docker pull на кожну нову ноду при autoscale. Якщо image 15 GB, нова репліка стартує 5-10 хв замість 30 сек. ⏱️ Cold start Час від docker run до моменту коли сервіс готовий відповідати на запити (/health → ok). Чому важливо: на autoscale кожна нова репліка йде через cold start. Якщо він 5 хв, то трафіковий сплеск ти будеш переживати з 503 errors. Для chat UI > 30 сек = поганий UX. 📤 Push в registry Час щоб залити image у container registry (ECR, GHCR, Docker Hub) після docker build. Чому важливо: якщо CI пайплайн будує + пушить image 25 хв, твоя deploy швидкість обмежена цим. 50 push-ів на день × 20 хв = 17 годин CI часу = реальні гроші. Тому маленький image → дешевший CI. 🎯 Reproducibility Гарантія що та сама команда docker run image:v1 дасть однаковий результат сьогодні і через рік. Чому важливо: якщо ваги моделі качаються з HF при кожному старті, а HuggingFace оновив модель — твій сервіс поведеться інакше. Bake = 100% repro (ваги вшиті). Download = ризик \"у понеділок працювало\". 🥧 Bake in image ваги додаються в Docker image під час docker build Як зробити: у Dockerfile додаєш RUN python -c \"from transformers import ...; .from_pretrained(...)\" — ваги кешуються в layer і їдуть з image. Image size 15 GB ↑↑ Cold start 2 s найкраще Push в registry 20 min довго Reproducibility 100% ідеально ✓ Беремо коли: модель маленька (< 1 GB) — наприклад MiniLM для embeddings. Або prod де версія моделі = версія сервісу і це критично. ✗ Не беремо коли: великі LLM (15 GB image страшно пушити), часті деплої (кожен push = 20 хв). 💾 Volume mount ваги лежать на диску, контейнер їх \"монтує\" через -v /models:/models Як зробити: ваги один раз кладеш на shared FS (EFS / Filestore / NFS / локальний диск). Контейнер при старті бачить /models/llama-8b/ і читає звідти. Image size 1.2 GB мало Cold start 30 s читання з FS Push в registry 1 min швидко Reproducibility ~70% ризик ✓ Беремо коли: Kubernetes-кластер з EFS/Filestore, кілька реплік сервісу читають одну модель. Або dev environment де хочеш переключати моделі без перебудови image. ✗ Не беремо коли: Lambda/Fargate (там немає persistent volumes). Hard truth: хтось має оновлювати склад — це окремий operational concern. ⬇️ Download at startup ваги качаються з HuggingFace коли контейнер стартує, у app.on_startup Як зробити: у lifespan handler пишеш SentenceTransformer('all-MiniLM-L6-v2') — sentence-transformers сама викачає ваги з HF при першому виклику. Image size 1.2 GB мало Cold start 60-300 s довго! Push в registry 1 min швидко Reproducibility ~80% залежить від HF ✓ Беремо коли: serverless deploy на Fargate/Lambda, autoscale (нові ноди підіймаються самі). Можна змінити модель через MODEL_ID у env var без перебілду image. ✗ Не беремо коли: SLA на cold start < 30 сек (наприклад chat UI). Mitigation: монтуй HF cache як volume (~/.cache/huggingface) — друга нода стартує за 5 сек замість 60. ------------------------------------------------------------------------ Як вибрати — просто по розміру моделі 🪶 Маленька модель (< 500 MB) → Bake в image. Приклад: MiniLM для embeddings (90 MB), маленький tokenizer, distilled BERT. Image все одно буде < 1 GB, push швидкий, cold start миттєвий. Ускладнюватись volume-ами немає сенсу. ⚖️ Середня модель (500 MB – 5 GB) → Download at startup + cache volume. Приклад: Whisper-small (500 MB), CLIP, Llama 3.2 3B (квантизована). Image лишається маленький, перший cold start ~60 сек, наступні ~5 сек з кешу. Стандартний AI-сервіс паттерн. 🐘 Велика модель (> 5 GB) → Shared volume на cluster level (EFS/Filestore) або dedicated model server (Triton, Ray Serve, vLLM). Приклад: Llama 3.1 8B/70B, SDXL, Whisper-large. Тут вже не \"як деплоїти контейнер з моделлю\", а \"як побудувати inference сервер який обслуговує кілька клієнтів\". Окрема велика тема. На практиці для AI-інженера: 90% твоїх сервісів ходять у API (OpenAI/Bedrock) — ніяких ваг у твоєму контейнері взагалі немає. Решта 10% — це невеликі embedder-и/класифікатори, які чудово запікаються в image. Великі моделі через API провайдерів — нехай Anthropic/AWS бавляться з 70B вагами. 08 · Production patterns та pitfalls Що випливає на проді що не покаже жоден туторіал. 🩺 HEALTHCHECK що дійсно перевіряє AI Звичайний GET /health → 200 для AI бреше. Порт відкривається до завантаження моделі. Healthcheck повинен перевіряти що модель готова робити inference. HEALTHCHECK --interval=10s --start-period=60s \\ CMD python -c \"import httpx; r=httpx.get('http://localhost:8000/health', timeout=3); exit(0 if r.json().get('status')=='ok' else 1)\" --start-period=60s — критично для AI. Це grace period поки модель грузиться, без нього Docker буде вважати контейнер unhealthy після перших 30 сек і рестартити в loop. 🛑 Graceful shutdown GPU контейнер що отримав SIGTERM посеред inference має: 1. Закінчити поточний запит (не різати на половині) 2. Звільнити GPU memory (інакше наступний контейнер не зможе alloc) 3. Закрити connections до downstream сервісів У FastAPI це lifespan handler з proper cleanup. uvicorn чекає --timeout-graceful-shutdown сек. 🔒 Security minimum • Non-root user у фінальному image • Read-only filesystem де можливо: --read-only + --tmpfs /tmp • Secrets через env/mount, ніколи у Dockerfile (вони лишаться у history!) • Не ховай Python через chmod — Python easy to reverse 💰 Registry economics Image 14 GB × 100 деплоїв/день = 1.4 TB трафіку. На GHCR безкоштовно для public, ECR коштує. Зменшення з 14 GB → 1.2 GB = 92% економії. Image layers дедупліковані на стороні registry — якщо base layer той самий, заливається тільки delta. Тому slim base гарно економить навіть для багатьох image-ів одного проєкту. ------------------------------------------------------------------------ Базові образи — який обрати Образ Розмір Коли ------------------------------ --------- ---------------------------------------------------------------------- python:3.11 ~1 GB Швидкий старт, dev environment. Прод — ні python:3.11-slim ~120 MB Default для CPU сервісів. Найкращий баланс python:3.11-alpine ~50 MB Спокусливо, але часто ламає numpy/torch wheels (musl libc). Обережно nvidia/cuda:12.2-runtime ~3 GB GPU inference, без компіляції nvidia/cuda:12.2-devel ~6 GB Build stage для GPU кода (flash-attn, custom CUDA kernels) pytorch/pytorch:2.3-cuda12.1 ~7 GB Готовий PyTorch + CUDA. Зручно для прототипу, важко для multi-stage gcr.io/distroless/python3 ~50 MB Найменший. Немає shell, не подебажиш. Для security-paranoid prod 09 · AWS для AI-інженера — куди деплоїти контейнер Локально docker run працює. У проді треба сервіс який реєструється у load balancer, скейлиться, моніториться, перезапускається. На AWS для AI-сервісів є 4 основних варіанти — кожен з трейдофами. Decision tree Я хочу задеплоїти AI-сервіс на AWS │ ┌─────────────────────────┴─────────────────────────┐ │ │ Persistent service Event-driven / (chat, API, agent) sporadic traffic │ │ ▼ ▼ ┌────────────┐ ┌─────────────┐ │ GPU потріб?│ │ Lambda │ └─┬──────┬───┘ │ (S3 trigger,│ │ │ │ webhook, │ так ні │ cron job) │ │ │ └─────────────┘ ▼ ▼ ┌──────┐ ┌─ < 30 GB RAM ──┐ ┌─ Готова модель? ─┐ │ ECS │ │ ▼ │ │ │ │ │ EC2 │ │ Fargate │ │ Yes (Claude, │ │ +GPU │ │ (serverless │ │ Llama, Mistral) │ │ OR │ │ контейнери) │ │ ▼ │ │ Sage │ ├─ > 30 GB RAM ──┤ │ Bedrock │ │Maker │ │ ▼ │ │ (без контейнера) │ │End │ │ ECS на EC2 │ └───────────────────┘ │point │ │ │ └──────┘ └────────────────┘ 4 способи задеплоїти контейнер 🚀 ECS Fargate — найпростіше Що це: serverless контейнери. AWS сам менеджить ноди. Ти даєш image + task definition, AWS запускає. Для AI: ідеально для RAG-сервісу що ходить у OpenAI/Bedrock. CPU + memory only (немає GPU у Fargate). Плюси: нуль інфраструктури, autoscale з коробки, pay per second, інтеграція з ALB/CloudWatch. Мінуси: немає GPU, cold start 30-60 сек, max 16 GB RAM на task. Ціна: ~$36/міс за 0.5 vCPU + 1 GB RAM 24/7. 🏗️ ECS на EC2 — коли потрібен GPU або великі ноди Що це: той самий ECS, але ти сам менеджиш EC2-ноди (включно з g4dn/g5 для GPU). Для AI: якщо хочеш запускати vLLM/Ollama на своєму GPU. Або потрібно > 30 GB RAM. Плюси: GPU (g4dn = T4, g5 = A10G, p4d = A100), будь-який instance type, дешевше на високих utilization. Мінуси: треба патчити AMI, scaling складніший, плата за idle ноди. Ціна: g4dn.xlarge (T4 GPU, 16 GB) = $0.53/год ≈ $380/міс 24/7. 🎯 SageMaker Endpoint — managed inference Що це: ти даєш Docker image + ваги моделі, SageMaker сам менеджить GPU instances, autoscale, multi-AZ. Для AI: деплой власної fine-tuned моделі. Підтримує real-time, async, batch, serverless inference. Плюси: GPU autoscale, A/B testing, model versions, IAM з коробки. Image формат — standard Docker. Мінуси: 20% наценка за managed, lock-in на SageMaker format (треба HEALTHCHECK endpoint /ping + inference /invocations). Ціна: ml.g5.xlarge = $1.41/год ≈ $1000/міс 24/7. Або serverless = pay per request. ⚡ Bedrock — без свого контейнера взагалі Що це: AWS-нативний LLM API. Claude, Llama, Mistral, Titan, Cohere, Stable Diffusion — все за одним API. Для AI: 80% AI-інженерських задач закриваються Bedrock-ом. Твій FastAPI сервіс ходить у Bedrock, контейнер залишається CPU-only. Плюси: нуль операційного навантаження, IAM auth (не треба секретів API), VPC PrivateLink, pay per token. Мінуси: моделі тільки ті що AWS додав. Кастомні моделі — через Bedrock Custom Model Import (нова фіча). Ціна: Claude 3.5 Haiku = $0.80/$4 per 1M tokens. Llama 3.1 8B = $0.22/$0.22. 🌙 Lambda для AI — окремий випадок Lambda не заміняє Fargate для основного AI-сервісу. Persistent контейнер з моделлю у памʼяті завжди буде швидшим за cold-init Lambda. Але для specific event-driven задач Lambda незамінна — особливо коли треба \"коли подія X → виклик AI\". ✅ Коли Lambda — правильний вибір - S3 trigger → upload файлу → автоматичний OCR/transcribe/embed - SQS / EventBridge → batch job: embed усі нові docs у Pinecone раз на годину - API Gateway для sporadic traffic (< 100k req/день нерівномірно) - Slack / Telegram webhook → відповідь через LLM - Step Functions step у multi-stage AI pipeline (extract → embed → enrich) - Async post-processing — користувач вже отримав відповідь, у фоні треба зробити quality eval ❌ Коли Lambda не підійде - Chat UI зі стрімінгом (SSE/WebSocket) — у Lambda обмежений streaming, краще Fargate - Локальна модель (vLLM/Ollama) — немає GPU, cold start 30+ сек - Agent з 10+ tool calls — ризик впасти у 15-min timeout - Стійкий traffic > 100 req/sec — Fargate дешевший - Persistent connections до vector DB/Redis — connection pool пропадає між invocations - Image > 10 GB — Lambda ліміт жорсткий ------------------------------------------------------------------------ Як деплоїти Docker image у Lambda # 1. твій Dockerfile повинен мати AWS Lambda Runtime Interface Client FROM public.ecr.aws/lambda/python:3.11 COPY requirements.txt . RUN pip install --no-cache-dir -r requirements.txt COPY app/ ${LAMBDA_TASK_ROOT}/ CMD [\"app.handler.lambda_handler\"] # 2. build, push в ECR, створити функцію docker build -t embed-job . docker tag embed-job:latest 123.dkr.ecr.us-east-1.amazonaws.com/embed-job:v1 docker push 123.dkr.ecr.us-east-1.amazonaws.com/embed-job:v1 aws lambda create-function \\ --function-name embed-job \\ --package-type Image \\ --code ImageUri=123.dkr.ecr.us-east-1.amazonaws.com/embed-job:v1 \\ --role arn:aws:iam::123:role/lambda-role \\ --memory-size 3008 --timeout 900 Cold start mitigation: Provisioned Concurrency = $0.015/GB-hour за \"теплі\" instance-и. Або SnapStart (тільки для Java/Python поки що — pre-snapshot після init). Для AI workload де модель тягне 5 сек — Provisioned Concurrency окупає себе у high-traffic кейсах. Ціна: $0.20 per 1M requests + $0.0000166667 per GB-second. Для 100k requests/міс × 3 GB RAM × 2s = ~$10/міс. Та сама нагрузка на Fargate 24/7 = $36/міс. ------------------------------------------------------------------------ Container registry — ECR Перш ніж деплоїти куди завгодно — image має лежати в registry. На AWS це Amazon ECR (Elastic Container Registry). Альтернатива — public GHCR (GitHub) або Docker Hub, але ECR має пряму інтеграцію з IAM/ECS/Lambda і дешевий egress всередині AWS. # 1. створити ECR repo (один раз) aws ecr create-repository --repository-name rag-service # 2. login aws ecr get-login-password --region us-east-1 | \\ docker login --username AWS --password-stdin \\ 123456789.dkr.ecr.us-east-1.amazonaws.com # 3. tag + push docker tag rag:multistage \\ 123456789.dkr.ecr.us-east-1.amazonaws.com/rag-service:v1 docker push \\ 123456789.dkr.ecr.us-east-1.amazonaws.com/rag-service:v1 Pricing: $0.10 per GB-month storage + free transfer всередині AWS region. Для 251 MB image як з boilerplate = $0.025/міс. Залиш собі частину карвердового стейку. ------------------------------------------------------------------------ Що писати у task definition (ECS Fargate приклад) { \"family\": \"rag-service\", \"networkMode\": \"awsvpc\", \"requiresCompatibilities\": [\"FARGATE\"], \"cpu\": \"512\", \"memory\": \"1024\", \"containerDefinitions\": [{ \"name\": \"app\", \"image\": \"123.dkr.ecr.us-east-1.amazonaws.com/rag-service:v1\", \"portMappings\": [{\"containerPort\": 8000, \"protocol\": \"tcp\"}], \"healthCheck\": { \"command\": [\"CMD-SHELL\", \"python -c 'import httpx; ...'\"], \"startPeriod\": 60 }, \"secrets\": [ {\"name\": \"OPENAI_API_KEY\", \"valueFrom\": \"arn:aws:secretsmanager:...\"} ], \"logConfiguration\": {\"logDriver\": \"awslogs\", ...} }] } Зверни увагу: healthCheck з startPeriod: 60 (бо AI startup повільний), secrets через Secrets Manager — не env-vars у task definition, бо вони видно у консолі. ------------------------------------------------------------------------ AWS observability для AI 📊 CloudWatch Logs Усе що твій контейнер пише у stdout/stderr → автоматично у Logs. Структуруй у JSON: trace_id, latency_ms, tokens_in/out, model. Filter патерни → metric. 📈 CloudWatch Metrics Кастомні метрики через aws cloudwatch put-metric-data або EMF. Для AI: p95 latency, token consumption, error rate per model, cache hit rate. 🔍 X-Ray traces Distributed tracing. FastAPI → Bedrock → Postgres = один trace. Bedrock вже інтегрований. Для OpenAI/Anthropic — manual instrumentation. Default стек AI-інженера на AWS: ECR (registry) + ECS Fargate (основний сервіс) + Lambda (event-driven jobs, S3 triggers) + Bedrock (LLM) + Secrets Manager (ключі) + CloudWatch (логи) + ALB (load balancer). GPU не потрібен. Це покриває 80% AI use-cases і коштує < $100/міс на тестовому навантаженні. 10 · Recap — cheat sheet ✅ Що завжди робити - Multi-stage build з slim runtime - .dockerignore з .venv .git __pycache__ - Закріплені версії у requirements.txt - Non-root user (useradd app) - HEALTHCHECK що тестує що модель готова - --no-cache-dir для pip - Окремий COPY для requirements і коду - --start-period для AI healthcheck ❌ Що ніколи не робити - COPY . . перед pip install - Запуск від root у фінальному image - Великі моделі (> 1 GB) усередині image - Секрети у Dockerfile або ARG - Healthcheck що повертає 200 раніше за модель - Незакріплені версії dependencies - Alpine для PyTorch/numpy (musl libc) - FROM python:3.11 без slim для runtime 📚 Корисні посилання: Docker docs · multi-stage · NVIDIA Container Toolkit · vLLM Docker guide · distroless images"}, {"file": "kubernetes.html", "title": "Kubernetes", "badge": "14", "text": "Kubernetes for AI Системний огляд продакшн-практик розгортання LLM-сервісів у Kubernetes: забезпечення нульового простою під час релізів, обмеження CPU-метрик для inference-навантажень, принципи GPU scheduling та технологія Multi-Instance GPU (MIG), а також управління конфігураціями через Helm. Матеріал доповнено чотирма інтерактивними симуляторами для емпіричної перевірки розглянутих концепцій. 💀 Що буде якщо деплоїти AI-сервіс без Kubernetes ▶ Play disaster ⏸ Pause ↺ Reset step 0 / 5 [] ▶ Натисни Play — побачиш 5 типових інцидентів які трапляються коли деплоїш LLM-сервіс напряму на VM через docker run. Кожна проблема — те, що K8s вирішує \"з коробки\". 🎬 Як працює Kubernetes за 60 секунд ▶ Play ⏸ Pause ↺ Reset step 0 / 6 [] ▶ Натисни Play — анімація покаже шлях від kubectl apply до запущеного pod-а на GPU-ноді за 6 кроків. 📖 Що саме відбулось у цих 6 кроках — повний розбір Анімація стиснула в 30 секунд процес, що в реальному кластері триває 30-180 секунд (модель довго грузиться). Кожен компонент має свою чітку роль — це і дає K8s його \"магічність\". 🧠 API Server — точка входу Роль: єдине вікно для команд. kubectl, Helm, ArgoCD, веб-UI, custom оператори — усі ходять сюди. Жоден компонент K8s не обходить API Server. Що робить на step 1: валідує YAML (чи правильна структура?), перевіряє права (RBAC: чи можеш ти створювати Deployment у цьому namespace?), пише запис у etcd. Чому це важливо: один центр прийняття рішень = одна точка для логування, аудиту, безпеки. Хочеш дізнатись хто щось змінив у проді? API Server audit log. 💾 etcd — джерело правди Роль: розподілена key-value БД, що тримає бажаний стан усього кластера. Все що ви бачите в kubectl get — читається звідси. Що робить на step 2: зберігає запис \"Deployment llama-inference, replicas: 3\" як key/value. Інші компоненти (Scheduler, Controller) \"слухають\" зміни тут через watch API. Чому це важливо: якщо etcd падає — кластер ефективно мертвий. Тому у проді тримають 3 або 5 etcd replicas з raft consensus. Backup etcd = backup усього кластера. 🎯 Scheduler — логіст Роль: приймає рішення на якій саме ноді запустити pod. Скоринг по десятках факторів: вільні ресурси, nodeSelector, taints/tolerations, affinity, GPU доступність. Що робить на step 3: бачить у etcd новий pod без призначеної ноди → перебирає всі ноди → знаходить GPU-ноду з вільною nvidia.com/gpu → пише у etcd \"pod-1 призначений на gpu-node-2\". AI-контекст: 90% pod-ів у Pending у вашого кластера — це scheduler не знайшов ноди що задовольняє nodeSelector: accelerator=nvidia-a100. Перевірка: kubectl describe pod <name> → секція Events. 🛠 Controller Manager — наглядач Роль: крутить нескінченний reconciliation loop: порівнює бажаний стан (etcd) з реальним станом (live pods). Помітив різницю → виправив. Що робить на step 4: \"треба 3 replicas, є 2 → створи третій pod\". Якщо pod помре — створить заміну. Якщо ви kubectl delete pod — він тут же створить новий (бо у Deployment ще написано replicas: 3). Чому це важливо: це і є self-healing K8s. Кластер сам себе ремонтує без вашого втручання. Ви декларуєте що, K8s рішає як цього досягти. 👷 Kubelet — виконроб на ноді Роль: агент K8s, що крутиться на кожній worker-ноді. Слухає API Server: \"хто я і що мені робити?\". Спілкується з container runtime (containerd/CRI-O/Docker). Що робить на step 5-6: отримує наказ від API Server \"запусти pod з image vllm:v0.6.0\". Тягне image з registry → монтує GPU через NVIDIA runtime → стартує контейнер → починає bити readinessProbe → коли OK = доповідає \"Ready\". AI-pitfall: якщо kubelet на GPU-ноді не бачить NVIDIA device plugin — pod вічно у ContainerCreating. kubectl describe node <name> → перевір allocatable.nvidia.com/gpu. 📦 Pod — фінальний результат Роль: мінімальна одиниця, що виконує вашу роботу. У AI це інстанс vLLM-сервера, що тримає модель у GPU memory і відповідає на HTTP-запити. Що з ним після step 6: через 30-120 сек завантажиться модель → readinessProbe пройде → Service зареєструє його endpoint → почне обробляти трафік. Якщо помре — Controller (step 4) одразу створить заміну. Ключова думка: pod-и ефемерні. Вони помирають і відроджуються постійно (rolling update, нодa OOM, scale-down). Ваш дизайн має це передбачати: stateless логіка, persistent state у PVC або БД. 🎯 Навіщо взагалі такий складний flow 🤖 Декларативність Ви кажете \"хочу 3 replicas vLLM\" — і все. Не пишете \"ssh на сервер, docker pull, docker run, перевір що живий, перезапусти якщо впав\". K8s сам приводить реальність до бажаного стану. ♻️ Self-healing Кожен компонент спостерігає за etcd і виправляє розбіжності. Pod помер о 3-й ночі → Controller помітив → Scheduler знайшов ноду → Kubelet запустив новий. Інцидент закрито автоматично, без втручання інженера. 🔌 Розширюваність Той самий механізм reconciliation працює для усіх ресурсів. KEDA ScaledObject, Helm Release, Argo CD Application, NVIDIA GPU Operator — усі це контролери з власним reconciliation loop поверх того ж API Server. 🔒 Audit + RBAC Усі дії проходять через один API Server → можна логувати, обмежувати, ревʼюити. У проді AI-команда не має прямого доступу до нодів — лише через API. Це core property \"production-grade\". 🌍 Hardware-agnostic Той самий маніфест працює на minikube, EKS, GKE, AKS, on-prem. Ви пишете nvidia.com/gpu: 1 — K8s сам розбирається де є A100 у конкретному cloud. ⚡ Швидкість змін Інтервал між kubectl apply і running pod = секунди (без cold start). Цей flow з 6 кроків K8s проганяє тисячі разів на день у великих кластерах. Кожна autoscale-подія = один такий цикл. 💡 Ключове правило: у Kubernetes відсутні імперативні команди на кшталт \"перезапустити сервер\". Усі взаємодії — декларативні: ви описуєте бажаний стан системи. Компоненти Control Plane працюють у безперервному циклі reconciliation: порівняти desired state з actual state → привести їх до збігу. Саме це робить Kubernetes самовідновлюваним, передбачуваним і масштабованим. Засвоївши цей принцип, ви побачите, що решта механізмів (Helm, KEDA, GPU scheduling) — це додаткові контролери, що працюють за тією самою логікою. 01 · Чому AI-сервіси на K8s — це не звичайні веб-сервіси Більшість K8s-туторіалів орієнтовані на стек Flask + Postgres. При перенесенні цих практик на LLM inference з 8B+ моделлю на GPU значна частина \"best practices\" виявляється непридатною: readinessProbe видає хибно-позитивний сигнал (порт відкритий до завершення завантаження моделі), HPA не реагує на навантаження, image розміром 12 GB неможливо ефективно публікувати у registry, а scheduler за замовчуванням розміщує pod на CPU-ноді, де він завершується з OOM. 🌐 Звичайний web-pod Flask + nginx. Image 200 MB. Cold start < 2 сек. CPU 0.5, RAM 512 Mi. Scale-up за секунди. HPA по CPU% — працює. Будь-яка нода в кластері. Rolling update — без проблем. 🧠 LLM inference pod vLLM + Llama-3-8B. Image 10-15 GB. Cold start 30-180 сек (модель у GPU memory). RAM 32 Gi + 1× A100/H100. Scale-up — хвилини. HPA по CPU% — не реагує (CPU 10%, GPU 95%). Треба GPU-нода з NVIDIA device plugin. Rolling update без probes = 502 на кожному релізі. 4 фундаментальні відмінності ⏱️ Slow cold start Завантаження ваг у GPU memory — 30-180 сек. Pod вже Running, але запит впаде. Без правильного readinessProbe — 502 під час кожного rollout. 📊 GPU-bound, not CPU HPA з коробки міряє CPU/RAM. У LLM CPU 10%, GPU 95%, queue росте. HPA не реагує — потрібна KEDA з custom metrics (queue depth, GPU util). 🎮 GPU як ресурс K8s \"з коробки\" не знає що таке GPU. Треба NVIDIA device plugin + node labels + nvidia.com/gpu: 1 у resource limits. 💰 $4/год на pod GPU нода = $2-8/год. Один забутий replicaSet = $1500/міс. Scale-to-zero через KEDA — must-have, не оптимізація. Головна теза уроку: K8s для AI — це п'ять речей, яких немає у звичайному backend K8s: GPU scheduling, повільний model load, queue-based autoscaling, спеціалізовані serving runtimes (vLLM/KServe/Triton), cost-aware scale-to-zero. Без них ви просто деплоїте Python-сервіс. З ними — будуєте AI-платформу. 02 · K8s primer — мінімум для AI-інженера Не треба ставати DevOps. Треба розуміти 6 примітивів: Pod, Deployment, Service, Node, ConfigMap, PVC. Спочатку — звідки взагалі взявся \"кластер\" і де всередині нього живуть ці примітиви. 🏗️ Анатомія кластера: дві головні зони 1. Control Plane — \"Центральний офіс\" Мізки нашого суперкомп'ютера. Зазвичай це окрема група надійних серверів, де звичайний код користувачів не запускається. Їхнє завдання — моніторити, приймати рішення та керувати. Хто всередині: - API Server — єдине вікно для команд (kubectl). - etcd — головний блокнот, де записано стан усього кластера. - Scheduler — логіст, який підбирає сервери під задачі. - Controller Manager — наглядач, який стежить, щоб реальність відповідала плану. 2. Worker Nodes — \"Фабричні цехи\" Безпосередньо ті сервери, на яких фізично крутиться твій бізнес-софт, бази даних або AI-моделі. Що більше у тебе користувачів — то більше таких робочих серверів додаєш до кластера. Ноди всередині одного кластера бувають різні: - CPU ноди —
