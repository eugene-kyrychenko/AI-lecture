звичайні та дешеві (для API-шлюзів, черг, сайтів). - GPU ноди — дорогі машини з відеокартами (суворо для інференсу та навчання моделей). На кожній такій ноді обов'язково крутиться kubelet — локальний виконроб, який слухає накази \"Центрального офісу\" та запускає контейнери на своєму залізі. 🏢 Життєва аналогія: будівельна корпорація Уяви велику будівельну компанію. Оце і є кластер. - Control Plane — це Головний офіс компанії у хмарочосі. Там сидить директор (API Server), лежить головний архів із документами (etcd), працює відділ логістики (Scheduler) та відділ внутрішнього аудиту (Controller). Вони самі цеглу не носять і розчин не мішають. - Worker Nodes — це реальні будівельні майданчики в різних частинах міста. На одному майданчику риють легкий котлован (CPU нода), на іншому — будують надскладний міст за допомогою унікальних важких кранів (GPU нода з відеокартами). - Kubelet — це виконроб на кожному конкретному майданчику. Він не знає, які плани у директора на наступний рік, але тримає рацію і чекає команду з Офісу: \"Будуй об'єкт №3\". Він бере своїх робочих (контейнери) і починає будувати. 💡 Головна фішка кластера: якщо один будівельний майданчик (один сервер) затопить або там зникне світло — компанія не збанкрутує. Головний офіс (Control Plane) миттєво побачить це по рації, перенаправить вантажівки на інший майданчик, а робітникам накаже розгорнути роботу там. Для кінцевого клієнта це виглядає так, ніби будівництво (твій AI-сервіс) не зупинялося ні на секунду. Саме в цій синергії багатьох серверів під єдиним жорстким контролем і полягає суть поняття \"кластер\". 🎬 Як Control Plane і Worker Nodes працюють разом ▶ Play ↺ Reset step 0 / 5 [] ▶ Натисни Play — за 30 секунд побачиш як директор (Control Plane) розподіляє роботу між майданчиками (Worker Nodes), і що відбувається коли один майданчик \"затопило\". 📖 Кожен крок анімації — детальний розбір Step 1/5 · Користувач дає команду Що бачимо: ви запускаєте kubectl apply -f deploy.yaml на своєму ноутбуці. YAML описує \"хочу 2 replicas vLLM-сервісу\". Команда летить у Control Plane. Що відбувається технічно: 1. kubectl читає YAML і перетворює на HTTP POST 2. Запит йде на API Server (точка входу кластера) 3. API Server валідує: правильна структура? RBAC дозволяє? namespace існує? 4. Зберігає у etcd як \"desired state\": replicas: 2, image: vllm:v0.6 Cluster State: desired: 2 · actual: 0 — є план, ще нічого не запущено. Step 2/5 · Scheduler розподіляє роботу Що бачимо: з Control Plane вилітають 2 стрілки — на Node-1 і Node-2. Director (Scheduler) вирішив де саме запустити pod-и. Що відбувається технічно: 1. Scheduler \"слухає\" etcd через watch API — бачить 2 нові pod-и без призначення 2. Для кожного перебирає усі ноди кластера і оцінює: GPU вільна? RAM вистачає? nodeSelector збігається? taints дозволяють? 3. Видає рішення: pod-1 → node-1, pod-2 → node-2 (балансування навантаження) 4. API Server передає накази kubelet-ам на обох нодах — \"тягни image\" Cluster State: desired: 2 · actual: 0 (поки image pull триває) Step 3/5 · Здорова рівновага Що бачимо: на Node-1 і Node-2 з'явилися POD · vllm-1 і POD · vllm-2, обидва зелені (Running). Кластер працює, AI-сервіс обробляє запити. Що відбувається технічно: 1. Kubelet-и витягли vLLM image (~10 GB), стартували контейнери 2. Init container завантажив ваги моделі у GPU memory (~60-90 сек) 3. readinessProbe на /v1/models повернула 200 OK 4. Service llama-inference додав обидва pod-и у endpoints — починає роутити трафік Cluster State: desired: 2 · actual: 2 ✓ — рівновага. Це і є цільовий стан, у якому кластер хоче бути. Step 4/5 · 💀 Node-1 ПАДАЄ Що бачимо: Node-1 темніє і отримує червону рамку. Pod на ній вмирає разом з нодою. У події з'являється ⚠ heartbeat lost. Що могло статись: AWS термінує spot-instance, hardware failure, kernel panic, network partition. У реальному проді — буває. Що відбувається технічно: 1. Kubelet на Node-1 пропускає node-status-update у API Server (раз на 10 сек) 2. Через 15 сек без сигналу нода маркується NotReady 3. Усі pod-и на цій ноді (наш pod-1) маркуються як Terminated 4. Controller помічає: \"у etcd desired=2, але live pod-ів лише 1. Розбіжність!\" 5. Controller додає до queue: \"потрібен reconcile\" Cluster State: desired: 2 · actual: 1 ✗ — система знає що зламана. Step 5/5 · ✓ Self-healing у дії Що бачимо: Control Plane активний, стрілка летить до Node-2, на ній додається другий pod. У events: ✓ pod-1' Ready, downtime: 75s (auto), users impacted: 0. Що відбувається технічно: 1. Controller рахує: \"потрібен ще 1 pod\" → створює pod-1' у etcd 2. Scheduler помічає новий unscheduled pod → перебирає ноди → Node-2 має ще вільну GPU → ставить туди 3. Kubelet на Node-2 отримує наказ → тягне image (вже в cache на ноді!) → стартує контейнер 4. Init container перевіряє PVC — модель вже там! Швидкий старт 5. readinessProbe пройде через ~75 сек → Service додає в endpoints → трафік знову балансується Cluster State: desired: 2 · actual: 2 ✓ — рівновагу відновлено автоматично. Ви спали. 🎯 Головний висновок У всьому цьому процесі ви не зробили жодної дії після першого kubectl apply. K8s самостійно: - Розкидав pod-и на різні ноди (balance) - Помітив падіння Node-1 за 15 секунд - Знайшов нову локацію для pod-а - Запустив його з кешу (тому 75 сек, не 5 хв) - Підключив до Service автоматично Це і є \"декларативність + self-healing\" — ви описуєте що хочете (replicas: 2), а K8s сам розбирається як цього досягти і утримувати. Це фундамент усього іншого: KEDA, rolling update, GPU scheduling — це варіації того самого reconciliation pattern. 6 основних примітивів Kubernetes 📦 Pod Що: найменша одиниця деплою — 1 або кілька контейнерів, що ділять мережу й volumes. AI-контекст: один pod = один інстанс inference сервера (наприклад vLLM з 1 GPU). Pod ефемерний — впав і його замінили. Ніколи не звертайтесь до pod IP напряму. 🔁 Deployment Що: декларативна обгортка над Pod-ами. Каже \"хочу 3 копії з таким image\". Сам стежить, щоб їх було 3. AI-контекст: 90% ваших inference сервісів — це Deployment. Тут живуть replicas, rolling update strategy, resource limits, probes. 🌐 Service Що: стабільна \"телефонна книга\" перед pod-ами. DNS-імʼя + load balancer. AI-контекст: ваш API gateway бʼє у llama-svc:8000, а Service вже сам роутить на одну з 3 live replicas. Pod-и помирають — Service адресу не міняє. 🖥 Node Що: фізична або віртуальна машина в кластері. CPU + RAM + (опційно) GPU. AI-контекст: ноди діляться на CPU і GPU. Через nodeSelector ви кажете \"цей pod — тільки на A100 ноду\". Через taint — \"ця GPU нода не пускає нікого крім AI pod-ів\". ⚙ ConfigMap Що: неприватна конфігурація як key-value, монтується в pod як env або файл. AI-контекст: system prompts, model parameters (temperature, max_tokens), feature flags, URL Prometheus-у. Для секретів (HF token, API keys) — окремий ресурс Secret, не ConfigMap. 💾 PVC (PersistentVolumeClaim) Що: \"заявка на диск\" — pod просить X GB сховища, K8s сам видає PV (S3, EFS, EBS, local SSD). Переживає рестарт pod-а. AI-контекст: сюди монтуються ваги моделей (10-100+ GB), HuggingFace cache, vector index. Без PVC модель довелося б тягти з нуля при кожному рестарті. 🔢 Що таке replicas — детально Replica — це одна копія pod-а, створена за тим самим шаблоном (template) у Deployment. Якщо replicas: 3 — K8s тримає 3 ідентичних pod-и, що паралельно обробляють трафік. Service (load balancer) розподіляє запити між ними round-robin. Навіщо взагалі мати кілька реплік: - Throughput — 3 pod-и обробляють у 3× більше запитів паралельно - High availability — один pod впав, інші 2 продовжують працювати, користувач навіть не помітив - Zero-downtime deploys — rolling update замінює replicas по одному; інші тримають трафік - Load balancing across nodes — scheduler розкидає replicas на різні фізичні ноди для відмовостійкості 📦 Приклад: replicas: 3 у дії apiVersion: apps/v1 kind: Deployment metadata: name: llama-inference spec: replicas: 3 # ← хочу 3 копії vLLM pod-а selector: matchLabels: { app: llama } template: # шаблон для всіх 3 replicas metadata: labels: { app: llama } spec: containers: - name: vllm image: vllm/vllm-openai:v0.6.0 resources: limits: { nvidia.com/gpu: 1 } Що відбудеться після kubectl apply: 1. Controller бачить: desired=3, actual=0 → створює 3 pod-и: llama-inference-a1b2, llama-inference-c3d4, llama-inference-e5f6 2. Scheduler розкидає їх на 3 різні GPU-ноди (бо nvidia.com/gpu: 1 уже зайнятий) 3. Service llama-inference бачить 3 endpoints → балансує трафік round-robin 4. Один pod падає → Controller помічає actual=2 → миттєво створює replacement ⚙ Як змінити кількість реплік на льоту # ручне масштабування — без редагування YAML kubectl scale deploy llama-inference --replicas=5 # перевірити поточну кількість kubectl get deploy llama-inference # через Helm (рекомендований шлях) helm upgrade my-llm vllm/vllm --set replicaCount=5 --reuse-values 🎯 Тонкі моменти для LLM: - replicas ≠ безкоштовно. Кожна replica = окрема GPU = $2-4/год. replicas: 10 на 24/7 = $14-29k/місяць. - Не плутайте з autoscaling. replicas: 3 у Deployment — це стартова кількість. Якщо у вас увімкнено HPA/KEDA — autoscaler одразу перевизначить це значення між minReplicas і maxReplicas. - StatefulSet ≠ Deployment. Для inference майже завжди Deployment (replicas взаємозамінні). StatefulSet — для випадків коли pod-и мають identity (наприклад розподілене training). Ієрархія: хто кого містить [] 🎯 Як читати: Cluster містить Node-и (фізичні машини). На GPU-ноді живе Deployment (бажаний стан \"3 копії vLLM\"), який створює Pod-и. Збоку — три ресурси, що \"приєднуються\" до Pod-ів: Service дає стабільну адресу, ConfigMap — конфіг, PVC — диск з вагами моделі. Один pod на CPU-ноді — це API gateway, він не потребує GPU. Запамʼятати одним реченням: Deployment створює Pod-и на Node-ах; Service дає їм стабільну адресу; ConfigMap підкидає конфіг; PVC дає диск для ваг моделі. Все інше (HPA, KEDA, ScaledObject, Helm) — це обгортки навколо цих 6 примітивів. interactive Анатомія AI кластера — клікай на компоненти 👈 Клікни на pod, ноду або сервіс Дізнаєшся за що відповідає компонент і як його налаштовувати під AI-навантаження. Що це за три блоки і навіщо вони 🧠 Control Plane Що це: \"мозок\" кластера. Сам не виконує ваш inference, але керує всім решта. Що всередині: kube-apiserver (точка входу для kubectl/helm), scheduler (вирішує на яку ноду поставити pod), controller-manager (reconciliation: якщо replicas=3 а живих 2 — створює третій). Навіщо AI-інженеру: коли pod у Pending — це scheduler не знайшов ноду з вільною GPU. Коли rolling update — це controller-manager керує заміною pod-ів. 🎮 GPU Node Що це: фізична машина з NVIDIA GPU (тут A100 ×4). Сюди K8s ставить ваші inference pod-и. Що всередині: два vllm-pod (різні replicas одного Deployment, кожен на своїй GPU), nvidia-device-plugin (DaemonSet, який реєструє GPU як K8s ресурс nvidia.com/gpu — без нього scheduler GPU не бачить). Навіщо AI-інженеру: ваше залізо за яке ви платите $2-4/год. Все що тут — повинно ефективно використовувати GPU, бо простоюючий A100 = втрачені гроші. ⚙ CPU Node Що це: звичайна нода без GPU — дешевша на порядок. Що всередині: api-gateway (FastAPI proxy перед vLLM: auth, rate limiting, OpenAI-сумісний формат), redis-queue (черга запитів — KEDA читає її довжину щоб масштабувати GPU pod-и), prometheus (метрики з vLLM: queue size, GPU util, TTFT). Навіщо AI-інженеру: вся \"обвʼязка\" навколо моделі — gateway, queue, observability — не потребує GPU. Тримайте її окремо щоб не марнувати дорогі A100 на nginx. Чому ці три блоки розділені: Control Plane має бути ізольованим і стабільним — падіння apiserver призводить до недоступності всього кластера. GPU Node-и резервуються виключно під GPU-pod-и через nodeSelector + taint, аби дорогі ресурси не використовувалися випадковими CPU-навантаженнями. CPU Node-и хостять решту інфраструктури — вони чисельні, дешеві й легко масштабуються. Це базовий cost-aware дизайн будь-якої production AI-платформи. Базовий маніфест inference сервісу apiVersion: apps/v1 # версія K8s API для цього типу обʼєкта kind: Deployment # тип ресурсу: Deployment керує групою однакових pod-ів metadata: name: llama-inference # імʼя обʼєкта в namespace — за ним звертаємось у kubectl spec: # spec = \"бажаний стан\", K8s сам приводить реальність до нього replicas: 3 # кількість живих pod-ів. KEDA/HPA можуть це перевизначати selector: # за якими labels Deployment \"впізнає\" свої pod-и matchLabels: app: llama # має співпадати з labels у template нижче template: # шаблон pod-а — з нього клонуються усі replicas metadata: labels: app: llama # label на pod-i; за ним Service знаходить ці pod-и spec: # spec самого pod-а nodeSelector: # фільтр: pod ставимо тільки на ноди з потрібним label accelerator: nvidia-a100 # без цього scheduler ткне pod на CPU-ноду → OOM containers: # список контейнерів у pod-i (зазвичай один основний) - name: vllm # імʼя контейнера, видно у `kubectl logs -c vllm` image: vllm/vllm-openai:v0.6.0 # Docker image; pin тег, не latest — для відтворюваності args: [\"--model\", \"meta-llama/Llama-3-8B\"] # CLI-аргументи vLLM: яку модель тягнути з HuggingFace resources: # обмеження ресурсів — без них pod може зʼїсти всю ноду limits: # верхня межа: понад це K8s вбʼє/throttle-не контейнер nvidia.com/gpu: 1 # 1 ціла GPU на pod (вимагає NVIDIA device plugin на ноді) memory: \"32Gi\" # RAM ліміт: ваги моделі + KV cache + overhead readinessProbe: # probe для Service: pod отримує трафік тільки коли \"passed\" httpGet: { path: /health, port: 8000 } # K8s періодично GET-ить цей URL initialDelaySeconds: 120 # чекаємо 120 сек ПЕРШ ніж починати probe — модель грузиться periodSeconds: 10 # далі — пробуємо кожні 10 секунд ⚠ Ключове: nvidia.com/gpu: 1, nodeSelector на GPU-ноду, і initialDelaySeconds: 120 у readinessProbe. Без цих трьох рядків — це не AI-сервіс, це CPU-сервіс що впаде через 5 секунд. 03 · Rolling update з model load probe — як не зловити 502 Це найболючіша різниця між web-сервісом і LLM-сервісом. Web pod готовий за 2 сек. LLM pod завантажує модель 90 сек, всі ці 90 секунд порт відкритий, але inference впаде з помилкою. Без правильного probe Kubernetes думає що pod ready, замінює старий — і запити дропаються. 🩺 Що таке readinessProbe (і чому це не те саме, що livenessProbe) readinessProbe — це \"чи готовий цей pod приймати трафік прямо зараз?\". K8s періодично (наприклад кожні 5 сек) робить HTTP-запит на endpoint всередині контейнера. Поки probe не повертає 200 OK — Service НЕ роутить запити на цей pod. Pod залишається в стані Running 0/1 Ready. Як це виглядає у YAML: readinessProbe: httpGet: path: /v1/models # який URL смикати port: 8000 initialDelaySeconds: 60 # чекати 60 сек ПЕРЕД першим запитом (модель грузиться) periodSeconds: 5 # далі — пробувати кожні 5 сек failureThreshold: 30 # 30 невдалих підряд = \"цей pod зламаний\" timeoutSeconds: 3 # кожен запит має відповісти за 3 сек 📊 readiness vs liveness vs startup — три probes, три ролі 🚦 readinessProbe Питання: \"чи я готовий приймати трафік зараз?\" Якщо fails: pod лишається живий, але видаляється з Service endpoints — трафік на нього не йде. Через секунду після успіху — повертається назад. AI use case: модель грузиться 90 сек — readiness тримає pod \"невидимим\" поки /v1/models не верне 200. Без цього перші запити = 500. 💀 livenessProbe Питання: \"чи я взагалі живий, чи зависнув?\" Якщо fails: K8s вбиває контейнер і рестартує його (CrashLoopBackOff). Радикальніше за readiness. AI pitfall: якщо liveness занадто агресивна (period=10s, threshold=3) — pod вбʼється під час повільного inference batch-у. Робіть period 30+ сек, threshold 5+. 🐣 startupProbe Питання: \"чи я взагалі вже стартонув?\" Якщо fails: те саме що liveness — рестарт. Але під час startupProbe liveness НЕ працює — дає час на повільний boot. AI use case: завантаження 70B моделі 5 хв — startupProbe з failureThreshold:60 + period:10 = 10 хвилин на boot, і тільки потім liveness починає тиснути. 🎯 Як це працює разом для LLM pod-а: 1. startupProbe чекає поки модель завантажиться у GPU memory (до 5 хв) — liveness/readiness заглушені. 2. Як тільки startup пройшов — вмикається readinessProbe: Service починає роутити запити на pod. 3. Паралельно крутиться livenessProbe з мʼякими таймаутами — рестарт лише якщо процес реально завис. Симулятор — порівняння двох стратегій Нижче — два режими ролл-ауту з v1 на v2. Safe вмикає readinessProbe з 120-секундним очікуванням model load. Naive вважає pod готовим одразу як стартував порт. Дивись на лічильник \"Dropped requests\" — це реальні юзери, що отримали 500. interactive Симулятор rolling update: 3 pod-и, версія v1 → v2 ▶ Safe rollout (з readinessProbe) ⚠ Naive rollout (без probe) ↺ Reset Time elapsed 0s Ready (v1) 3 Ready (v2) 0 Dropped requests 0 Чому naive rollout дропає запити Якщо readinessProbe просто перевіряє port:8000 — pod помічається Ready одразу як стартував FastAPI. Старий pod видаляється. Запит приходить — модель ще не у GPU memory — 500 Internal Server Error. Користувач бачить помилку. Production-ready rollout spec: strategy: type: RollingUpdate rollingUpdate: maxSurge: 1 # один зайвий pod дозволено maxUnavailable: 0 # ЖОДНИЙ старий pod не падає поки новий не ready template: spec: terminationGracePeriodSeconds: 90 # дати завершити in-flight inference containers: - name: vllm lifecycle: preStop: exec: { command: [\"sh\",\"-c\",\"sleep 15\"] } # дати Service деревгистрації readinessProbe: httpGet: { path: /v1/models, port: 8000 } # НЕ /health! initialDelaySeconds: 60 periodSeconds: 5 failureThreshold: 30 # 30 × 5s = 150 сек на завантаження 3 правила rolling update для LLM: 1. maxUnavailable: 0 — без цього у вас завжди буде < replicas pod-ів готових. 2. readinessProbe має бити справжній inference endpoint (/v1/models, /generate), не /health. 3. terminationGracePeriodSeconds: 60+ + preStop sleep 15 — дати завершити запити, що в польоті. 04 · Helm — package manager для AI-стеку Один inference сервіс = Deployment + Service + ConfigMap + HPA + ServiceMonitor + Ingress + PVC. Це 6-7 YAML файлів. Помножте на 3 environments (dev/stage/prod) = 21 файл. Helm дозволяє винести все у параметри і деплоїти одним helm install. 📊 Without Helm vs With Helm — візуально [] Як читати: зліва — звичайний \"DevOps fights YAML\" workflow, де при зміні параметра треба ручне copy-paste по 3 environments. Справа — Helm: один Common Chart (шаблон) + три values.yaml файли (тільки відмінності між env). helm install рендерить шаблон + values → отримуємо унікальні маніфести для кожного environment. Зміна — це один рядок у потрібному values.yaml. 🎯 Навіщо взагалі потрібен Helm Helm — це npm / pip для Kubernetes. Один chart = шаблон ваших K8s-маніфестів + файл параметрів values.yaml. Замість того щоб тримати десятки YAML-ів у git і копіювати-вставляти між environments, ви ставите одну команду: # vLLM з 70B моделлю на 4 GPU у production helm install my-llm vllm/vllm \\ --namespace ai-prod \\ --set model.name=meta-llama/Llama-3-70B \\ --set replicas=3 \\ --set resources.limits.\"nvidia\\.com/gpu\"=4 # все: створились Deployment + Service + ConfigMap + PVC + HPA + Ingress 😩 До Helm vs 🎉 з Helm 😩 БЕЗ Helm — YAML-пекло - 7 окремих YAML файлів у репо - × 3 environments = 21 файл з 90% дублікатом - Зміна тегу image → правити в 3 місцях, легко забути - Rollback = git revert + kubectl apply у правильному порядку, з ризиком зламати залежності - Установка vLLM \"з нуля\" = год часу на копіювання з блогів - Жодного версіонування — \"що було деплойнуто 2 тижні тому?\" відповіді нема 🎉 З Helm — DRY і керовано - 1 chart (шаблон) + 3 values-файли на environment - Зміна тегу — в одному рядку values-prod.yaml - helm rollback my-llm 3 — і ти на 3-й попередній версії за 5 секунд - Установка vLLM = одна команда: helm install vllm vllm/vllm - Кожен деплой — версіонований release у history (helm history) - Можна шарити чарти з командою через приватний registry (Harbor, ECR, ChartMuseum) 💰 Конкретна користь: реальний кейс Сценарій: ваша AI-команда має 3 моделі (Llama, Mistral, embedder) × 3 environments. Без Helm: 9 deployments × 7 файлів = 63 YAML-и у репо. Половина — дублікати. З Helm: 3 чарти + 9 values-файлів = 21 файл. Усі параметри (модель, GPU count, replicas, autoscaling-пороги) у values. Pull request \"оновити Llama з v0.6 на v0.7\" — це зміна одного рядка, а не 21-го. Реальна економія часу AI-інженера: 2-4 години на тиждень не йдуть на copy-paste YAML і фіксинг конфіг-дрифту між envs. Це той самий час, який можна вкласти у training, eval, оптимізацію latency. Чому AI-інженеру треба знати Helm 📦 Готові чарти vLLM, KServe, Ollama, LangServe, BentoML, Triton — усі поставляються як Helm chart. Ти їх не пишеш, ти їх конфігуруєш. 🔄 Rollback в один клік helm rollback my-llm 3 — і ти на попередній версії моделі. Без копання у git, без kubectl apply. 📐 DRY environments Один chart + values-dev.yaml + values-prod.yaml. Різниця між environment-ами видна одним diff. live yaml Helm values.yaml playground — крути значення, дивись що генерує helm model.name replicaCount 3 resources.gpu 1 autoscaling.enabled true autoscaling.minReplicas 1 autoscaling.maxReplicas 10 model.dtype bfloat16 float16 float32 int8 💡 Крути повзунки → справа оновлюється фінальний YAML і команда helm install 📋 Copy 📖 Що означає кожен параметр 📝 model.name HuggingFace repo з вагами моделі (формат org/model-name). vLLM сам тягне ваги з HF Hub при першому старті pod-а. Приклади: meta-llama/Llama-3-8B, mistralai/Mistral-7B, Qwen/Qwen2.5-72B. Для приватних моделей — додатково треба HF_TOKEN через Secret. 🔢 replicaCount Скільки копій pod-а (= скільки GPU зайнято) стартує одразу. 3 = по pod-у на кожну з 3 GPU нод. Це нижня межа потужності — навіть якщо трафіку нема, ці 3 replicas крутяться. Якщо autoscaling.enabled: true, цей параметр стає початковим значенням, а далі KEDA сама керує. 🎮 resources.gpu Скільки GPU виділити одному pod-у (через nvidia.com/gpu: N). 1 — стандарт для 7-8B моделей. 2-4 — для 70B+ з tensor parallelism. 0 — CPU-only режим (для embedding-моделей або dev). Pod не стартує якщо на нодах немає такої кількості вільних GPU. ⚖ autoscaling.enabled Вмикає динамічне масштабування через HPA/KEDA. Якщо false — replicas жорстко = replicaCount, нічого автоматично не змінюється. Якщо true — Helm chart створює додатково ScaledObject або HorizontalPodAutoscaler з порогами нижче. 📉 autoscaling.minReplicas Нижня межа при autoscale. 0 = scale-to-zero (pod вимикається коли немає трафіку, економія GPU $$$, але cold start 1-3 хв). 1 = завжди є warm pod, перший запит обробляється швидко. Для prod LLM зазвичай 1, для batch jobs — 0. 📈 autoscaling.maxReplicas Верхня межа при autoscale — захист від нескінченного scale-up. Якщо щось зламається у тригері і KEDA попросить 1000 replicas — ви заплатите за 1000 × $3/год. 10 — типовий ліміт для inference сервісу. Завжди коректуйте з GPU quota вашого cloud-провайдера. 🎯 model.dtype — точність ваг моделі (це окрема велика тема) Тип даних, у якому ваги зберігаються у GPU memory. Прямий trade-off між якістю / швидкістю / памʼяттю. dtype Розмір ваг 8B моделі Якість Коли брати --------------------- ---------------------- -------- ----------------------------------------------------------------------------------------------------------------------------------- bfloat16 16 GB повна Дефолт для prod LLM. Той самий range як float32, але вдвічі менший. Підтримується усіма сучасними GPU (A100, H100, RTX 30/40) float16 16 GB повна* Старіший fp16. Може мати overflow на extreme values. Беріть якщо ваша GPU не підтримує bf16 (старі T4) float32 32 GB еталон Тільки для training/fine-tuning. Для inference — марнотратно. Pod не вліз у одну A100 int8 (quantization) 8 GB ~98% Quantization. Вдвічі менше VRAM, ~2× faster. Якість падає на 1-3%. Беріть якщо хочете влізти у меншу GPU або підвищити throughput Правило: default — bfloat16. Тісно з VRAM або потрібен throughput — int8 (через AWQ / GPTQ). float32 для inference не використовується ніколи. 🧪 Що покрутити в playground: постав replicaCount: 5, gpu: 2, maxReplicas: 20 — побачиш як YAML розростається, і команда helm install підхоплює всі --set прапори. Так ви тестуєте config перш ніж деплоїти у прод — без жодних YAML-помилок. 05 · HPA vs KEDA — чому CPU-метрика не відображає реального навантаження LLM HPA з коробки масштабує за CPU utilization. Для LLM inference ця метрика втрачає кореляцію з фактичним навантаженням: CPU перебуває в межах 5-15%, тоді як GPU завантажена на 95%, а у черзі накопичується 200 запитів із середньою латентністю 30 секунд. HPA не отримує сигналу до масштабування. KEDA натомість інтегрується з Prometheus, RabbitMQ, Redis та іншими джерелами і приймає рішення на основі релевантних показників: глибини черги, GPU utilization, p95-латентності. 📚 Терміни перед симулятором — щоб слайдери мали сенс 📉 HPA (Horizontal Pod Autoscaler) Що це: рідний механізм K8s для автомасштабування. Стежить за CPU або memory utilization pod-ів і змінює replicas щоб тримати метрику біля заданого порогу (наприклад 70%). Як працює: кожні 15 секунд опитує metrics-server, рахує середнє по pod-ах, ухвалює рішення. Реактивний — спочатку має побачити проблему у метриці, тоді скейлить. Слабке місце для LLM: CPU 5-15% поки GPU перевантажена — HPA не бачить сигналу і не масштабує. 📈 KEDA (Kubernetes Event-Driven Autoscaler) Що це: CNCF-проєкт, надбудова над HPA. Дозволяє масштабувати за довільними метриками: довжина черги Redis/Kafka, GPU utilization з Prometheus, p95-латентність, події з S3/SQS, навіть cron-розклад. Як працює: ScaledObject описує тригери. KEDA опитує джерело кожні N секунд і змушує HPA масштабувати pod-и. Підтримує scale-to-zero (replicas=0 коли немає подій). Сильне місце для LLM: бачить queue depth і реагує до того як latency пробʼє стелю. 🔧 Що означає кожен слайдер у симуляторі 🌊 Incoming RPS Requests Per Second — скільки HTTP-запитів на ваш inference сервіс приходить щосекунди. 200 RPS = 720 000 запитів/год. Реальний бенчмарк: один vLLM pod з Llama-8B на A100 дає 30-80 RPS при середньому prompt-і. Тобто 200 RPS = щонайменше 3-7 pod-ів. ⏱ Per-request latency (ms) Скільки часу займає один inference (генерація відповіді). LLM непередбачувані: короткий prompt → 200 ms, довгий context + 500 output tokens → 5+ секунд. Слайдер дозволяє відчути як latency накопичує чергу: при 200 RPS і latency 1 секунда — кожен pod обробляє лише 1 RPS, інші 199 чекають. 🐢 Scale-up delay (HPA, sec) За скільки HPA реагує на зміну метрики. За дефолтом — 15 сек polling + 3 хв stabilization window = реакція 3+ хв. Для LLM з cold start 60 сек це смертельно: поки HPA \"думає\", черга з 1000 запитів вже виросла. KEDA опитує метрики кожні 15 сек і без stabilization вікна — реагує миттєво. 📊 Метрики які бачите під графіками 📦 Replicas Поточна кількість живих pod-ів inference сервісу. Кожен replica = одна GPU = ~$3/год. Це і є те, чим керує autoscaler — більше реплік = більше throughput, але більше $$. 💻 CPU % Середня утилізація CPU по pod-ах. У LLM workload — це оманлива метрика: token generation відбувається в GPU, CPU простоює. Симулятор показує що CPU може бути 95%, а може 8% — і обидва варіанти не корелюють з реальним навантаженням. 📥 Queue depth Скільки запитів чекає у черзі на обробку (ще не почали процеситись). У vLLM є вбудована метрика vllm_request_queue_size. Це чесний показник навантаження: queue росте → треба більше pod-ів. KEDA читає саме це. 📈 p95 latency 95-й перцентиль часу відповіді: 95% запитів швидші за це число, 5% — повільніші. Краще за середнє (mean) — показує реальний user pain. Якщо p95 = 4800 мс, значить 1 з 20 юзерів чекає 5 секунд. SLO зазвичай ставлять саме на p95 / p99. 🎯 Що покрутити у симуляторі: постав RPS = 600, latency = 2000 ms — HPA довго не реагує (CPU не росте достатньо), KEDA масштабує одразу. Дивись на колонку cost: KEDA дешевше за рахунок scale-to-zero, але якщо трафік стабільний — HPA може бути на одному рівні витрат. live sim Симулятор: 1000 RPS приходить, HPA реагує по CPU, KEDA — по queue ▶ Start traffic ⏸ Pause ↺ Reset Incoming RPS 200 req/s Per-request latency (ms) 800 ms Scale-up delay (HPA, sec) 60s 📉 HPA (CPU-based) reactive Replicas:3 CPU %:12% Queue depth:0 p95 latency:0 ms 📈 KEDA (queue-based) predictive Replicas:1 CPU %:12% Queue depth:0 p95 latency:0 ms 💸 HPA cost (GPU $/min running) $ 0.00 💰 KEDA cost (з scale-to-zero) $ 0.00 ⚙ Графіки: рожева лінія — replicas, жовта — queue depth, блакитна — RPS. KEDA встигає за чергою, HPA з затримкою наздоганяє по CPU. KEDA вміє scale-to-zero (replicas=0 коли немає трафіку). KEDA ScaledObject — приклад для LLM apiVersion: keda.sh/v1alpha1 # CRD групи KEDA — встановлюється Helm-чартом kedacore/keda kind: ScaledObject # головний обʼєкт KEDA: \"що масштабувати + за яким сигналом\" metadata: name: llama-scaler # імʼя ресурсу в namespace; `kubectl get scaledobject llama-scaler` spec: scaleTargetRef: # на що ми \"чіпляємо\" KEDA (зазвичай Deployment) name: llama-inference # точне імʼя вашого Deployment — KEDA керуватиме його replicas minReplicaCount: 0 # 🔥 НИЖНЯ МЕЖА. 0 = scale-to-zero: коли немає трафіку — pod вимикається повністю, # економія $$$. Trade-off: перший запит чекатиме 1-3 хв (cold start моделі). # Для critical prod LLM зазвичай ставлять 1 (warm pod завжди живий). maxReplicaCount: 20 # 🛡 ВЕРХНЯ МЕЖА. Захист від runaway scale-up: якщо метрика \"збожеволіла\" # і KEDA попросить 1000 replicas — ви не отримаєте рахунок $$$. # Завжди коректуйте з GPU quota cloud-провайдера (AWS/GCP). cooldownPeriod: 300 # ⏳ скільки секунд НЕ скейлити вниз після останнього \"scale-up signal\". # 300 (5 хв) — на випадок коротких пауз у трафіку: не вимикати дорогий pod # якщо через 30 сек прийде новий запит. У проді ставлять 300-600. pollingInterval: 15 # 🔍 як часто KEDA опитує метрики (у секундах). 15 — дефолт і good middle ground. # Менше = швидша реакція, але більше навантаження на Prometheus. Більше = lag. triggers: # 📡 ДЖЕРЕЛА СИГНАЛІВ. Можна кілька — KEDA бере МАКСИМУМ потрібних replicas (OR-логіка) - type: prometheus # тригер #1 — читаємо метрику з Prometheus (один з ~70 scalers KEDA) metadata: serverAddress: http://prometheus:9090 # DNS-адреса Prometheus у кластері (namespace/service) metricName: vllm_queue_size # внутрішнє імʼя метрики для HPA (з'являється у `kubectl describe hpa`) query: avg(vllm_request_queue_size{app=\"llama\"}) # PromQL-запит: # середня кількість запитів у черзі по всіх pod-ах сервісу. # Це vLLM-метрика \"скільки запитів чекає обробки прямо зараз\". threshold: \"5\" # 🎯 ЦІЛЬ. KEDA рахує: replicas = ceil(currentValue / threshold). # Тобто \"тримай в середньому ≤5 запитів у черзі на pod\". # Якщо в черзі 50 → треба 10 replicas. Якщо 0 → можна 1 (або 0 з cooldown). - type: prometheus # тригер #2 — fallback на GPU utilization (від NVIDIA DCGM exporter) metadata: metricName: gpu_util query: avg(DCGM_FI_DEV_GPU_UTIL) # середня GPU utilization (0-100%) по всіх pod-ах threshold: \"80\" # якщо GPU avg перевищує 80% — scale up. # Корисно коли queue ще порожня, але один запит вантажить GPU на 100% # (наприклад довга generation з 4K-токеновим output). Економічний підсумок: GPU нода коштує $2-4/год. 3 replicas × 24 год × 30 днів = $4 320/міс навіть якщо вночі трафік 0. KEDA з minReplicaCount: 0 + cold start через model cache на S3 = реальна економія тисяч доларів на місяць. 06 · GPU scheduling — те, що відрізняє AI K8s K8s \"з коробки\" знає про CPU і RAM. Про GPU — ні. NVIDIA Device Plugin (DaemonSet) реєструє GPU як ресурс nvidia.com/gpu. Далі — три патерни: ціла GPU на pod, MIG (фізично розділена GPU на 7 інстансів), time-slicing (поди ділять GPU по черзі). gpu sched Schedule pods на ноди — дивись як scheduler розподіляє ресурси + LLM pod (1 GPU) + Small pod (MIG slice) + Pod без nodeSelector ⚙ Enable MIG on Node 2 ↺ Reset 🎯 LLM pod займає цілу GPU. MIG ділить 1 GPU A100 на 7 ізольованих інстансів — для маленьких моделей. Pod без nodeSelector потрапить на CPU-ноду і впаде з помилкою no GPU available. 3 патерни GPU sharing 🎯 Whole GPU nvidia.com/gpu: 1. Один pod — одна GPU. Найпростіше, найдорожче. Для великих моделей (Llama 70B, Mixtral) — обовʼязково. 🔪 MIG (Multi-Instance GPU) Тільки A100 / H100. Фізично ділить GPU на 7 slice-ів. Кожен slice ізольований (свій SM, своя памʼять). Запит у pod: nvidia.com/mig-1g.10gb: 1. ⏱ Time-slicing 1 GPU видно як N логічних (наприклад 4). Pod-и ділять GPU по черзі (як CPU). Для dev/test. Не для prod latency-critical — час відгуку плаває. Налаштування GPU-нод # 1. Поставити NVIDIA Device Plugin (DaemonSet) kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/main/deployments/static/nvidia-device-plugin.yml # 2. Перевірити що ноди бачать GPU kubectl get nodes -o json | jq '.items[].status.allocatable[\"nvidia.com/gpu\"]' # 3. Лейбли + taints — щоб не-AI pod-и не їли GPU kubectl label node gpu-node-1 accelerator=nvidia-a100 kubectl taint node gpu-node-1 nvidia.com/gpu=true:NoSchedule # 4. У pod-i: tolerate taint + node selector spec: nodeSelector: accelerator: nvidia-a100 tolerations: - key: \"nvidia.com/gpu\" operator: \"Exists\" effect: \"NoSchedule\" containers: - resources: limits: { nvidia.com/gpu: 1 } Pitfall: якщо забути taint на GPU-нодах, K8s буде заповнювати їх звичайними web-pod-ами (бо у них немає nodeSelector). Ваш дорогий A100 буде хостити nginx. Taint + tolerations — обовʼязковий захист. 07 · Serving frameworks — vLLM, KServe, Triton, Ray Serve Не пишіть inference server з нуля. У 2026 році це готові фреймворки на K8s з Helm чартами, оптимізацією для GPU, batching, streaming. Вибір залежить від того, скільки моделей і яка складність пайплайнів. 🤔 Що таке \"serving framework\" простими словами Serving framework — це готовий HTTP/gRPC сервер, що розгортається у Kubernetes-кластері як standalone-компонент. Замість самостійної реалізації inference-шару на FastAPI з прямим завантаженням ваг через transformers, інженер використовує попередньо зібраний контейнерний образ (наприклад vllm/vllm-openai:v0.6.0) і декларує цільову модель (наприклад Llama-3-8B) через конфігураційні параметри. Сервер автоматично виконує: - Тягне ваги моделі з HuggingFace - Завантажує їх у GPU memory - Виставляє OpenAI-сумісний API (/v1/chat/completions) або власний - Робить continuous batching — оптимізує обробку паралельних запитів - Підтримує streaming (SSE, token-by-token) - Експортує Prometheus-метрики (queue size, throughput, p95) - Має готовий Helm chart для деплою у K8s Ви не пишете жодного рядка inference-коду. Ви конфігуруєте чужий, але дуже добре зроблений сервер. 📋 Коли ви обовʼязково повинні брати serving framework ✅ Production LLM API Якщо ваш сервіс приймає >10 RPS, має SLA на latency, або користувачі ззовні компанії — vLLM/Triton/TGI обовʼязково. Самописна FastAPI обробка дасть вам у 10-24× гірший throughput і нестабільну p95. ✅ Multi-tenant платформа 10+ команд деплоять різні моделі. Без KServe (governance, canary, RBAC) керування перетвориться на хаос YAML-конфігурацій і нерозвʼязне питання \"як викотити нову версію не зламавши залежні команди\". ✅ Pipeline з кількох моделей RAG (embedder → vector search → reranker → LLM) або CV+OCR+LLM. Ray Serve / Triton роблять оркестрацію всередині, не треба городити мікросервіси на кожен крок. ✅ Потрібен OpenAI-сумісний API Якщо клієнти вже використовують openai.ChatCompletion — vLLM даs drop-in заміну. Поміняти base_url у клієнті — і ваш Llama працює там, де раніше був GPT-4. Самописний API такого не дасть. ✅ GPU shared between моделями Triton дозволяє кілька різних моделей жити на одній GPU з dynamic batching. Без нього кожна модель = окремий pod = окрема GPU = $$$. На MIG-нодах це must-have. ✅ Потрібен streaming SSE Якщо UI показує токени по мірі генерації (як ChatGPT) — serving framework робить це з коробки. Самописний FastAPI streaming з vanilla transformers — це біль і memory leaks. ⚖️ Коли можна не брати serving framework ⚠ Прототип / PoC / Jupyter Якщо ви ще не знаєте чи модель взагалі рішає задачу — model.generate() у Jupyter досить. Не оптимізуйте передчасно. Serving framework приходить коли ви вже знаєте що деплоїте у прод. ⚠ Internal tool, <1 RPS Чат-бот для 20 інженерів компанії з 5 запитами на день — навіть Ollama overkill. FastAPI + transformers на одній GPU-машині працює без проблем. ⚠ Дуже кастомна логіка inference Якщо inference — це не \"prompt → text\", а \"prompt + RAG + 5 tool calls + custom logits processor\" — стандартний vLLM API може не вистачити. Ray Serve або власний FastAPI поверх vLLM Python API. 🎯 Decision tree — що брати під ваш випадок 1 LLM, потрібна максимальна швидкість? → vLLM (або TensorRT-LLM якщо тільки NVIDIA і потрібен absolute max). Кілька моделей різних фреймворків (PyTorch + ONNX + sklearn)? → KServe (governance, canary) або Triton (multi-model на одній GPU). RAG / agents / chain з кількох кроків? → Ray Serve — composition прямо у Python, autoscaling кожного кроку окремо. Локальна розробка / dev environment / edge? → Ollama (працює навіть на Mac). Composable Python-сервіс з business логікою? → BentoML або LitServe. 📊 Що ви отримуєте з коробки — список фіч Framework Сильна сторона Коли брати K8s інтеграція ----------- ------------------------------------------------------------------- ----------------------------------------------------------- -------------------------------------------- vLLM PagedAttention, найкращий throughput для LLM, OpenAI-сумісний API 1 LLM, треба максимальна пропускна здатність helm install vllm, OpenAI API endpoint KServe Multi-framework (HF, sklearn, XGB), canary rollouts, serverless 10+ різних моделей, governance, A/B тести Knative-based, scale-to-zero вбудовано Triton NVIDIA-native, ensemble моделей на одній GPU, dynamic batching Pipeline моделей (CV → OCR → LLM), MIG sharing NVIDIA Operator, готовий чарт Ray Serve Python-first, складні pipelines (RAG, agents), dynamic batching Custom inference з бізнес-логікою, RAG, multi-step agents KubeRay Operator, autoscaling per replica Ollama Найпростіша установка, GGUF моделі Internal tools, dev/staging, edge GPU Helm chart, але без prod-grade autoscaling BentoML Python-first, async, multi-model Композитні сервіси (embedder + LLM в одному pod) Yatai operator, custom autoscaler 🧠 Що таке PagedAttention — головна \"магія\" vLLM Коротко: PagedAttention — це техніка управління KV-cache (key-value cache) у GPU memory, запозичена з ідеї віртуальної памʼяті ОС. Дозволяє vLLM обробляти у 2-24× більше запитів паралельно на тій самій GPU, ніж класичні HuggingFace transformers. 📦 Що таке KV-cache і чому це важливо: - Під час генерації кожного нового токена LLM \"пригадує\" попередні токени через attention. Щоб не рахувати їх знову — kлючі та значення (K, V) attention зберігаються у GPU memory. Це і є KV-cache. - Для 8B моделі один запит з context 2K токенів = ~2-4 GB KV-cache. Для 10 паралельних запитів — 20-40 GB. - KV-cache часто більший за самі ваги моделі. На цьому \"ламається\" наївне batching. 💥 Проблема \"класичного\" inference: - Кожному запиту виділяється безперервний блок GPU memory під максимально можливий context (наприклад 4K токенів). - Запит має лише 500 токенів → 3500 токенів памʼяті простоюють (internal fragmentation). - В сумі: 60-80% GPU memory витрачено на повітря, паралельно влізає 3-5 запитів замість 30. ✨ Як PagedAttention рятує — аналогія з ОС: - Памʼять ділиться на фіксовані блоки (pages) — наприклад по 16 токенів. Як сторінки в ОС. - Запит отримує блоки динамічно по мірі генерації, не зарезервовано наперед. - Блоки можуть бути розкидані у памʼяті, як сторінки процесу — спеціальна таблиця (block table) тримає мапу \"логічний блок → фізичний\". - Завершився запит → блоки вертаються в пул. Внутрішня фрагментація < 4% (vs 60-80%). 📊 PagedAttention vs наївний inference — цифри Метрика HF transformers (наївно) vLLM з PagedAttention Виграш -------------------------------------- -------------------------- ----------------------- -------- Memory utilization 20-40% (60-80% повітря) 96%+ ефективно ~2-3× Concurrent requests (Llama-7B, A100) 3-5 30-60 ~10× Throughput (tokens/sec) ~500 ~12000 ~24× p50 latency 1200 ms 800 ms 1.5× Cost per million tokens $8-12 $0.3-0.5 ~24× 🎯 Що це означає для K8s-деплою: один pod з vLLM + PagedAttention робить роботу 24-х pod-ів з наївним inference. Це прямий вплив на cost: замість 24 GPU за $72/год — одна GPU за $3/год. Не пишіть свій inference server. vLLM (або похідні: SGLang, TensorRT-LLM, TGI) — це безкоштовна оптимізація, на яку працювали тисячі інженерів. PagedAttention — головна причина чому vLLM став дефолтом у 2024-2026. 🔧 Як це виглядає в YAML apiVersion: apps/v1 kind: Deployment spec: template: spec: containers: - name: vllm image: vllm/vllm-openai:v0.6.0 args: - \"--model\" - \"meta-llama/Llama-3-8B\" - \"--gpu-memory-utilization\" - \"0.95\" # 🎯 виділити 95% GPU memory під vLLM (KV-cache хоче простір) - \"--max-num-seqs\" - \"64\" # 🚀 максимум 64 паралельних request-и на pod (завдяки PagedAttention) - \"--block-size\" - \"16\" # розмір \"сторінки\" KV-cache у токенах (16 — дефолт, рідко змінюють) resources: limits: { nvidia.com/gpu: 1 } 🎯 Один LLM → vLLM Якщо ваш use case: \"хочу OpenAI API але self-hosted\" — це vLLM. PagedAttention дає 24× throughput vs HF transformers. Helm + values.yaml + готово. 🏢 10+ моделей → KServe Multi-tenant, multi-framework. Canary deploys (90/10 traffic split), drift detection, scale-to-zero вбудовано. ML platform для команди 5+ людей. 🧬 RAG + agents → Ray Serve Коли inference — це pipeline: embed → vector search → rerank → LLM. Ray Serve дозволяє composition прямо у Python з autoscaling кожного кроку окремо. 08 · Storage для моделей — bake, mount, download? Llama-3-8B = 16 GB ваг. Llama-3-70B = 140 GB. Llama-3-405B = 800 GB. Куди це класти? У docker image (повільний pull)? PVC з S3 backend (швидко, але дорого)? Init container з download з HF Hub (просто, але повільно)? Три патерни, кожен зі своїми trade-off. 🥖 Bake into image Ваги моделі копіюються в Docker image під час build. FROM vllm:base COPY model/ /opt/model → image 25 GB ✓ Reproducible, версія моделі = версія image ✗ Push 25 GB у registry, slow scale-up, image bloat 📦 PVC (S3 / EFS mount) Модель на shared volume, pod монтує її як /models. PVC: s3-csi-driver volumeMounts: - /models → image 1 GB, ваги окремо ✓ Image маленький, ваги шарені між pod-ами ✗ S3 mount latency, cold start читає 16 GB з network ⬇ Init container download Init container тягне модель з HF Hub / S3 у emptyDir. initContainers: - hf-downloader → pod стартує 3-5 хв ✓ Простота, image малий, гнучкість моделей ✗ HF rate limits, повільний cold start, network bill Гібрид: model cache на нодах (production-ready) У реальному проді найчастіше комбінують: S3 як source of truth, local SSD на ноді як cache (DaemonSet preload), init container перевіряє cache → копіює локально → монтує в pod. Pod стартує за 10 секунд замість 3 хвилин. spec: volumes: - name: model-cache hostPath: { path: /var/cache/models, type: DirectoryOrCreate } - name: s3-models persistentVolumeClaim: { claimName: s3-models-pvc } initContainers: - name: cache-warmer image: rclone/rclone:latest command: [\"sh\",\"-c\",\" if [ ! -f /cache/llama-3-8b.bin ]; then rclone copy s3:models/llama-3-8b/ /cache/ --transfers=8 fi \"] volumeMounts: - { name: model-cache, mountPath: /cache } - { name: s3-models, mountPath: /s3 } containers: - name: vllm volumeMounts: - { name: model-cache, mountPath: /models, readOnly: true } 09 · Реальний use case — 8-нодовий LangGraph multi-agent на K8s Розглянемо production-grade сценарій: AI-стартап обробляє 1000+ PDF-документів на день (інвойси, договори, фінансові звіти). Архітектура — 8 спеціалізованих агентів на LangGraph, кожен у своєму pod-i. Внизу — інтерактивна анімація як 1000 PDF проходять через систему від API до фінальної відповіді. 🎯 Бізнес-задача Клієнт: Compliance SaaS для європейських банків. Що робить: приймає PDF з контрактом → витягує дані → перевіряє на відповідність GDPR/MiFID II → повертає звіт. Навантаження: 1000 PDF/день у робочий час (10:00-18:00), 0 PDF вночі та у вихідні. Без K8s — потрібно 24/7 тримати 10 GPU за $30к/місяць. З K8s + KEDA — економія до $20к/місяць. 🏗 Архітектура — 4 шари 1️⃣ Вхідна зона API Gateway (FastAPI pod): приймає PDF, валідує, кладе у Redis-чергу і миттєво повертає 202 Accepted + task_id. Клієнт не чекає 5 хв у браузері — він поллить статус. Replicas: 2-5 (CPU node). Дешеві pods, легко скейляться. Ніколи scale-to-zero — це фронт system. 2️⃣ Серце системи — State Broker Redis Cluster: черги завдань + checkpoints LangGraph. Кожна зміна стану графа зберігається тут — якщо pod помре посеред обробки, інший підбере з останнього checkpoint. StatefulSet з 3 replicas, persistent storage. Helm chart bitnami/redis. 3️⃣ Робочі цехи — 8 агентів Supervisor (1 replica, CPU): читає стан з Redis, вирішує наступний крок графа, кидає у відповідну чергу. OCR/Parser агенти (KEDA 0-15, CPU): витягують текст з PDF, парсять JSON. RAM-intensive. LLM/Compliance агенти (KEDA 0-10, GPU): vLLM з Llama-70B. Найдорожчі. 4️⃣ Шар даних Qdrant/Milvus: vector DB для RAG (внутрішні regulatory rules). Helm-чарт, поруч з агентами. PVC з вагами моделей: Llama-70B (140 GB) лежить на shared S3-mounted volume, init container перевіряє і скачує лише при потребі. 🎬 Анімація — як 1000 PDF проходять через систему ▶ Play ↺ Reset step 0 / 9 [] ▶ Натисни Play — анімація показує повний день системи: від тихої ночі (replicas=0, $0) до лавини 1000 PDF удень (replicas=15, scale-up за хвилини) і назад до тиші. Дивись на лічильник GPU $/год — це і є економія від KEDA. 🛡 Чому ця архітектура — Production-Grade 💥 Ізоляція OOM OCR-агент натрапляє на битий 500 MB PDF → процес \"застрелюється\" від OOM → K8s миттєво створює новий pod → Supervisor бачить timeout у Redis → перекидає задачу. Інші 7 агентів навіть не здригнулися. У моноліті вмерла б уся система. 📦 Незалежне версіонування Хочеш покращити prompt у Compliance-агенті? Робиш helm upgrade compliance-agent --set image.tag=v2.1. Rolling update тільки цього сервісу. Інші 7 агентів продовжують працювати без секунди простою. 💸 Економічна логіка CPU-агенти живуть на дешевих t3.medium нодах ($0.04/год). GPU-агенти — окрема node pool з A100/H100. Karpenter додає GPU-ноди коли KEDA просить, видаляє коли простоюють. $30k → $10k/міс. 🌐 Service discovery без IP Supervisor викликає httpx.post(\"http://compliance-service.ai.svc.cluster.local/v1/validate\"). CoreDNS резолвить у поточний ClusterIP, Service балансує на найменш завантажений pod. Pod-и народжуються/помирають — код не міняється. 🔄 Resume from checkpoint LangGraph Checkpointer пише стан у Redis після кожного кроку. Pod помер на 4-му з 8 кроків? Інший pod читає checkpoint і продовжує з 5-го. Користувач навіть не помітив. 📈 Незалежне масштабування OCR черга росте до 500? KEDA скейлить тільки OCR-агенти. LLM черга порожня? GPU-pod-и не активуються. Кожен tier масштабується за СВОЇМИ метриками. Не платиш за GPU поки немає LLM-запитів. 📐 K8s маніфести — фрагменти з реального проєкту 🧠 Supervisor Agent — CPU, завжди 1 apiVersion: apps/v1 kind: Deployment metadata: { name: supervisor } spec: replicas: 1 template: spec: nodeSelector: { workload: cpu } containers: - name: supervisor image: myorg/supervisor:v1.4.2 env: - { name: REDIS_URL, value: redis://redis.ai.svc:6379 } - { name: LANGGRAPH_CHECKPOINTER, value: redis } 🤖 LLM Agent — GPU + KEDA scale-to-zero apiVersion: keda.sh/v1alpha1 kind: ScaledObject metadata: { name: llm-agent-scaler } spec: scaleTargetRef: { name: llm-agent } minReplicaCount: 0 # scale-to-zero! maxReplicaCount: 10 triggers: - type: redis metadata: address: redis.ai.svc:6379 listName: tasks:llm listLength: \"3\" # 3 task на pod 💡 Головна ідея use-case: на K8s ви будуєте AI-систему не як один великий Python-скрипт, а як набір незалежних спеціалізованих pod-ів. Це дає 4 переваги: (1) ізоляцію збоїв (OOM в одному не валить інших), (2) незалежне масштабування (KEDA для кожного tier-а окремо), (3) незалежне версіонування (rolling update без зачіпання решти), (4) cost optimization (CPU vs GPU pools, scale-to-zero). Це і є \"Multi-Agent on K8s\" production pattern. 10 · Demo цього уроку — Ollama + KEDA + Streamlit на minikube Ми побудували повноцінну AI-платформу яка крутиться локально на твоєму Mac без NVIDIA GPU. Усі концепти з лекції (Helm, KEDA scale-to-zero, model load probes, service discovery, PVC) живуть у реальних файлах у папці demo/. Нижче — анімаційна демонстрація того, як ці компоненти працюють разом, плюс детальний розбір архітектури. 📦 Що таке minikube — твій локальний Kubernetes minikube — це повноцінний Kubernetes-кластер, упакований в один Docker-контейнер на твоєму ноутбуці. Той самий API, ті самі ресурси (Pod, Deployment, Service, PVC, HPA), той самий kubectl — просто все працює локально, без cloud-провайдера. Як це працює технічно: 1. Команда minikube start створює Docker-контейнер з усіма компонентами K8s всередині (kube-apiserver, etcd, scheduler, controller, kubelet, containerd) 2. Це Docker-in-Docker: контейнер minikube запускає інші контейнери (твої pod-и) всередині себе 3. Твій локальний kubectl підключається до minikube-API через kubeconfig (генерується автоматично) 4. Все що ти задеплоїш — реально працює: створює мережі, монтує volumes, запускає контейнери, балансує трафік 🎯 Навіщо нам minikube для цієї демки 💸 Безкоштовно EKS/GKE кластер для тестів = $70+/місяць. minikube = $0. Локально, на твоєму ноуті, без хмари і кредитки. ⚡ Швидкий старт Cloud K8s провіжен 5-15 хв. minikube — 30 секунд. minikube delete і все зникло без слідів. Ідеально для CI, exam-prep, dev-loop. 🎓 Той самий API Усе що навчишся писати у minikube — 1-в-1 працює у EKS/GKE/AKS. Helm-чарти, Deployments, ScaledObjects переносяться без змін. 🧪 Безпечно експериментувати Зламав щось? minikube delete -p k8s-ai-demo — і кластер видалений. Жодних наслідків. У проді так пробувати не варто. 🔧 Купа addons Одна команда — і у тебе є metrics-server, ingress, registry, dashboard, GPU support (через --driver=docker). minikube addons list показує усі. 🏝 Ізоляція Іменовані профілі (-p name) дозволяють мати кілька кластерів паралельно. Наш профіль k8s-ai-demo не конфліктує з твоїми іншими minikube-проєктами. 📋 minikube vs альтернативи Інструмент Що це Коли брати ---------------------- ---------------------------------------------- ---------------------------------------------------------------- minikube Docker-in-Docker K8s, найбільш універсальний Дефолт для навчання, локальної розробки, нашої демки kind (K8s in Docker) Подібно до minikube, але швидший старт CI пайплайни, multi-node тести k3d K3s (легкий K8s) у Docker Edge-сценарії, IoT, ARM-пристрої Docker Desktop K8s Вбудований у Docker Desktop Якщо вже використовуєш Docker Desktop, не хочеш додаткових CLI EKS / GKE / AKS Managed K8s у хмарі Production, multi-team, реальний GPU 🧠 Головна ідея: minikube — це \"K8s playground\". Той самий kubectl apply, той самий Helm, ті самі патерни що у проді з 100 GPU-нод. Різниця лише у масштабі. Через це наша демка стане для тебе мостом: спочатку тут крутиш Ollama + KEDA, потім переносиш той самий маніфест на EKS з vLLM на H100 — і він просто працює. 🏗 Архітектура у трьох рівнях Рівень 1 · K8s інфраструктура Що: компоненти самого Kubernetes-кластера. - kube-apiserver — точка входу - etcd — БД стану кластера - kube-scheduler — куди ставити pod-и - controller-manager — self-healing loop - CoreDNS — резолвер всередині кластера - kubelet — агент на ноді - storage-provisioner — створює PV для PVC - metrics-server — CPU/RAM для HPA Усе живе в kube-system. Ставиться minikube-ом автоматично. Рівень 2 · AI-платформа Що: компоненти що ми ставимо поверх K8s через Helm. - keda-operator — watch ScaledObjects - keda-metrics-apiserver — custom metrics для HPA - keda-admission-webhooks — валідація CRD - prometheus-server — збирає метрики з Ollama - prometheus-kube-state-metrics — K8s-метрики Namespaces: keda, monitoring. Це \"штатний інструментарій\" будь-якої AI-платформи. Рівень 3 · Наш сервіс Що: застосунок який ми деплоїмо власними Helm-чартами. - Deployment ollama — LLM сервер - Service ollama — DNS endpoint - PVC ollama-models — диск з вагами - ConfigMap ollama-config — параметри - ScaledObject ollama-scaler — KEDA autoscale - Deployment ollama-ui — Streamlit chat - Service ollama-ui — UI endpoint Усе у namespace ai. 7 K8s-ресурсів = повноцінний AI-сервіс. 🌊 Анімація — як проходить запит від браузера до моделі 🎬 Шлях запиту \"Привіт\" від користувача до Ollama ▶ Play ↺ Reset step 0 / 8 [] ▶ Натисни Play — анімація покаже шлях запиту \"Привіт\" від твого браузера через port-forward, Service, UI pod, CoreDNS, ще один Service і нарешті до Ollama pod-а з моделлю у RAM. Паралельно — як KEDA читає Prometheus і керує replicas. 📚 Терміни які зустрінуться у chart — короткий словник Перш ніж розбирати ollama-llm chart — короткий glossary 8 ключових концептів, які бачите у YAML нижче. Якщо щось знайоме — просто пробіжіться оком. 🚀 Init Container Що: спеціальний контейнер що запускається ПЕРЕД основним у тому ж pod-i. Має той самий network/volumes. Pod вважається готовим лише коли усі init containers exit 0. Навіщо: підготувати середовище для основного контейнера — завантажити моделі, виконати міграції БД, перевірити залежності, скопіювати конфіги. У нашій демці: model-puller тягне 2 GB phi3:mini у PVC до того як стартує основний Ollama сервер. 🩺 readinessProbe vs livenessProbe vs startupProbe 3 типи перевірок здоровʼя pod-а: - readinessProbe — \"чи готовий приймати трафік?\" Fail → Service не роутить запити (м'яко) - livenessProbe — \"чи живий?\" Fail → K8s вбиває і рестартує контейнер (жорстко) - startupProbe — \"чи стартонув?\" Поки крутиться — readiness/liveness вимкнені. Для повільного boot 🔄 Rolling Update vs Recreate Rolling Update (дефолт): поступова заміна pod-ів по одному. maxSurge: 1 = 1 зайвий допущено, maxUnavailable: 0 = жоден не вмирає поки новий не Ready. Zero-downtime. Recreate: вбиває всі старі → стартує нові. Простий, але є downtime між фазами. Підходить лише для batch jobs / dev. У AI: завжди RollingUpdate з maxUnavailable: 0 бо інакше 60 сек 502 під час релізу. 💾 PVC vs emptyDir vs hostPath 3 способи дати pod-у диск: - PersistentVolumeClaim (PVC) — справжній persistent disk. Переживає рестарт pod-а. Backed by cloud storage (EBS/PD) або local SSD. - emptyDir — тимчасова папка, видаляється разом з pod-ом. Для cache всередині життя pod-а. - hostPath — папка на ноді. Pod вмирає → дані залишаються на ноді (але інший pod може потрапити на іншу ноду). Для моделей: завжди PVC. emptyDir = модель тягнеться при кожному рестарті. 🪦 SIGTERM, SIGKILL, preStop, terminationGracePeriodSeconds Як K8s \"правильно\" вбиває pod: 1. Виконується preStop hook (наприклад sleep 10) 2. Контейнер отримує SIGTERM — \"плануй завершуватись\" 3. Чекає terminationGracePeriodSeconds (default 30, у нас 60) 4. Якщо не завершився — SIGKILL (примусово, без шансів) Навіщо: дати завершити in-flight inference, закрити з'єднання з БД, зробити graceful shutdown. 🎯 Selector + Label Як K8s \"знаходить\" ресурси один одного: - Label — пара key=value на ресурсі. Наприклад app: ollama - Selector — query \"знайди все з таким label\" Приклад: Service з selector: app=ollama автоматично знаходить ВСІ pod-и з лейблом app: ollama і балансує між ними. Pod з'явився — Service його підхопив. Pod помер — викинув з endpoints. 📦 maxSurge vs maxUnavailable (детальніше) Два параметри що визначають \"як саме\" відбувається rolling update: - maxSurge: 1 — під час релізу дозволено мати на 1 pod БІЛЬШЕ ніж replicas. (тимчасово 4 при replicas=3) - maxUnavailable: 0 — під час релізу нуль pod-ів дозволено бути НЕ Ready Разом: новий pod стартує паралельно зі старими → коли Ready → один зі старих вмирає. Cluster ніколи не має менше 3 ready pod-ів. ⚙ accessModes у PVC Хто і як може монтувати volume: - ReadWriteOnce (RWO) — один pod пише і читає. Дефолт для cloud disks (EBS, PD). - ReadOnlyMany (ROX) — багато pod-ів читають, ніхто не пише - ReadWriteMany (RWX) — багато pod-ів пишуть і читають. Потребує NFS/EFS/CephFS Для моделей: RWO достатньо (один pod = одна replica = свій диск). Для shared model cache між replicas — RWX (EFS у AWS). 📦 Helm chart ollama-llm — серце демки 🚀 Init container — model puller initContainers: - name: model-puller image: ollama/ollama:0.3.12 command: [\"sh\",\"-c\"] args: - | ollama serve & sleep 5 ollama pull phi3:mini kill %1 volumeMounts: - name: model-cache mountPath: /models Що робить: запускає Ollama тимчасово → тягне 2 GB ваг у PVC → завершується. Основний контейнер стартує лише після цього. Чому це генільно: ваги живуть у PVC. Другий запуск pod-а не тягне модель повторно — стартує за 30 сек замість 5 хв. 🩺 readinessProbe — справжній health readinessProbe: httpGet: path: /api/tags # НЕ /health! port: 11434 initialDelaySeconds: 30 periodSeconds: 5 failureThreshold: 30 # 150 сек Чому /api/tags, не /health: /health поверне 200 одразу як стартує процес — а модель ще грузиться. /api/tags повертає 200 лише коли модель реально в RAM і готова обробляти запити. Наслідок: Service НЕ роутить трафік на pod поки модель не готова. Перший юзер ніколи не отримає 500. 🔄 Rolling update без 502 strategy: type: RollingUpdate rollingUpdate: maxSurge: 1 maxUnavailable: 0 # 🔥 template: spec: terminationGracePeriodSeconds: 60 containers: - lifecycle: preStop: exec: { command: [\"sh\",\"-c\",\"sleep 10\"] } maxUnavailable: 0 — старий pod НЕ вмирає поки новий не Ready. preStop sleep 10 — час Service-у видалити pod з endpoints перш ніж SIGTERM. terminationGracePeriodSeconds: 60 — час завершити in-flight inference. 💾 PVC — ваги переживають рестарт apiVersion: v1 kind: PersistentVolumeClaim metadata: { name: ollama-models } spec: accessModes: [ReadWriteOnce] resources: requests: storage: 5Gi storage-provisioner у minikube автоматично створює PV. У AWS це був би storageClass: gp3-csi, у GCP — pd-ssd. K8s абстрагує. Pod помер? Ваги залишилися. Новий pod стартує за 30 сек. ⚙️ KEDA ScaledObject — autoscale на льоту Ось повний ScaledObject з демки. Його застосовуємо ОКРЕМО від Helm-чарту (через kubectl apply). apiVersion: keda.sh/v1alpha1 kind: ScaledObject metadata: { name: ollama-scaler, namespace: ai } spec: scaleTargetRef: { name: ollama } # який Deployment масштабуємо minReplicaCount: 0 # 🔥 scale-to-zero (економія GPU $$) maxReplicaCount: 3 # верхня межа cooldownPeriod: 60 # 60 сек простою → scale down pollingInterval: 15 # опитуємо метрики кожні 15 сек triggers: - type: prometheus metadata: serverAddress: http://prometheus-server.monitoring.svc:80 query: sum(rate(http_requests_total{namespace=\"ai\",app=\"ollama\"}[1m])) threshold: \"2\" # >2 RPS → scale up - type: cpu metricType: Utilization metadata: { value: \"70\" } # >70% CPU → scale up (fallback) Multi-trigger OR-логіка: KEDA рахує потрібну кількість replicas для кожного тригера окремо і бере максимум. Якщо Prometheus каже \"треба 2\", а CPU каже \"треба 3\" → буде 3. Це безпечно — навіть якщо один тригер зламається, другий захищає. 🎨 Streamlit UI — frontend всередині кластера 🔍 Service discovery через env # у values.yaml chart-у: ollama: url: \"http://ollama.ai.svc.cluster.local:11434\" # у deployment.yaml потрапляє як env: env: - name: OLLAMA_URL value: {{ .Values.ollama.url | quote }} # у app.py: OLLAMA_URL = os.getenv(\"OLLAMA_URL\") UI НЕ знає IP backend-у. Знає лише DNS-імʼя. Pod-и народжуються, помирають, переїжджають — DNS не змінюється. Це і є service discovery. 🪪 Downward API — pod знає себе env: - name: POD_NAME valueFrom: fieldRef: fieldPath: metadata.name # у app.py: st.markdown( f\"pod: {os.getenv('POD_NAME')}\" ) Pod дізнається своє власне імʼя з K8s API через \"Downward API\". У UI показуємо badge pod: ollama-ui-75cfdb68-vq5t7 — учні бачать що це РЕАЛЬНО pod, не локальний процес. 🌊 SSE streaming resp = requests.post( f\"{OLLAMA_URL}/api/generate\", json={\"prompt\": prompt, \"stream\": True}, stream=True, timeout=600, ) for line in resp.iter_lines(): chunk = json.loads(line) full += chunk[\"response\"] placeholder.markdown(full + \"▌\") Server-Sent Events — Ollama шле кожен токен окремим JSON-рядком. iter_lines() читає рядок-за-рядком. Streamlit оновлює UI на льоту → ефект \"як ChatGPT\". ▌ — миготливий курсор для UX. 📦 Build image у minikube docker # 🔑 ключовий момент setup.sh: eval \"$(minikube docker-env -p k8s-ai-demo)\" docker build -t ollama-ui:latest ./ui eval \"$(minikube docker-env -p k8s-ai-demo -u)\" minikube docker-env перенаправляє docker CLI на daemon всередині кластера. docker build створює image там же де його буде використовувати kubelet. У values.yaml: imagePullPolicy: Never — без registry. У проді: ECR/Harbor + Never→IfNotPresent. 🧠 Concepts mapping — де в коді живе кожен термін з лекції Концепт з лекції Файл у демці ----------------------------- --------------------------------------------------------------------------------------- Pod / Deployment charts/ollama-llm/templates/deployment.yaml Service + DNS charts/ollama-llm/templates/service.yaml ConfigMap charts/ollama-llm/templates/configmap.yaml PVC charts/ollama-llm/templates/pvc.yaml readinessProbe з model load charts/ollama-llm/templates/deployment.yaml · failureThreshold: 30 Graceful shutdown charts/ollama-llm/templates/deployment.yaml · preStop + terminationGracePeriodSeconds Rolling update без 502 charts/ollama-llm/values.yaml · maxUnavailable: 0 Helm playground charts/ollama-llm/values.yaml · весь файл KEDA ScaledObject k8s/scaledobject.yaml scale-to-zero k8s/scaledobject.yaml · minReplicaCount: 0 Multi-trigger autoscale k8s/scaledobject.yaml · 2 triggers (prometheus + cpu) Service discovery charts/ollama-ui/values.yaml · ollama.url: ollama.ai.svc... Downward API charts/ollama-ui/templates/deployment.yaml · fieldRef"}, {"file": "monitoring.html", "title": "Monitoring", "badge": "15", "text": "Production LLM Monitoring & Drift Системний огляд практик моніторингу production LLM-сервісів. Пʼять типів дрифту з позиції AI Engineer (не ML Engineer), три обовʼязкові шари observability (APM + Tracing + Quality Evals), LLM-as-a-Judge для якісного моніторингу, content-based alerting, управління релізами промптів і моделей. Чотири інтерактивні симулятори для емпіричної перевірки концепцій. 💀 Що відбувається без моніторингу LLM-сервісу ▶ Play incident ↺ Reset step 0 / 4 [] ▶ Натисни Play — побачите 5 типових інцидентів, які трапляються у LLM-сервісі без правильного моніторингу. APM показує 200 OK, юзери скаржаться, інженер дізнається останнім. 🎬 Як працює LLM Observability за 60 секунд ▶ Play ↺ Reset step 0 / 6 [] ▶ Натисни Play — анімація показує як кожен з трьох шарів observability (APM → Tracing → Evals) бачить різні аспекти роботи LLM-сервісу, і чому усі три потрібні разом для повної картини. Чому саме три шари, а не один універсальний інструмент? Кожен шар бачить LLM-сервіс через свою лінзу і ловить свій клас проблем. Жоден з них не покриває всю картину — і це не баг, а архітектурний принцип. Спроба зробити \"усе в одному\" завжди закінчується інструментом який добре робить лише одну річ. 📊 Шар 1 · APM Що бачить: інфраструктурні метрики — latency, error rate, throughput, cost per request, GPU utilization. Що ловить: падіння провайдера, timeout vector DB, OOM на embedding-сервісі, 5xx-сплеск. Сліпий до: галюцинацій, refusal, контенту відповіді — для нього 200 OK 500ms з брехнею всередині виглядає ідеально здоровим. 🔭 Шар 2 · Tracing Що бачить: повний шлях одного запиту — prompt → retrieved contexts → tool calls → final answer + токени і тривалість кожного кроку. Що ловить: який context модель отримала, який prompt згенерувався, де згоріли токени, чи спрацював retrieval. Сліпий до: якості відповіді — показує що модель отримала і що повернула, але не оцінює чи правильно вона відповіла. ⚖ Шар 3 · Evals Що бачить: якісну оцінку відповіді — faithfulness (чи факти підкріплені context), answer relevancy (чи на питання), context precision (чи retrieval релевантний). Що ловить: галюцинації, регресії після зміни prompt, model drift, концептуальний дрифт у конкретних інтентах. Єдиний шар який бачить що модель бреше при ідеальних APM-метриках. Без нього content drift залишається невидимим. Практичне правило: якщо у тебе тільки APM — ти не знаєш чому система деградує. Якщо тільки Tracing — можеш дебажити одиничні запити, але не бачиш тренди. Якщо тільки Evals — бачиш що щось погіршало, але не знаєш на якому шарі pipeline шукати причину. Production-grade observability вимагає всіх трьох. 01 · Чому AI Engineer ≠ ML Engineer у контексті дрифту Класична література про моніторинг моделей написана для ML Engineers, які тренують власні моделі і слідкують за деградацією через distribution shift у training/serving data. AI Engineer працює інакше: модель — це API провайдера, який оновлюється без вашого відома. Тому категорії дрифту, метрики, інструменти та реакції — інші. 🔬 ML Engineer (класичний) Тренує власну модель (XGBoost, fine-tuned BERT). Контролює training data, hyperparameters, deployment pipeline. Дрифт = \"вхідні дані відрізняються від тренувальних\". Інструменти: Evidently AI, WhyLogs, MLflow. Метрика: PSI, KS-test, KL-divergence. 🤖 AI Engineer Викликає API провайдера (OpenAI, Anthropic, Mistral). Не контролює модель — провайдер оновлює її silent. RAG indexes, prompt templates, evaluation criteria — все це теж може дрифтувати. Інструменти: Langfuse, RAGAS, LLM-as-a-Judge. Метрика: faithfulness, answer relevancy, refusal rate. 4 фундаментальні відмінності 🔐 Контроль над моделлю ML Engineer: повний — ваги, версія, retraining. AI Engineer: нуль — провайдер може зробити silent update і нічого не сказати. 📦 Що дрифтує ML: розподіл features у inference data. AI: API contract, embedding model, retrieval corpus, prompt template, ground truth. 📏 Як міряти ML: статистичні тести на feature distributions. AI: LLM-as-a-Judge на sample of production traffic + golden dataset. ⚡ Швидкість реакції ML: дні-тижні (retraining pipeline). AI: години (поміняти модель/prompt і rollout через registry). Головна ідея уроку: дрифт для AI Engineer — це не \"модель зістарілась\", а \"API-контракт із провайдером змінився без твого відома\". Через це класичні підходи моніторингу (data drift detection через statistical tests) працюють лише частково. Основний інструмент — content-based evaluation на real production traffic через LLM-as-a-Judge. 02 · Пʼять типів дрифту для AI Engineer Дрифт у AI-системах — це не один феномен, а пʼять різних типів, які проявляються по-різному, мають різні симптоми і лікуються різними інструментами. Класифікація допомагає розпізнати тип за симптомом і одразу знати правильний фікс. Клікніть на таб, щоб побачити приклад і механізм зламу. interactive Візуалізатор 5 типів дрифту — клікайте таби 1.Model drift 2.Embedding drift 3.Document drift 4.Data drift 5.Concept drift ▶ Replay animation Quick reference — пʼять типів на одному екрані Тип Що змінюється Симптом Хто помічає першим -------------------- ----------------------------------------------------- ------------------------------------------------------------ ------------------------------------------------------ 1. Model drift Провайдер оновив модель під тим самим alias Зламана JSON-схема, інший tone, нові refusals Downstream parsing / structured output 2. Embedding drift Оновили embedding-модель, індекс лишився старим RAG retrieve неправильний context, cosine similarity падає Faithfulness eval падає, answer quality знижується 3. Document drift Документи у knowledge base застаріли Модель повертає стару інформацію (price, API, policy) Customer support (тикети про неактуальну інформацію) 4. Data drift Користувачі питають інші речі (intent distribution) Розподіл prompts shift, нові intents у топ-10 Product analytics, дашборд топ-intents 5. Concept drift Правильна відповідь змінилася (зовнішній world) Eval scores падають на тих самих питаннях Golden dataset regression, customer escalations 💬 Bonus — Context Window drift (production-кейс conversational AI) Шостий тип дрифту, специфічний для conversational AI — не входить у 5 базових, але зустрічається в кожному chat-сервісі що працює довше за місяць. Природа: чати ростуть разом з retention. Quality падає на довгих чатах, generic dashboard цього не покаже бо aggregated метрики розмиті. Live demo · Чат росте → context перевищує efficient zone → quality падає step 0 / 5 ‹ Prev Next › ▶ Play sequence Reset DAY 0Натисни Play. Покажемо як conversation з 5 turn-ів виростає до 200 за місяць, і що відбувається з context window та quality. Context window usage 0 / 128k tokens 0% conversation_turns5 Кількість обмінів user↔bot у поточному чаті. Що міняє: росте з retention. Сигнал: >80 turns — увага, >150 — context risk. avg_tokens_per_request2.4k Скільки токенів модель приймає на вхід (history + system prompt + new message). Що міняє: росте лінійно з turns. Сигнал: наближення до efficient zone моделі (для gpt-4o ~60-80k з 128k). p95_latency420ms 95-й перцентиль часу відповіді (95% запитів швидші за це). Що міняє: росте з input size — більше токенів = довша prefill-фаза. Сигнал: >1с — UX страждає. cost_per_request$0.008 Вартість одного виклику. Що міняє: росте пропорційно input tokens × ціна моделі. Сигнал: 4× від baseline — час перевіряти cache hit rate і обрізання history. judge_score (overall)0.89 Середня faithfulness від LLM-judge через всі buckets. Проблема: приховує деградацію довгих чатів — короткі тягнуть avg догори. Сигнал: <SLO — alert, але per-bucket розріз ловить раніше. judge_score by conversation_length_bucket .91 1-10 .89 11-30 .88 31-60 .87 61-100 .86 101-150 .85 150+ ▶ Press Play Покажемо як conversational AI деградує невидимо для aggregated метрик: overall judge_score лишається ~0.85+, але bucket-розріз показує що довгі чати провалюються до 0.52. 🔁 Bonus — Prompt regression (надмірне правилотворення) Сьомий тип — самоінфлікційний дрифт, який AI Engineer створює сам, перевантажуючи system prompt інструкціями. Класичний паттерн: продакт-менеджер після кожного incident-у каже \"додай правило щоб бот не...\" — за місяць простий prompt на 5 рядків розростається до 30+ конфліктних інструкцій. Модель починає галюцинувати правила, забуває частину, плутає пріоритети. Без CI eval-gate цей дрифт неможливо зловити до production. Live demo · 4 правила → 30 правил за 6 тижнів → модель забуває половину step 0 / 5 ‹ Prev Next › ▶ Play sequence Reset ① Pull request support_qa_prompt.yaml main last edit: 3 weeks ago system: | You are a customer support assistant for Acme Inc. Answer questions about pricing, refunds, and features. Always cite the relevant policy document. Refuse politely if a question is outside our scope. ② CI pipeline GitHub Actions · #847 PENDING ○ lint · prompts.yaml ○ unit tests · prompt-renderer ○ integration · deploy to staging ○ eval gate · golden dataset ③ Golden dataset · 8 cases refund_pro_plan_user rule_recall— pricing_question_basic faithfulness— cancellation_annual_user rule_recall— competitor_mention compliance— eu_customer_refund rule_recall— policy_citation citation— trial_enterprise_lead compliance— multi_rule_conflict consistency— ④ Production · support tickets за 48h —baseline: 2 тікети / день, normal ▶ Press Play Покажемо як прості 4 правила за 6 тижнів перетворюються на 30 конфліктних інструкцій, модель починає галюцинувати правила, і чому overall judge_score цього не показує. 03 · Головна думка — drift = API contract break Якщо стиснути всі п'ять типів до однієї моделі мислення — дрифт для AI Engineer це порушення неявного API-контракту. Контракту, який ніхто не підписував формально, але на якому тримається вся ваша система. Кожен тип дрифту — це інший рівень цього контракту, що зламався мовчки. 📜 Чотири рівні неявного контракту 1. Provider ↔ Your app Контракт: \"alias gpt-4o дає мені детерміновану модель з відомою поведінкою, JSON schema, tone\". Зламано → Model drift. OpenAI оновлює модель silent, ваш function-calling парсер падає. 2. Embedding model ↔ Vector index Контракт: \"вектори у моєму індексі побудовані тією самою embedding-моделлю, що й query-вектор\". Зламано → Embedding drift. Ви оновили embedding-модель у production, не переіндексували → RAG ламається. 3. Knowledge base ↔ Real world Контракт: \"документи в моєму RAG актуальні\". Зламано → Document drift. Pricing змінилось у Q3, документ у knowledge base — з Q1. RAG чесно повертає документ, відповідь застаріла. 4. Training cutoff ↔ Current world Контракт: \"правильна відповідь на питання X залишається правильною\". Зламано → Concept drift. Модель тренована до 2024-04, ви питаєте про подію 2024-09 — отримуєте впевнено-неправильну відповідь. 💡 Реальний кейс — GPT-4 silent update Серпень 2024. OpenAI оновлює gpt-4o alias з версії gpt-4o-2024-05-13 на gpt-4o-2024-08-06. Анонс — у release notes, але інженери, що пінять gpt-4o, не отримують direct сповіщення. Що ламається на наступний день: - Structured output: нова версія повертає \"reasoning\" поле у відповіді на function call, ваш Pydantic-схема падає з extra fields not allowed - Refusal rate: нова версія \"обережніша\" з фінансовими порадами — refusal rate стрибає 2% → 11% за день - Tone shift: відповіді стають довшими, більше \"as an AI assistant\" — користувачі скаржаться на UX - Cost: у новій версії інший tokenizer behavior — middle output tokens +8%, рахунок місяця зростає на $4 200 Як це детектується БЕЗ моніторингу: через support tickets за 3-7 днів. З моніторингом: алерт на refusal rate spike о 03:00 ночі того ж дня, коли upstream rollout достигає вашого регіону. 🎯 Принцип: кожна залежність вашої LLM-системи — це неявний контракт. Production моніторинг — це контракт-тестування у production. Що більше залежностей (provider, embeddings, KB, training cutoff) — то більше контрактів треба перевіряти автоматично. 04 · Три шари observability — і чому всі три обовʼязкові Production LLM-моніторинг не зводиться до одного інструменту. Це три ортогональні шари, кожен з яких бачить власний аспект системи. Жоден з шарів окремо не дає повної картини. APM знає, що сервіс відповідає швидко. Tracing знає, що саме сервіс відповідає. Evals знають, чи відповідь правильна. Без третього шару деградація відома спочатку юзерам, потім — інженерам. layered Що бачить кожен шар — cumulative reveal 📊 APM 🔭 Tracing ⚖ Evals ▶ Play sequence ↺ Reset [] 📊 APM — latency, error rate, cost. Не бачить контенту. 🔭 Tracing — повний prompt + retrieval + tokens. Не оцінює якість. ⚖ Evals — RAGAS scores. Єдиний шар що ловить hallucinations. ▶ Натисни Play sequence — побачите, як одна й та сама проблема (галюцинація про refund policy) видима по-різному в кожному шарі. APM скаже \"все ОК\", Tracing покаже що саме сталося, Evals видасть вердикт \"це галюцинація\". Чому всі три шари обовʼязкові Тільки APM Бачите latency-spikes, але не знаєте чи модель повертає правильні відповіді. Юзери дізнаються про дегра­да­цію першими. APM + Tracing Можете дебажити конкретні incidents (відкрив trace → прочитав prompt+response), але не отримуєте автоматичних сигналів про якість. APM + Tracing + Evals Повна картина: швидко (APM) + що (Tracing) + правильно (Evals). Можете алертувати на content metrics, а не лише infra. 🎯 Ключова інтуїція: модель може повертати 200 OK за 500ms і при цьому галюцинувати. APM і tracing цього не побачать — вони не оцінюють контент. Без третього шару ви дізнаєтесь про деградацію від юзерів, не від алертів. Це причина, чому Evals-шар не можна \"пропустити\" як necessary evil — це єдине джерело сигналу про якість. 05 · Інструменти — Prometheus, Langfuse, RAGAS і друзі Екосистема LLM-observability у 2026 розкладається на три категорії, що відповідають трьом шарам. У кожній — кілька зрілих опцій. Нижче — практичний guide, який інструмент брати під який use case. 📊 Prometheus + Grafana APM Стандарт-де-факто для infrastructure metrics. Працює з будь-яким HTTP-сервісом через /metrics endpoint. - Бере: latency, throughput, error rate, GPU util, cost per request - Дає: dashboards, alerting через Alertmanager - Коли брати: завжди — це базовий шар, без альтернатив 📊 Datadog / New Relic APM Managed APM з вбудованими LLM integrations (Datadog має нативний vLLM monitoring). - Бере: те саме що Prometheus + traces + logs в одному UI - Дає: SaaS dashboard, AI Insights, anomaly detection - Коли брати: якщо у компанії вже стек Datadog для всього іншого 📊 OpenTelemetry APM Vendor-agnostic стандарт інструментації. Експортує metrics/traces/logs у будь-який backend. - Бере: OTLP traces через SDK у Python/JS/Go - Дає: переносимість — можете міняти backend без зміни коду - Коли брати: якщо хочете уникнути vendor lock-in 🔭 Langfuse Tracing Open-source LLM observability. Self-hosted або SaaS. Best-in-class для prompt management + tracing разом. - Бере: декоратор @observe, autotrace для LangChain/OpenAI SDK - Дає: trace tree, prompt registry, eval integration, datasets - Коли брати: прод-grade, потрібна повна exterior observability 🔭 Helicone Tracing Proxy-based observability — не треба інструментувати код, просто змінюється base_url у OpenAI client. - Бере: усі OpenAI API calls автоматично - Дає: cost breakdown, latency, caching, retry tracking - Коли брати: швидкий старт без зміни коду, OpenAI-centric стек 🔭 Phoenix (Arize) Tracing OSS observability від Arize. Сильна сторона — embedding visualization і drift detection. - Бере: OTel traces + embeddings + datasets - Дає: UMAP/t-SNE visualization, cluster analysis - Коли брати: RAG-heavy системи, потрібно бачити drift у embedding space ⚖ RAGAS Evals Python-бібліотека з готовими метриками для RAG: faithfulness, answer relevancy, context precision/recall. - Бере: {question, contexts, answer, ground_truth} - Дає: 4-6 RAG-метрик через LLM-as-a-Judge під капотом - Коли брати: будь-яка RAG-система — стандарт-де-факто ⚖ DeepEval Evals pytest-style фреймворк для LLM-тестів. Запускається у CI як unit tests. - Бере: декоратори @assert_test з заданими метриками - Дає: integration з GitHub Actions, regression gating - Коли брати: хочете блокувати PR-и через якість моделі ⚖ LangSmith / Braintrust Evals SaaS-платформи з UI для evals + datasets + traces в одному місці. - Бере: integration з LangChain (LangSmith) або agnostic (Braintrust) - Дає: UI для перегляду eval results, A/B порівняння версій - Коли брати: команда без сильних DevOps, хочете \"просто працює\" 🎯 Decision tree — що брати під ваш кейс Стартап, MVP, \"просто запустити\": → Helicone (5 хв setup) + RAGAS (для weekly evals на golden dataset). Prod-grade, self-hosted, RAG-система: → Langfuse (tracing + prompt registry) + RAGAS + Prometheus. Multi-team enterprise: → Datadog (APM) + Langfuse (LLM observability) + DeepEval у CI. RAG з великим knowledge base, потрібен drift detection в embedding space: → Phoenix (Arize) — у нього unique cluster visualization. ☁ AWS-варіант стека — той самий патерн, нативні сервіси Якщо компанія вже на AWS, observability збирається з нативних сервісів. Концептуально це той самий 3-шаровий патерн (APM + Tracing + Evals), просто з іншими назвами і vendor lock-in. 📊 CloudWatch Metrics + Alarms APM AWS-аналог Prometheus + Alertmanager. Bedrock автоматично експортує InvocationLatency, InputTokenCount, OutputTokenCount у namespace AWS/Bedrock. - Бере: вбудовані Bedrock-метрики + custom через PutMetricData - Дає: Alarms з маршрутизацією через SNS → Slack/PagerDuty/Lambda - Коли брати: весь стек на AWS, не хочете окремий Prometheus 🔭 Bedrock Model Invocation Logging Tracing Аналог Langfuse \"з коробки\". Вмикається галочкою в Bedrock console — кожен виклик пишеться у S3 або CloudWatch Logs. - Бере: input messages, output, model ID, latency, token usage, guardrail intervention - Дає: повний replay будь-якого запиту, query через CloudWatch Logs Insights - Коли брати: Bedrock-only стек, не треба окремий tracing-tool 🛡 Bedrock Guardrails APM Runtime safety-layer перед моделлю. Блокує PII leak, prompt injection, harmful content. Кожне спрацювання → метрика GuardrailIntervention у CloudWatch. - Бере: request + response через managed filter - Дає: blocked/passed verdict + автоматичні метрики для алертів - Коли брати: regulated industries, public-facing бот, потрібен compliance audit trail ⚖ Bedrock Evaluations Evals Managed eval-framework з готовими LLM-judges на тих самих RAGAS-метриках. Запускається як ad-hoc job або у CI через AWS CLI. - Бере: golden dataset + prompt template + target model - Дає: faithfulness, robustness, toxicity scores → push у CloudWatch як custom metric - Коли брати:
