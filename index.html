 Bedrock-стек, потрібно автоматизувати regression evals без коду Live demo · AWS production flow на одному запиті step 0 / 7 ‹ Prev Next › ▶ Play sequence Reset [] User support chat API Gateway X-Ray trace start Lambda handler → PutMetricData Bedrock InvokeModel Guardrails PII / injection check Model Invocation Logging → S3 (prompt + response) CloudWatch Metrics judge_score, cost, refusals CloudWatch Alarm judge_score < 0.7 SNS → PagerDuty page on-call ▶ Press Play Покажемо як один LLM-запит проходить через AWS-стек і як content drift спрацьовує алертом, не зачіпаючи infrastructure-метрики. 06 · LLM-as-a-Judge — основний інструмент якісного моніторингу LLM-as-a-Judge — це техніка, де другий LLM (judge) оцінює відповідь першого LLM (production model) за заданими критеріями. Це наразі єдиний практичний спосіб масово оцінювати якість на production traffic. RAGAS — найпопулярніша обгортка з готовими метриками для RAG-сценаріїв. Нижче — інтерактивний симулятор. 📐 Основні RAGAS-метрики для RAG ✓ Faithfulness Чи всі факти у відповіді підтверджуються retrieved context? Якщо модель вигадала факт, якого немає у context — це hallucination. Найважливіша метрика для RAG. 🎯 Answer Relevancy Чи відповідь дійсно відповідає на питання користувача? Низький score = модель \"пливе\" або відповідає на щось інше. 📚 Context Precision Чи retrieved chunks справді relevant до питання? Низький score = retrieval повертає шум, треба тюнити embedding/k. judge sim LLM-as-a-Judge живий симулятор Сценарій: good answer — все ок subtle hallucination off-topic answer bad retrieval Sampling rate: 10% 👤 User prompt 📚 Retrieved contexts (RAG) 🤖 Model answer ⚖ Run Judge (RAGAS) ↺ Clear verdict ⚖ Judge verdict (RAGAS scores) 📊 At 10% sampling on 1M requests/day: 💰 Eval cost/day: $5.00 🎯 Edge case coverage: ~78% ⚙ Як запускати на production traffic Базовий патерн (async sampling): # у вашому API endpoint async def chat_endpoint(request): answer = await rag_pipeline(request.prompt) # 5-10% requests → async eval queue (не блокує response) if random.random() < 0.10: eval_queue.send({ \"question\": request.prompt, \"contexts\": answer.contexts, \"answer\": answer.text, \"trace_id\": answer.trace_id, }) return answer # окремий worker async def eval_worker(): while task := await eval_queue.recv(): scores = ragas.evaluate( dataset=Dataset.from_dict({k: [v] for k, v in task.items()}), metrics=[faithfulness, answer_relevancy, context_precision], ) langfuse.score(trace_id=task[\"trace_id\"], scores=scores) 💡 Trade-off — sampling rate vs cost RAGAS eval = 1-3 LLM calls на метрику × 3-6 метрик = 5-15 LLM calls per evaluated request. На 1M requests/day: - 100% sampling: ~$50-150/day, повне покриття, але дорого - 10% sampling: ~$5-15/day, ловите більшість regression-ів через статистику - 1% sampling: ~$0.50/day, дешево, але edge-cases пропускаєте Прод-рецепт: 5-10% sampling на random traffic + 100% на новій версії промпту/моделі під час canary (детально у секції 09). 07 · Golden dataset — основа eval-pipeline Sampling production traffic ловить regression-и через статистику, але не дає детермінованого тесту. Для CI-gate, для регресій між версіями моделі, для смоук-тестів промптів — потрібен golden dataset: фіксований набір кейсів з ground-truth-відповідями, версіонований у git. 📋 Чек-лист хорошого golden dataset - Розмір: 200-500 кейсів. Менше — не статистично значуще. Більше — дорого ганяти на кожному PR. - Розподіл: покриває реальні intents (топ-10 з product analytics) + edge cases + adversarial. - Ground truth: або експертна анотація (для critical responses), або синтетична з reference model (cheaper). - Version-controlled: у git разом з кодом. Зміни через PR з justification. - Регулярне поповнення: incidents у production → новий кейс у dataset (regression test). - Сегментація: теги по intent / difficulty / category — щоб бачити деградацію по групам. - Анти-патерн: NEVER використовуйте production user data без anonymization (GDPR/PII). - Schema: {id, question, contexts, expected_answer, ground_truth_facts[], tags[], created_at}. 📁 Приклад структури # golden-dataset/refund-policy/v3.yaml version: \"3.2.1\" created_at: \"2026-04-12\" last_review: \"2026-05-20\" size: 347 cases: - id: rp-001 tags: [refund, basic, top-10-intent] question: \"How many days do I have to request a refund?\" expected_answer: \"14 days from purchase date\" ground_truth_facts: - \"refund window is 14 days\" - \"counted from purchase date, not delivery\" forbidden_claims: - \"30 days\" # common hallucination - \"unconditional refund\" - id: rp-047 tags: [refund, edge-case, regression] question: \"Can I get refund if I used the product?\" expected_answer: \"Yes if within 14 days AND product undamaged\" added_after_incident: \"INC-2026-03-15\" 🔄 Як поповнювати golden dataset 📥 Із production incidents Кожен зловлений баг (через user ticket або judge alert) → один новий case у golden dataset з тегом regression. Це запобігає тому самому багу у майбутньому. 🎲 Із синтетичної генерації Використовуйте reference LLM (GPT-4 / Claude) для генерації варіацій існуючих кейсів — paraphrasing, adversarial rewrites, multilingual. Manual review обовʼязковий. 📊 Із product analytics Раз на місяць — топ-100 prompts з production за частотою. Експерт відбирає 10-20, додає expected answers, тегує intent. 🎯 Principle: golden dataset — це контракт між AI-командою і моделлю. Будь-яка зміна моделі/промпту → проганяємо golden dataset → якщо score падає більше ніж на X% → блокуємо merge. Це аналог unit tests для коду, але для LLM поведінки. 08 · Alerting — контентний, а не лише інфраструктурний Класичні алерти (CPU 90%, error rate > 1%, p99 latency > 2s) для LLM-сервісу недостатні. Модель може видавати погані відповіді з нормальною latency і 0% errors. Потрібні content-based alerts на основі judge scores, refusal rate, cost spikes, safety violations. Нижче — інтерактивна дошка, де можна \"симулювати\" інцидент і побачити, які алерти спрацьовують. live dash Alert dashboard — крутіть повзунки, дивіться як загораються панелі ⚖ Judge score 0.87 baseline 7d: 0.86 +1.2% 💰 Cost / 1K tokens $0.32 baseline 7d: $0.30 +6.7% 🚫 Refusal rate 3% baseline 7d: 2.5% +20% 🚨 Safety hits / hr 0 baseline 7d: 0.2 — Judge score (current) 0.87 Cost / 1K tokens ($) $0.32 Refusal rate (%) 3% Safety hits / hour 0 ↺ Reset baselines 💸 Simulate cost spike ⚖ Simulate judge drop 🚫 Simulate refusal flood 🚨 Simulate safety incident 📋 Практична таблиця — що алертувати Метрика Поріг Severity Канал Чому --------------------------- ------------------------------- ---------- ----------------------- ------------------------------------------------------------------------ Judge score падіння > 10% від 7d baseline warn Slack #ai-alerts Прихована regression, не блокує юзерів негайно, але треба розслідувати Safety eval hit ≥ 1 hit/hour page PagerDuty oncall Може бути PR/legal risk, треба реакція негайно Cost spike > 20% за тиждень warn Slack + finance email Bug у retry logic / новий expensive prompt / upstream pricing Refusal rate зріс × 2 від baseline warn Slack #ai-alerts Можливий upstream model drift або новий safety filter p95 latency > 5s warn Slack #ai-alerts Інфра проблема або довгі промпти 5xx error rate > 1% page PagerDuty oncall Inference сервіс падає, треба rollback або scale-up Faithfulness floor будь-який окремий запит < 0.3 info Langfuse trace tag Не алерт, а маркування для подальшого аналізу Golden dataset regression score впав > 5% на CI block GitHub PR check Не алерт у проді, а CI-gate: блокує merge 🎯 Принцип: алерт без runbook = шум. Кожен алерт у production повинен мати документ \"що робити коли спрацював\": перевірити X dashboard → подивитись Y trace → можливі дії A/B/C. Без runbook on-call інженер витратить 30 хв на debug, який міг бути 3 хв. 09 · Управління релізами промптів і моделей Зміна промпту або моделі у production — це деплой, такий самий як зміна коду. Має проходити CI, мати rollback-механізм, gradually rollout-итись. Класичні DevOps-практики (canary, shadow mode, feature flags) переносяться на LLM-світ один-в-один, але мають свої особливості. 🔒 Принцип 1 — завжди пінити snapshot Ніколи у production: model=\"gpt-4o\", model=\"gpt-4o-latest\" Завжди у production: model=\"gpt-4o-2024-08-06\" (точний snapshot) Провайдери (OpenAI, Anthropic) пропонують dated snapshots саме для цього — щоб ваша поведінка не змінювалася непередбачено. Latest alias корисний у dev/staging для тестування нових версій, але не у проді. 🚀 Принцип 2 — Shadow → Canary → Rollout 1. Shadow mode Нова версія промпту/моделі викликається паралельно зі старою на 100% трафіку, але відповідь нової НЕ показується юзеру. Збираємо traces і evals для порівняння. Старий = source of truth. Тривалість: 1-3 дні. Cost: 2× LLM calls. 2. Canary 1-10% Якщо shadow показав ОК, переключаємо невеликий % реального трафіку (1% → 5% → 10%) на нову версію. Моніторимо judge scores, error rate, user feedback у real-time. Тривалість: 2-7 днів. Auto-rollback на алерт. 3. Full rollout 100% трафіку. Стара версія залишається у registry для миттєвого rollback. Через 1-2 тижні — depreкейтимо стару. Rollback: 5 секунд через feature flag. 📚 Принцип 3 — Prompt registry Промпти — це конфігурація, не код. Тримати їх у Python-strings всередині сервісу = неможливість rollback без deploy. Тримати їх у Langfuse/LangSmith prompt registry = rollback за 5 секунд через UI або API. # замість hardcoded: prompt = \"You are a helpful assistant. ...\" # через registry: prompt = langfuse.get_prompt(\"customer-support\", version=\"production\") # version=\"production\" — це alias на конкретну версію, керується через UI # rollback = змінити alias на попередню версію, deploy не потрібен ⚙ Принцип 4 — CI/CD для промптів Кожна зміна промпту → запуск eval suite на golden dataset → gate перед merge. Це аналог unit tests для коду. # .github/workflows/prompt-eval.yml name: Prompt Evaluation on: pull_request: paths: [\"prompts/**\", \"golden-dataset/**\"] jobs: eval: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - run: pip install ragas openai langfuse - run: python scripts/run_evals.py --dataset golden-dataset/ --baseline main - run: python scripts/check_regression.py --threshold 0.05 # exit 1 якщо score впав > 5% - uses: actions/upload-artifact@v4 with: name: eval-report path: reports/ 🎯 Підсумок section 09: зміна промпту = деплой коду. Same rigor: pinning, CI gating, gradual rollout, instant rollback. Без цього кожна \"невинна\" зміна промпту = risk регресії у production без можливості швидкого відкату. 10 · Recap — симптом → шар → дія Швидка матриця \"що бачу → де шукати → що робити\". Тримайте на видному місці у runbook чи Notion. Симптом Шар що ловить Перша дія ------------------------------------------------ ------------------------------------------------------- -------------------------------------------------------------------- JSON-схема ламається у downstream APM (5xx errors) + Tracing (response diff) Перевірити model snapshot, відкотити на попередній RAG повертає неактуальні чанки Evals (faithfulness floor) + Tracing (retrieval span) Перевірити чи переіндексували після embedding update Користувачі скаржаться на застарілу інформацію Evals + Tracing + manual review Reindex knowledge base, додати TTL на документи Refusal rate × 2 за день APM (custom metric) → alert → Tracing Перевірити чи провайдер не update моделі, прочитати release notes Cost spike +20% APM (cost panel) → alert Перевірити retry logic, длину prompts, нові expensive features Galyуцинації на specific topic Evals (faithfulness regression на golden subset) Додати negative examples у golden dataset, тюнити prompt Latency p95 росте APM (latency panel) Перевірити інфра (GPU util), розмір контексту, retry logic Юзери знаходять regression раніше за алерти (жоден шар не ловить) Збільшити sampling rate evals, додати golden cases на цей сценарій Головна думка уроку: production-моніторинг LLM — це три ортогональні шари (APM + Tracing + Evals), а не один інструмент. Дрифт для AI Engineer — це порушення неявних API-контрактів з провайдерами, embedding-моделями, knowledge base, training cutoff. Основний інструмент якісного моніторингу — LLM-as-a-Judge на 5-10% production traffic + golden dataset як CI-gate. Alerting має бути content-based, не лише infra-based. Зміна промпту = деплой коду, той самий rigor."}, {"file": "mcp.html", "title": "MCP", "badge": "16", "text": "MCP — Model Context Protocol Заняття 16 · AI Tools Architecture · стандартний протокол між AI-моделями та tools Системний огляд Model Context Protocol — відкритого стандарту як AI-моделі говорять із зовнішнім світом. Чому MCP виник, як влаштована його тришарова архітектура (Host · Client · Server), які три типи капабіліті він експортує (Tools · Resources · Prompts), як виглядає життєвий цикл одного запиту крізь стек, чим MCP відрізняється від function calling і LangChain tools, реальні production use cases, безпекова модель, екосистема і коли НЕ варто використовувати MCP. Чотири інтерактивні анімації для емпіричної перевірки. 💀 Чому ми взагалі говоримо про MCP — chaos у tool-інтеграціях ▶ Play ↻ Reset step 0 / 4 [] ▶ Натисни Play — анімація показує природу N×M-проблеми у tool-інтеграціях до MCP, і чому індустрії потрібен був стандартний протокол. 🎬 Як MCP вирішує цю проблему за 60 секунд ▶ Play sequence ↻ Reset step 0 / 4 [] ▶ Натисни Play sequence — побачите як один Host може мати багато Clients, кожен з яких говорить з власним Server. Сервери можна писати один раз, переюзати з будь-яким Host що підтримує MCP. 01 · Чому MCP з'явився — N×M проблема у tool-інтеграціях До листопада 2024 не існувало жодного стандарту як LLM-системи мають викликати зовнішні tools. Кожен фреймворк винайшов свій формат — OpenAI function calling, Anthropic tool_use, LangChain Tool, LlamaIndex BaseTool. У результаті кожна компанія, що хотіла підключити Slack або GitHub до AI-системи, писала власну обгортку для кожної пари (LLM × tool). Це і називається N×M проблема — масштабується катастрофічно і породжує vendor lock-in. Чотири симптоми хаосу до MCP 🔁 Переписування інтеграцій Команда написала GitHub-інтеграцію для OpenAI-агента. Через рік мігрують на Claude — переписують ту саму інтеграцію з нуля, бо формат tool_use інший. Жодного переюзу. 🔒 Vendor lock-in через tools Tools прив'язані до конкретного провайдера. Компанія яка побудувала 30 інструментів навколо OpenAI не може дешево переключитися на Anthropic — це коштує місяців переписування. 📦 Дублювання у компанії У великій компанії 5 AI-команд паралельно інтегрують одну й ту саму внутрішню API. Ніхто не може використати чужий код, бо кожна команда писала його під свій stack. 🧪 Відсутність testability Кожна custom integration має власну логіку валідації, авторизації, error handling. Інтеграційні тести — складні і непереносні між проектами. Ключова теза: історично кожна революційна технологія мала свій момент стандартизації. HTTP стандартизував клієнт-серверний обмін. USB стандартизував підключення периферії. SQL стандартизував доступ до даних. MCP — це стандарт для AI tools. Він не винаходить нічого нового, він лише забороняє кожній команді винаходити велосипед. Від проєкту Anthropic до стандарту Linux Foundation У грудні 2025 Anthropic передала MCP до новоствореної Agentic AI Foundation (AAIF) під егідою Linux Foundation. Це знімає головне запере­чення щодо vendor lock-in: протокол більше не належить одній компанії. Станом на травень 2026 фундація налічує 190 організацій-членів; Platinum-рівень формують AWS, Anthropic, Block, Bloomberg, Cloudflare, Google, Microsoft, OpenAI. Засновницькі проєкти AAIF — MCP, goose (Block), AGENTS.md (OpenAI). 📊 Метрики прийняття 2026 110+ млн щомісячних SDK-завантажень, 10 000+ публічних серверів, офіційний реєстр registry.modelcontextprotocol.io. Поріг критичної маси пройдено. 🏛 Управління AAIF Directed fund Linux Foundation. Governing Board вирішує стратегію; технічні рішення — у мейнтейнерів. 7 Working Groups: Transports, Auth, Agents, Governance, UI/Apps, Triggers, Enterprise. 🤝 Нативна підтримка вендорами OpenAI (Agents SDK, ChatGPT), Google (Gemini API, CLI, Enterprise, Spark), Microsoft (Azure MCP 2.0, VS 2026, Copilot), AWS, Cloudflare, Salesforce, Bloomberg. 02 · Що таке MCP — стандарт як AI-моделі говорять із зовнішнім світом Model Context Protocol — це відкритий протокол створений Anthropic у листопаді 2024. До 2026 його підхопили OpenAI, Google, Microsoft, Block, Sourcegraph, Zed, Cursor — практично всі major вендори AI-стеку. Це означає що MCP вже не \"experiment Anthropic\", а de-facto стандарт індустрії. Що MCP визначає 📡 Як з'єднуються процеси Транспорт: stdio (для локальних), HTTP/SSE (для віддалених). Все на базі JSON-RPC 2.0 — простий, людиночитаний, дебагабельний. 📦 Що Server експортує Три типи капабіліті: Tools (функції які викликає модель), Resources (дані які модель читає), Prompts (шаблони запитів). 🤝 Lifecycle handshake initialize → capabilities exchange → use → shutdown. Жодних surprise — обидві сторони на старті домовляються про версію протоколу і доступні функції. Що MCP не є - Не модель і не AI. MCP не генерує текст. Це лише протокол між компонентами. - Не заміна function calling. MCP доповнює function calling шаром стандартизації — модель все ще генерує tool_use blocks, але Host транслює їх у MCP виклики. - Не ще один LangChain. Це не фреймворк і не SDK з готовими інтеграціями. Це специфікація, реалізації якої існують на різних мовах. - Не silver bullet. Для простого chatbot-а з 2 функціями MCP — overkill. Він починає окуповуватися коли інструментів багато або вони використовуються кількома командами. Три корисні аналогії Аналогія Що стандартизує Що було до Що стало після ---------- ---------------------------- -------------------------------------------------------------- ------------------------------------------- USB-C Підключення периферії Mini-USB, micro-USB, lightning, magsafe — кожен свій Один кабель працює з будь-яким пристроєм HTTP Клієнт-серверний обмін FTP, gopher, telnet, кожен сайт міг бути на своєму протоколі Один протокол, єдиний бровзер, єдиний URL SQL Доступ до реляційних даних Кожна БД зі своїм API (dBase, FoxPro, Informix) Один синтаксис працює з 90% БД MCP AI tool calling OpenAI / Anthropic / LangChain — кожен свій Один Server працює з будь-яким Host 03 · Архітектура — Host, Client, Server MCP визначає три ролі у системі. Ключова властивість — кожна роль повністю замінюється без впливу на інші. Це і є те що робить екосистему переносимою: Server можна написати один раз і використати з будь-яким Host. 🖥 Host application AI-застосунок з яким взаємодіє користувач. Запускає LLM, керує діалогом, орчеструє виклики до tools. Приклади: Claude Desktop, Cursor IDE, Zed editor, OpenAI ChatGPT (через MCP-конектори), власний chatbot побудований з нуля. Відповідальність: інтерактивний UI, виклик моделі, рішення коли і який tool викликати, security policies (user approval перед destructive operations). 🔌 Client connection Компонент всередині Host що зв'язується з одним конкретним Server. Один Host має багато Clients — по одному на кожен підключений сервер. Що робить: керує transport (stdio або HTTP), серіалізує JSON-RPC повідомлення, обробляє авторизацію, лічить tokens, відновлює з'єднання при розриві. Аналогія: у бровзері Client = HTTP-з'єднання до конкретного сайту. Кожне відкрите вікно має свій Client до свого сервера. ⚙ Server capability provider Окремий процес що експортує можливості: tools, resources, prompts. Server не знає про LLM — він просто заявляє \"ось мої функції, ось як їх викликати\". Приклади: filesystem server, github server, postgres server, custom internal API server. Відповідальність: business logic, авторизація на рівні API, валідація аргументів, error handling. Один Server обслуговує один сервіс — не варто робити \"monolith server\" з 50 інтеграціями всередині. Чому розділення на 3 ролі — це сила: Server можна писати один раз і переюзовувати з будь-яким Host. Postgres MCP server від Anthropic однаково працює у Claude Desktop, Cursor, або у вашому власному Python-скрипті. Якби MCP мав одну роль \"application + integration в одному\" — переюзу б не було, кожен застосунок ніс би свої інтеграції. Хто за що відповідає — детальна таблиця Відповідальність Host Client Server ------------------------------------- ----------- ------------------ ---------------------- Запуск LLM ✓ так — ні — ні Користувацький UI ✓ так — ні — ні Transport (stdio / HTTP) — ні ✓ так ✓ так (інший кінець) JSON-RPC serialization — ні ✓ так ✓ так Авторизація (OAuth) ~ ініціює ✓ передає токени ✓ перевіряє Business logic (виклик API) — ні — ні ✓ так User approval перед destructive ops ✓ так — ні ~ опціонально дублює Tool discovery (list) ~ агрегує ✓ запитує ✓ декларує 04 · Капабіліті — Tools, Resources, Prompts, Apps MCP Server може експортувати чотири різних класи можливостей. Це сильніше за function calling, який має лише tools. Resources додають declarative data layer, Prompts додають prompt library, Apps (нове у 2026) додають інтерактивний UI всередині Host. Клікайте таби щоб побачити приклад кожного. ①🛠 Tools ②📂 Resources ③📝 Prompts ④🪟 Apps new 2026 Порівняння чотирьох типів Аспект Tools Resources Prompts Apps (2026) ------------------------------ -------------------------- ----------------------------------- --------------------------- --------------------------- Хто ініціює LLM (вирішує викликати) Host (читає за потребою) або юзер Юзер (вибирає зі списку) Юзер (взаємодіє з UI) Сторона ефекту Часто write (мутує стан) Read-only Read-only (тільки шаблон) Може мутувати через події Аналог POST/PUT API виклик GET API виклик або файл Snippet у IDE Embedded widget / iframe Формат передачі JSON Bytes / text / JSON Text template HTML у sandboxed iframe Підтримка у function calling ✓ так — ні — ні — ні Потребує user approval Так (для destructive) Ні Ні Sandbox замість approval Чому 3 типи замість одного: у function calling все робиться через tools — навіть читання документа стає викликом read_document(id). Це працює, але неефективно: модель витрачає одне tool call rotation замість прямого attach документа у context. Resources — це визнання що \"AI має читати дані часто, давайте зробимо це окремо\". Prompts — визнання що \"юзер часто хоче ту саму операцію, давайте дамо йому шаблони замість друкування\". 05 · Lifecycle одного запиту — крізь весь стек Щоб зрозуміти MCP найкраще — простежити що відбувається коли користувач робить запит у Claude Desktop із підключеним GitHub MCP Server. Натисніть Play sequence — побачите 7 кроків від користувацького промпта до відповіді LLM. Live demo · \"Що нового у моєму GitHub репозиторії?\" step 0 / 7 ‹ Prev Next › ▶ Play sequence Reset [] User Claude Desktop chat Host Claude Desktop LLM claude-sonnet · tool_use MCP Client → github server GitHub MCP Server tool: list_recent_commits GitHub API api.github.com Response data 5 commits · authors · titles ▶ Press Play Покажемо як одне просте питання користувача проходить 7 кроків крізь Host → LLM → Client → Server → External API і повертається назад. ⚠ Spec 2026-07-28: цей flow стає stateless. У релізі специфікації від 28 липня 2026 (RC опубліковано 21 травня) Anthropic + AAIF прибирають handshake initialize / notifications/initialized і заголовок Mcp-Session-Id. Кожен запит тепер самодостатній: версія протоколу, ідентифікація клієнта та capabilities передаються у полі _meta кожного JSON-RPC виклику. Чому це важливо для тебе: stateless дозволяє горизонтальний scale без sticky sessions — будь-який інстанс сервера обслуговує будь-який запит. Те що ти бачиш у демо вище (initialize-крок) — це legacy flow. Він залишиться сумісним, але новий стандарт інший. Якщо твій сервер має сесійні залежності (path до репо, browser session, env-vars) — зроби їх явними хендлами в аргументах tool, а не state у пам'яті процесу. SEP-2575 · SEP-2567 · SEP-2260 · SEP-2322 · SEP-2243 · SEP-2549 Що ще приходить у Spec 2026-07-28 Зміна SEP Що це дає ---------------------- ------------------ ---------------------------------------------------------------------------------------------------------- \": 2, \"result\": {\"content\": […]} 3 поля для успіху: jsonrpc, id той самий що в запиті, result. Якщо помилка — замість result буде error з кодом і повідомленням. method у відповіді немає. Три типи повідомлень у JSON-RPC Тип Має id? Очікує відповідь? Приклад у MCP -------------- --------------------- ---------------------- ------------------------------------------------------------ Request так так (з тим самим id) tools/call, tools/list, initialize Response так (того ж запиту) — Будь-який result або error Notification ні ні (fire-and-forget) notifications/initialized, notifications/resources/updated Чому це важливо для дебагу: якщо твій сервер не відповідає — перевір id. Найчастіша помилка початківця: повернути response з іншим id або без id взагалі. Host чекає response з конкретним id і просто висне на таймауті. Друга часта помилка: відповісти на notification (без id) — це порушення протоколу, notifications принципово не мають відповіді. 07 · MCP vs function calling vs LangChain — чим відрізняється Найчастіше питання студентів: \"чим MCP кращий за function calling? у нас же вже все працює.\" Відповідь: вони на різних шарах і можуть співіснувати. Function calling — це формат повідомлення моделі. LangChain — це фреймворк-обгортка. MCP — це протокол між процесами. Аспект Function calling LangChain tools MCP ------------------------ ------------------------------------- ---------------------------- --------------------------- Тип Формат повідомлення Framework wrapper Cross-vendor протокол Стандартизація ~ per-provider (OpenAI ≠ Anthropic) ✗ framework-specific ✓ open spec Переноcимість серверів ✗ прив'язано до API ✗ прив'язано до LangChain ✓ будь-який Host Discovery ~ hardcoded в промпт ~ hardcoded в коді ✓ dynamic (capabilities) Resources ✗ нема ~ через retrievers ✓ first-class Prompts library ✗ нема ~ PromptTemplate (in-code) ✓ first-class Транспорт API call In-process Python stdio / HTTP / SSE Авторизація Per-tool ручно Per-tool ручно ✓ OAuth 2.0 standard State /
