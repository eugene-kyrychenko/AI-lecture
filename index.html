<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бібліотека матеріалів</title>
<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card-h:#334155;
    --text:#f1f5f9; --muted:#94a3b8; --accent:#38bdf8; --accent2:#a5b4fc;
    --border:#334155; --mark:#fde68a; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    background-image:radial-gradient(ellipse at top,var(--bg2),var(--bg) 60%);
    color:var(--text);min-height:100vh;line-height:1.5;
    padding:24px 16px calc(48px + env(safe-area-inset-bottom));
  }
  .container{max-width:660px;margin:0 auto;}
  header{text-align:center;margin-bottom:18px;padding:4px;}
  h1{font-size:clamp(1.6rem,6vw,2.2rem);font-weight:700;letter-spacing:-.02em;}
  header p{color:var(--muted);margin-top:6px;font-size:.95rem;}

  .search{
    position:sticky;top:8px;z-index:10;display:flex;align-items:center;gap:10px;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:0 14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .search svg{flex-shrink:0;width:20px;height:20px;color:var(--muted);}
  .search input{
    flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-size:16px;padding:16px 0;min-width:0;
  }
  .search input::placeholder{color:var(--muted);}
  #clear{
    background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1;
    cursor:pointer;padding:6px;border-radius:8px;display:none;
  }
  #clear:hover{color:var(--text);}
  .count{color:var(--muted);font-size:.82rem;margin:0 4px 12px;}

  nav{display:flex;flex-direction:column;gap:10px;}
  .nav-link{
    display:flex;align-items:center;gap:14px;min-height:60px;padding:14px 16px;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    color:var(--text);text-decoration:none;transition:background .18s,border-color .18s,transform .1s;
  }
  .badge{
    flex-shrink:0;min-width:38px;height:38px;padding:0 8px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;
    background:rgba(56,189,248,.14);color:var(--accent);border:1px solid rgba(56,189,248,.25);
  }
  .badge.extra{
    background:rgba(165,180,252,.12);color:var(--accent2);border-color:rgba(165,180,252,.25);
    font-size:.8rem;
  }
  .meta{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;}
  .title{font-size:1.05rem;font-weight:600;}
  .snippet{font-size:.82rem;color:var(--muted);line-height:1.45;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .arrow{color:var(--accent);font-size:1.3rem;flex-shrink:0;transition:transform .18s;}
  mark{background:var(--mark);color:#0f172a;border-radius:3px;padding:0 2px;}

  @media (hover:hover){
    .nav-link:hover{background:var(--card-h);border-color:var(--accent);}
    .nav-link:hover .arrow{transform:translateX(4px);}
  }
  .nav-link:active{transform:scale(.985);background:var(--card-h);}
  .nav-link:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.95rem;}
  footer{text-align:center;color:var(--muted);font-size:.82rem;margin-top:28px;}
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Бібліотека матеріалів</h1>
      <p>15 сторінок · заняття 7–18 з 20</p>
    </header>

    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="q" type="search" autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="Пошук за назвою та змістом…" aria-label="Пошук">
      <button id="clear" aria-label="Очистити">&times;</button>
    </div>
    <p class="count" id="count"></p>

    <nav id="list"></nav>
    <p class="empty" id="empty" hidden>Нічого не знайдено. Спробуй інший запит.</p>

    <footer>Натисни на матеріал, щоб відкрити</footer>
  </div>

 = не пов'язані, -1 = протилежні. 📐 Математика: Vector math basics Тепер подивимось «під капот». Embeddings — це просто вектори, а для роботи з ними використовують три базові метрики. Почнемо з головної. Косинусна подібність (cosine similarity) Це головний інструмент у світі embeddings. Вона вимірює кут між двома векторами, а не відстань між ними. cos(θ) = A · B ‖A‖ × ‖B‖ = Σ Aᵢ Bᵢ √(Σ Aᵢ²) × √(Σ Bᵢ²) A · B — скалярний добуток (dot product) · ‖A‖ — довжина (норма) вектора Результат — число в діапазоні [-1, 1]: - 1.0 → вектори вказують в одному напрямку (ідентичний зміст) - 0.0 → вектори перпендикулярні (незв'язані поняття) - -1.0 → вектори протилежні (антоніми, якщо таке буває в embedding space) 🎮 Інтерактивно: покрути вектор Пересувай повзунки — побачиш, як змінюється кут, cos(θ), dot product та евклідова відстань. Кут вектора A (θₐ)30° Довжина вектора A1.0 Кут вектора B (θᵦ)75° Довжина вектора B1.0 cos(θ) — cosine similarity 0.707 кут між векторами 45° A · B — dot product 0.707 ‖A − B‖ — евклідова відстань 0.765 схожі (cos > 0.7) ⚖️ Dot product vs Cosine vs Euclidean — коли що використовувати? 📐 Cosine Similarity [-1, 1] Формула: (A·B) / (‖A‖·‖B‖) Вимірює кут між векторами, ігнорує довжину. ✓ Default-вибір для embeddings. Коли важливий семантичний напрямок, а не «сила» сигналу. OpenAI, Anthropic, Cohere — всі рекомендують саме cosine. ✖️ Dot Product (-∞, +∞) Формула: Σ Aᵢ · Bᵢ Скалярний добуток — враховує і кут, і довжину векторів. ✓ Коли довжина вектора несе сенс (напр., популярність, важливість документа). ✓ Швидше за cosine — менше операцій. Використовується в моделях, де embeddings уже нормалізовані (OpenAI). 📏 Euclidean Distance (L2) [0, +∞) Формула: √(Σ (Aᵢ − Bᵢ)²) Пряма геометрична відстань між кінцями векторів. ✓ Для даних, де абсолютні значення координат важливі (зображення, координати в просторі). ✗ Для тексту зазвичай гірше за cosine — страждає від «прокляття розмірності» в високих вимірах. 🔗 Нормалізація: магічний трюк Нормалізувати вектор означає поді atives) ← → Відштовхуємо далі \"кіт\" та \"холодильник\" Після мільйонів таких \"тягань\" вектори самі по собі вибудовуються в осмислений простір: схожі речі — поруч, різні — на відстані. Модель не знає значень слів — вона просто навчилася розташовувати їх так, щоб геометрія відображала зміст. ✨ Чому це змінює все Коли в тебе є хороші embeddings, ти отримуєш суперздатність: - 🔍 Семантичний пошук — знаходь за змістом, а не за ключовими словами - 🎯 RAG-системи — даєш LLM потрібний контекст з бази знань - 📊 Кластеризація — автоматично групуй схожі документи - 🤖 Рекомендації — \"схоже на те, що тобі сподобалось\" - 🌍 Крос-мовність — \"cat\" і \"кіт\" опиняються поруч у просторі AI Engineering Course · Заняття 7 · Embeddings & Semantic Systems"}, {"file": "similarity-search.html", "title": "Similarity Search", "badge": "7", "text": "🔎 Similarity Search Як знаходити релевантний контент за змістом, а не за ключовими словами 🎯 Навіщо це потрібно Класичний пошук (LIKE '%кіт%', Elasticsearch на ключових словах) шукає збіги за літерами. А користувач думає за змістом. Запит «як доглядати за котеням» не знайде статтю «Годування маленьких кошенят» — бо слова різні, хоч зміст майже ідентичний. 🔤 Keyword search query: \"як доглядати за котеням\" Годування маленьких кошенят Поради новим власникам котів Як доглядати за котеням — FAQ Знаходить тільки документ із тими самими словами. Пропускає синоніми та перефразування. 🧠 Semantic (similarity) search query: \"як доглядати за котеням\" Годування маленьких кошенят Поради новим власникам котів Як доглядати за котеням — FAQ Знаходить за змістом — синоніми, перефразування, навіть іншими мовами. ⚙️ Як це працює — pipeline Similarity search = embedding + порівняння векторів. Всі документи заздалегідь перетворюються у вектори та зберігаються у vector DB. При запиті: 💬 1. Query Текст запиту користувача 🧬 2. Embed Перетворюємо запит у вектор 📐 3. Compare Рахуємо cosine similarity до всіх документів 🏆 4. Rank Сортуємо за схожістю 📤 5. Top-K Повертаємо K найрелевантніших Важливо: документи ембедяться один раз (індексація), а запит — при кожному пошуку. Тому пошук швидкий навіть на мільйонах документів. 🧪 Інтерактивний пошук Спробуй сам: введи запит або обери готовий. Пошук іде по 15 документам на різні теми. Схожість рахується за імітацією embeddings (у реальності це робить модель типу text-embedding-3-small). 🔎 Шукати як доглядати за котеням найкращий рецепт борщу як навчити собаку командам ремонт машини своїми руками тренування для набору м'язів як медитувати новачку Top-K: 5 Скільки найрелевантніших документів повертати. Менше → точніше; більше → ширший контекст для RAG. Документів у базі: 15 Час пошуку: — Найкращий score: — 🎲 Top-K і Top-P: два різних світи ⚠️ Обережно з термінологією «Top-K» трапляється у двох різних контекстах, і їх легко сплутати. Це не одне й те саме: 🔎 Top-K у similarity search Скільки документів повертати з vector DB після ранжування за схожістю. db.search(vector, top_k=5) Це те, що ми показували у секції вище — 5 найближчих сусідів. 🤖 Top-K / Top-P у LLM generation Як модель обирає наступний токен при генерації відповіді. llm.generate(prompt, top_k=40, top_p=0.9) Керує «випадковістю» виводу разом з temperature. Як LLM обирає наступний токен На кожному кроці LLM видає розподіл імовірностей по всьому словнику (50K+ токенів). Далі потрібно обрати один — і тут є варіанти: - Greedy — завжди найімовірніший токен (детерміновано, але нудно) - Top-K — залишаємо тільки K найімовірніших, семплимо з них - Top-P (nucleus) — залишаємо найменший набір токенів, сума ймовірностей яких ≥ P - Top-K + Top-P разом — спочатку обрізаємо по K, потім по P (типово у production) Prompt: «Найкращий напій зранку — це ?» Greedy Top-K Top-P (nucleus) Top-K + Top-P Top-K5 Top-P0.90 Temperature1.00 🧭 Як обирати параметри 🎯 Точні задачі temperature=0 (greedy). Класифікація, extraction, код — коли потрібен детермінований вивід. 💬 Діалог, chat temperature=0.7, top_p=0.9. Баланс між різноманітністю та адекватністю. ✍️ Творчість temperature=1.0+, top_p=0.95. Генерація історій, ідей, brainstorming. ⚙️ Typical production Встановлюють обидва: top_k=40 як «запобіжник» від совсім випадкових токенів + top_p=0.9 для адаптивного відсікання хвоста. Головна відмінність K vs P: top-K бере фіксовану кількість (завжди рівно K кандидатів), а top-P адаптивний — може залишити 2 токени, якщо модель впевнена, або 50, якщо розподіл «розмазаний». Саме тому top-P часто дає природніший результат. 🔀 Hybrid Search: BM25 + Semantic Semantic search крутий, але у нього є слабкі місця: рідкісні терміни, артикули товарів, імена, коди помилок. Embeddings їх «розмивають». А класичний keyword-пошук (BM25) — навпаки, ідеально ловить точні збіги, але губить сенс. Hybrid search поєднує обидва підходи: шукає і за ключовими словами, і за семантикою, а потім об'єднує результати. Це стандарт для production RAG у 2025 році. Два гравці 🔤 BM25 (keyword) «Best Matching 25» — покращена версія TF-IDF. Враховує частоту термінів у документі та рідкість у всій колекції. ✓ Точні збіги: артикули, ID, коди ✓ Рідкісні/технічні терміни ✓ Швидкий, легко масштабується ✗ Не розуміє синонімів ✗ Не враховує контекст Elasticsearch, OpenSearch, Lucene 🧠 Semantic (dense) Векторний пошук через embeddings + cosine similarity. Порівнює зміст, а не слова. ✓ Синоніми, перефразування ✓ Крос-мовний пошук ✓ Розуміє контекст ✗ Губить рідкісні терміни ✗ Плутає схожі, але різні поняття Pinecone, Qdrant, Weaviate, pgvector 🔀 Hybrid (BM25 + Semantic) Запускаємо обидва пошуки паралельно, об'єднуємо результати за зваженою формулою або RRF. ✓ Точність BM25 + розуміння semantic ✓ Стабільний на будь-яких запитах ✓ Найкращий recall для RAG ✗ Складніша інфраструктура ✗ Потрібно тюнити вагу α Weaviate, Qdrant, Elastic+vector Як об'єднують результати Є два популярні способи: 1. Weighted score (alpha-blend) — нормалізуємо обидва скори до [0,1] і змішуємо: score_(hybrid) = α × score_(semantic) + (1 − α) × score_(BM25) α = 0 → чистий BM25 · α = 1 → чистий semantic · α = 0.5 → 50/50. Типово беруть α ≈ 0.5–0.7. 2. Reciprocal Rank Fusion (RRF) — не дивимось на скори взагалі, тільки на ранги: RRF(d) = Σ 1 / (k + rank_(i)(d)) · типово k = 60 Документ, який потрапив у топ-3 обох пошуків, отримує високий RRF. Перевага — не треба нормалізувати скори (BM25 може давати 0–30, а cosine — 0–1). 🧪 Порівняй сам: BM25 vs Semantic vs Hybrid Введи запит і дивись, як три алгоритми по-різному ранжують ті самі документи: error 500 api як навчити собаку iPhone 15 Pro Max рецепт страви з м'ясом SKU-4471 🔎 Порівняти ← BM25 (keyword) α = 0.50 Semantic → 🔤 BM25 🧠 Semantic 🔀 Hybrid (α-blend) Практична порада: майже всі серйозні RAG-системи 2024–2025 використовують саме hybrid — bare semantic search дає на 10–30% гірший recall на реальних запитах (особливо з абревіатурами, номерами, іменами). Weaviate, Qdrant, Elastic і Pinecone всі мають hybrid з коробки. 🚀 Exact vs Approximate Nearest Neighbors (ANN) Коли документів мало — можна порівняти запит з усіма векторами (brute force). Але на мільйонах векторів це занадто повільно. Тому у production використовують ANN-алгоритми (HNSW, IVF, ScaNN), які жертвують крихтою точності заради швидкості. 🎯 Exact Search (brute force) Точність100% СкладністьO(N × D) На 1M векторів~сотні мс Колидо ~100K ⚡ ANN (HNSW, IVF) Точність (recall)~95-99% СкладністьO(log N) На 1M векторів~1-10 мс Коли100K+ Популярні vector DB: Pinecone, Qdrant, Weaviate, Milvus, pgvector (для Postgres), Chroma. Усі вони використовують ANN під капотом — ти просто викликаєш .search(vector, top_k=5). 💡 Де застосовують similarity search 🤖 RAG-системи Знаходимо релевантні чанки з бази знань та даємо їх LLM як контекст. Основа ChatGPT-like асистентів на власних даних. 🔍 Семантичний пошук Пошук по документах, код-базі, FAQ за змістом. Notion, Linear, Slack — всі використовують. 🎬 Рекомендації «Схоже на те, що ти дивився». Netflix, Spotify, YouTube — embeddings + similarity. 🖼️ Пошук зображень Image embeddings (CLIP) → знаходь фото за текстовим описом або схожі картинки. 🛒 E-commerce «Схожі товари», пошук по фото, кластеризація відгуків клієнтів. 🚨 Детекція дублікатів Знаходимо майже-дублікати статей, заявок, тікетів, коду — навіть якщо перефразовано. AI Engineering Course · Заняття 7 · Embeddings & Semantic Systems"}, {"file": "multimodal-embeddings.html", "title": "Multimodal Embeddings", "badge": "7", "text": "🌐 Embeddings не тільки для тексту Один патерн для всього: зображення, звук, код, користувачі 💡 Головна ідея Embedding — це не про текст. Це універсальний патерн. Будь-що, що можна перетворити в вектор так, щоб схожі об'єкти опинялись близько — стає придатним для similarity search, рекомендацій, кластеризації та RAG. Подивись, що стає векторами у сучасних системах: 📝 Text 1536 dim text-embedding-3-small, Cohere, Voyage 🖼️ Image 512 dim CLIP, DINO, SigLIP 🔊 Audio 768 dim Whisper, Wav2Vec 2.0, CLAP 💻 Code 1024 dim voyage-code-3, CodeBERT, CodeT5 👤 User / Item 64–256 dim Two-tower, DSSM, graph embeddings 🖼️ Image Embeddings (CLIP) CLIP (Contrastive Language-Image Pre-training) від OpenAI — модель, яка вивчила спільний простір для картинок і тексту. Обидва перетворюються у вектори в одному просторі, тому можна шукати картинки текстовим запитом (і навпаки). Магія спільного embedding space 🔤 Text Encoder \"a photo of a cat\" \"собака на пляжі\" \"pizza with pepperoni\" → → 🎯 Shared Vector Space [0.12, -0.84, 0.45, ...] Картинка з котом і текст \"a cat\" мають близькі вектори 🖼️ Image Encoder 🐱 [JPEG] 🐕 [PNG] 🍕 [JPEG] → → 🎯 Той самий простір [0.10, -0.81, 0.48, ...] Vision Transformer кодує пікселі у ту ж геометрію 🔎 Спробуй: пошук зображень текстом Введи опис — CLIP знайде найбільш релевантні картинки: милий котик собака грає на пляжі їжа італійська автомобіль швидкий природа ліс sunset over ocean 🔎 Знайти Де це працює: Google Photos (\"знайди фото з собаками на пляжі\"), Pinterest, Unsplash search, e-commerce visual search, content moderation, автотегування медіатек. 🔊 Audio Embeddings Звук теж можна закодувати у вектор. Аудіо-embedding вчиться на мільйонах годин подкастів, музики, мови — так, щоб схожі звуки мали близькі вектори: два гавкання собак, два голоси однієї людини, два треки в одному жанрі. Популярні моделі: - Whisper (OpenAI) — speech embeddings, мова → вектор - Wav2Vec 2.0 (Meta) — self-supervised на сирому аудіо - CLAP (Contrastive Language-Audio) — спільний простір звук ↔ текст, як CLIP - Spotify's musicnn — embeddings для жанрів та настрою треків 🎧 Приклад: пошук треків за настроєм Обери настрій — знайде найбільш схожі аудіо у базі (за їх embeddings): ⚡ Energetic 🌊 Calm 💧 Sad 🎉 Party 🎯 Focus Крім музики — audio embeddings використовують для: - 🎙️ Speaker identification — «це той самий голос?» - 🎵 Shazam-like пошук треку за фрагментом - 🔔 Детекція подій — плач дитини, розбите скло, постріли - 🦉 Biodiversity monitoring — розпізнавання видів птахів за співом 💻 Code Embeddings Код — це окрема модальність. Звичайна text-модель погано розуміє синтаксис, сигнатури функцій, AST. Тому існують спеціалізовані моделі: voyage-code-3, CodeBERT, CodeT5, StarCoder embeddings. 🔍 Query: \"сортування масиву у Python\" 📄 utils/sort.py similarity: 0.91 def quick_sort(arr): # рекурсивний quicksort if len(arr) <= 1: return arr pivot = arr[len(arr) // 2] return quick_sort([x for x in arr if x < pivot]) + \\ [pivot] + \\ quick_sort([x for x in arr if x > pivot]) 📄 helpers.py similarity: 0.87 def order_items(items): # сортуємо за зростанням return sorted(items, key=lambda x: x.value) 📄 search.py similarity: 0.42 def binary_search(arr, target): left, right = 0, len(arr) - 1 while left <= right: mid = (left + right) // 2 ... 📄 validator.py similarity: 0.18 def validate_email(email: str) -> bool: return \"@\" in email Навіщо окремі моделі для коду? Звичайний text-embedder бачить for i in range(10) як «просто текст». А code-embedder розуміє: - 🧩 Структуру AST — яка функція що викликає - 🔗 Семантику операцій — arr.sort() і sorted(arr) роблять схоже - 📚 Docstrings і коментарі — як контекст для функції - 🌐 Крос-мовність — Python def і JS function — схожі концепти Де використовують: GitHub Copilot, Cursor, Sourcegraph Cody, semantic code search, детекція дублікатів коду, автоматичний рев'ю, knowledge base по внутрішньому монорепо. 👤 User/Item Embeddings у рекомендаційних системах Найбільш цікаве застосування — embeddings для людей і товарів. Spotify, TikTok, Netflix, Amazon, YouTube — всі кодують користувачів і контент в одному векторному просторі. 👤 User embedding Вектор, який узагальнює смаки користувача з історії взаємодій (лайки, перегляди, час прослуховування, скіпи). Ти слухав багато рок-музики з 2010-х → твій вектор зсувається в бік «рок/ретро» у просторі. 🎵 Item embedding Вектор для треку/відео/товару, що кодує його властивості: жанр, темп, тема, автор, цільова аудиторія. Два треки з однаковим настроєм — поруч у просторі, навіть якщо в різних жанрах. 🪄 Рекомендація = similarity search Знайти треки, чиї item-вектори найближчі до user-вектора. Той самий патерн, що й у text search — просто інші embeddings. 🎧 Приклад: Spotify-like рекомендації Обери користувача — подивись, які треки йому порекомендує система на основі «embedding-близькості»: 🎸 Rock fan 🎛️ Electronic 🎻 Classical 🎤 Hip-Hop 👤 Історія лайків 🎯 Рекомендації (найближчі item-вектори) Як вчать такі embeddings Популярні підходи у production recsys: - Matrix Factorization — класика: user × item матриця → два embedding-таблиці - Two-tower models (Google, YouTube) — окремі нейромережі для user і item, cosine між векторами - Graph embeddings (node2vec, PinSage) — Pinterest кодує як поведінку, так і структуру графа «board → pin» - Sequential models (BERT4Rec, SASRec) — враховують порядок взаємодій TikTok's secret sauce: TikTok робить user embedding у реальному часі на основі мікросигналів (скролл, rewatch, скіп на 2-й секунді). Саме тому стрічка адаптується за 10–20 відео. Content embeddings враховують аудіо + відео + текст субтитрів + OCR. 🔄 Cross-modal: найцікавіше попереду Коли різні модальності живуть у спільному просторі — відкриваються неочікувані сценарії пошуку: 🖼️ Image → 📝 Text description 📝 Text query → 🎵 Music 🎤 Voice recording → 📄 Similar documents 🎬 Video → 🛒 Similar products Це не фантастика — Google Lens, Amazon StyleSnap, TikTok's sound search вже це роблять. 🎯 Ключовий висновок Embedding — це мова, якою комп'ютер описує «схожість» Щойно ти навчився думати в термінах векторів і cosine similarity — ти розумієш, як працює пошук, рекомендації, RAG, multimodal AI і навіть face recognition. Це один патерн, який масштабується від тексту до будь-якої модальності. AI Engineering Course · Заняття 7 · Embeddings & Semantic Systems"}, {"file": "vector-databases-in-production.html", "title": "Vector Databases In Production", "badge": "8", "text": "🗄️ Vector Databases у продакшні Як обрати між Qdrant, FAISS і Pinecone. Що таке HNSW. Скільки коштує мільйон ембедінгів. І коли РЕАЛЬНО потрібна векторна БД, а коли ні. 🎬 Як vector DB працює в AI-проєкті — повний flow Анімація показує, що відбувається коли користувач задає питання у твоєму RAG-чатботі [] ▶ Програти ⟲ Reset Натисни «Програти» 🔑 Ключовий момент: Embedding — це «адреса» у векторному просторі, а не сам текст. Vector DB зберігає 3 поля: id, embedding (для пошуку), payload (з оригінальним текстом). Retriever знаходить найближчий вектор, бере id, і повертає текст з payload. Embedding не декодується назад у текст — це односторонній процес. 🛠️ Як це виглядає в коді: повний RAG-pipeline (klick для деталей) from anthropic import Anthropic from qdrant_client import QdrantClient from openai import OpenAI oai = OpenAI() qdrant = QdrantClient(\"localhost\", port=6333) claude = Anthropic() def rag_answer(user_question: str) -> str: # 1. EMBED: текст питання → вектор q_vector = oai.embeddings.create( input=user_question, model=\"text-embedding-3-small\" ).data[0].embedding # 2. RETRIEVE: vector DB повертає top-3 з payload (текстом!) results = qdrant.search( collection_name=\"docs\", query_vector=q_vector, limit=3, ) # results = [ # ScoredPoint(id=17, score=0.91, payload={\"text\": \"Profile cProfile...\"}), # ScoredPoint(id=42, score=0.87, payload={\"text\": \"Cython compiles...\"}), # ScoredPoint(id=88, score=0.84, payload={\"text\": \"JIT via PyPy...\"}), # ] # 3. ASSEMBLE PROMPT: склеюємо тексти в <context> з нумерацією context = \"\\n\".join([ f\"[{i+1}] {r.payload['text']}\" for i, r in enumerate(results) ]) messages = [ { \"role\": \"user\", \"content\": ( f\"<context>\\n{context}\\n<\/context>\\n\\n\" f\"Відповідай ТІЛЬКИ на основі context. \" f\"Цитуй джерела як [1] [2] [3].\\n\\n\" f\"Питання: {user_question}\" ) } ] # 4. LLM: фінальна генерація з grounded-контекстом response = claude.messages.create( model=\"claude-sonnet-4-6\", max_tokens=500, system=\"Ти — асистент. Відповідай коротко і з посиланнями.\", messages=messages, ) return response.content[0].text # Виклик: print(rag_answer(\"як прискорити Python код?\")) # → «Щоб прискорити Python: 1) Профілюй коду через cProfile [1]. # 2) Компілюй критичні функції в C через Cython [2]. # 3) Використовуй PyPy — JIT дає ~5× прискорення [3].» 1Навіщо взагалі vector database Embedding — це масив з 384 / 768 / 1536 / 3072 чисел (float). Один вектор — ~6 KB (для 1536d float32). Мільйон векторів = ~6 GB. Питання: як знайти серед мільйона той вектор, який найближчий до твого query-вектора? Брутальний підхід (без БД) import numpy as np vectors = np.load(\"all_vectors.npy\") # (1_000_000, 1536) query = embed(\"шукаю про Python\") # (1536,) # cosine similarity з кожним вектором scores = vectors @ query / (np.linalg.norm(vectors, axis=1) * np.linalg.norm(query)) top10 = np.argsort(-scores)[:10] # ← ~2-5 секунд на CPU Це працює до ~100K векторів. Далі стає повільно і дорого тримати в RAM. На 10M векторів — 60 GB RAM і 30+ секунд на запит. Ось тут починається vector database. Чому саме 100K — точка перелому Нижче ~100K векторів звичайний numpy.dot() через всі вектори працює достатньо швидко (50-200ms на запит), а вся складність vector DB (Docker, schema, embeddings versioning, backup) — оверхед, який тобі не потрібен. Векторів RAM Час 1 пошуку (M1 Pro) Чи треба vector DB? ---------- -------- ----------------------- --------------------- 1K 6 MB < 5 ms ❌ Точно ні 10K 60 MB ~15 ms ❌ Ні 100K 600 MB ~150 ms ⚠️ Гранична зона 1M 6 GB ~1.5 sec ✅ Так 10M 60 GB ~15 sec ✅ Обов'язково Повний приклад: semantic search без БД (30 рядків) import numpy as np from openai import OpenAI oai = OpenAI() def embed(text: str) -> np.ndarray: resp = oai.embeddings.create(input=text, model=\"text-embedding-3-small\") return np.array(resp.data[0].embedding, dtype=\"float32\") # === BUILD (раз на день у CI або при старті) === docs = [\"Python is a programming language.\", \"Pandas is a data analysis library.\", # ... 50 000 документів ] vectors = np.array([embed(d) for d in docs]) np.savez(\"index.npz\", vectors=vectors, docs=np.array(docs, dtype=object)) # === SEARCH (у твоєму FastAPI handler) === INDEX = np.load(\"index.npz\", allow_pickle=True) vectors_norm = INDEX[\"vectors\"] / np.linalg.norm(INDEX[\"vectors\"], axis=1, keepdims=True) def search(query: str, top_k: int = 10): q = embed(query) q = q / np.linalg.norm(q) scores = vectors_norm @ q # ← один matmul, дуже швидко top_ids = np.argsort(-scores)[:top_k] return [(INDEX[\"docs\"][i], float(scores[i])) for i in top_ids] print(search(\"як прискорити Python\")) Це повноцінний semantic search. Жодного Docker, жодного API key до Pinecone, жодного gRPC. Vector DB сюди — як ракета, щоб дістатися магазину. Коли все ж брати vector DB до 100K Сценарій Чому БД виграє ------------------------------------------------- ------------------------------------------------------------------ Часті оновлення (інкрементально нові документи) numpy → перезапис файла; БД → upsert одного вектора Складні фільтри (geo, range, повнотекстовий) numpy → boolean mask стає страшним Multi-tenant (різні користувачі — різні дані) numpy → один файл на tenant; БД → namespace/collection з коробки Реплікація / HA numpy → ти сам пишеш sync між інстансами Persistence без переембедингу при рестарті numpy → треба явно save/load; БД → автоматично Простий тест: якщо твої вектори вміщуються в RAM і ти можеш дозволити собі 100-200ms latency — починай з numpy. Перейдеш на Qdrant/Chroma/Pinecone, коли реально впрешся в обмеження. ~6 KB 1 вектор 1536d float32 ~6 GB 1M векторів сирих < 50 ms типовий latency vector DB ~10× економія RAM з квантизацією Що дає vector DB: (1) індекс для швидкого approximate nearest neighbor (ANN) пошуку, (2) фільтрацію за метаданими (category=tech AND lang=uk), (3) persistence на диск, (4) масштабування на шарди, (5) update/delete окремих векторів. 2Qdrant, FAISS, Pinecone, Chroma — у чому різниця Це чотири РІЗНІ категорії інструментів, які часто плутають: FAISS Бібліотека від Meta. Це не БД, а набір індексів. In-memory C++ бібліотека. Найшвидші ANN-індекси у світі. Ти сам відповідаєш за persistence, оновлення, фільтрацію, шардинг. ✅ Плюси - Безкоштовна, open-source - Найшвидша (особливо на GPU) - Багатий вибір індексів ❌ Мінуси - Не БД — нема CRUD, фільтрів - Сам пишеш save/load - Складно шардувати Qdrant Open-source vector DB. Self-hosted або managed. Написана на Rust. Повноцінна БД з REST/gRPC API. Запускається в Docker за 30 секунд. Є managed-варіант (Qdrant Cloud). ✅ Плюси - Open-source — твої дані - Швидка фільтрація за payload - Локально для розробки ❌ Мінуси - Сам деплоїш / моніториш - Шардинг ручний - Менша ecosystem ніж Pinecone Pinecone Managed serverless. Платиш — отримуєш API. Закрите рішення. Створюєш index у веб-UI, отримуєш URL і API key. Все scaling / repair / backup — на боці Pinecone. ✅ Плюси - Zero ops — все managed - Auto-scaling серверлес - Швидкий старт ❌ Мінуси - Vendor lock-in - Дорого на великих масштабах - Не self-hostable Chroma «SQLite для embeddings». AI-first, для швидких прототипів. Open-source, написана на Python+Rust. Запускається в одному рядку chromadb.Client(). Глибока інтеграція з LangChain і LlamaIndex . 2. Індекс будується один раз, використовується мільйони разів. Інвестиція окуповується. 3. HNSW — дефолт у 90% продакшнів. Знати її параметри (M, ef_construction, ef_search) — обов'язково. 4. Індекс ≠ payload. Граф у RAM, оригінальний текст — на диску у payload. 5. Зміна embedding-моделі = повна перебудова індексу. Тому версіонуй колекції. 4Типи індексів — як працює ANN Точний пошук серед мільйона векторів — повільний. Тому використовують Approximate Nearest Neighbor (ANN) — індекси, які жертвують 1-3% точності заради ×100 швидкості. Flat (brute-force) точність 100% швидкість ❌ RAM 100% Перебір усіх векторів. Baseline для порівнянь. До ~100K — ОК. [] Сканує КОЖЕН вектор по черзі IVF (Inverted File) точність ~95% швидкість ⚡⚡ RAM 100% Кластеризує вектори (k-means), пошук йде тільки в найближчих кластерах. Швидкий build, ОК для статичних даних. [] Знаходить найближчий кластер → сканує тільки його HNSW (граф) точність ~98% швидкість ⚡⚡⚡ RAM 130% Hierarchical Navigable Small World. Багатошаровий граф зв'язків. Дефолт у Qdrant, Pinecone, Milvus. Найкращий баланс. [] Стрибає згори вниз: довгі хопи на L2 → точність на L0 PQ / Quantization точність ~92% швидкість ⚡⚡ RAM 10% Product Quantization — стискає вектори в 8-32× менше байт. Комбінують з HNSW (HNSW+PQ) для великих обсягів. [] Розбиває на під-вектори → кодує номером з кодбука Як працює HNSW (спрощено) [] Аналогія для розуміння Уяви, що тобі треба знайти конкретну вулицю в незнайомому місті. Поганий варіант — обходити кожну вулицю. Розумний варіант: 1. Літак (L2) — летиш над країною, бачиш міста. Вибираєш найближче місто до цілі. 2. Машина по трасі (L1) — приїхав у місто, рухаєшся головними проспектами до потрібного району. 3. Пішки по кварталах (L0) — у районі — обходиш сусідні вулиці, знаходиш точну адресу. Так само працює HNSW: «літак» — це L2, де мало вузлів і дуже довгі зв'язки. «Машина» — L1, середня щільність. «Пішки» — L0, де усі вектори і короткі зв'язки до сусідів. Як алгоритм будує граф (insert) 1. Кинь монетку для нового вектора — з імовірністю ~1/16 він потрапляє на L1, з ~1/256 — на L2 (експоненційний розподіл по рівнях). 2. На кожному рівні, де новий вектор «живе», знайди його M найближчих сусідів і з'єднай ребрами. 3. Параметр M = скільки сусідів зберігати (зазвичай 16-64). Більше M → точніше, але більше RAM. 4. Параметр ef_construction = скільки кандидатів перебирати при insert (64-512). Більше → краща якість графа, але повільніший build. Як працює пошук (search) 1. Старт з фіксованого вузла на верхньому рівні (L2). 2. Greedy жадібний обхід: на поточному рівні дивись на всіх сусідів, перейди до того, хто ближчий до query. Повторюй, поки сусіди не стають дальшими — це локальний мінімум. 3. «Спустись» на рівень нижче через той самий вузол. Повтори greedy-обхід. 4. На L0 зроби розширений пошук: тримай кандидатів у пріоритетній черзі розміру ef_search. Більше ef_search → точніше, але повільніше. 5. Поверни top-K найближчих з фінальної черги. Складність O(log N) кроків на пошук O(N log N) час на побудову ~M·N·8 byte RAM на сам граф (без векторів) ~98% recall@10 на типових ef_search=128 3 ключові параметри HNSW (Qdrant / pgvector / FAISS) Параметр Що це Дефолт Що змінюється коли підняти ----------------- ------------------------------------------------------ -------- ------------------------------------- M Скільки сусідів у кожного вузла графа 16 Точніше, але більше RAM ef_construction Як ретельно будувати граф (один раз при index) 64–128 Кращий граф, але повільніший build ef_search Як ретельно шукати при query (можна міняти на льоту) 64–256 Вищий recall, але повільніший пошук 💡 На практиці тюнять тільки ef_search — це єдиний runtime-параметр. Підняв з 64 до 256 → recall +3-5%, latency ×2. M і ef_construction залишають дефолтними у 95% випадків. Чому HNSW — дефолт у Qdrant, Pinecone, Milvus, pgvector, ElasticSearch - ~98% recall при швидкості ×100-1000 від brute-force на 10M+ векторах - Підтримує incremental insert — не треба rebuild при додаванні нових векторів (на відміну від IVF) - Передбачуваний latency O(log N) — навіть на 1B векторах пошук < 100ms - Параметри прозорі — можна тюнити швидкість/точність на льоту через ef_search без перебудови Trade-offs HNSW: - ~30% більше RAM ніж сирі вектори (граф зберігається в пам'яті). Для 10M × 1536d float32 = ~60 GB векторів + ~18 GB граф. - Видалення проблемне — графи не люблять delete. У Qdrant використовується «soft delete» + періодичний rebuild. - Cold start повільний — після рестарту треба завантажити весь граф у RAM (10-60 сек на 10M векторів). - Filtered search складний — якщо фільтр викидає 90% векторів, граф може «розпастися», обхід стає неефективним. Qdrant і pgvector мають окремі стратегії pre-filter / post-filter. Коли HNSW — НЕ найкращий вибір - < 100K векторів — flat brute-force швидший і точніший - Дуже мало RAM — використай IVF + PQ (10× менше пам'яті ціною ~5% recall) - Часті масові оновлення (перебудова всього індексу щодня) — IVF будується швидше - > 1B векторів — DiskANN (Microsoft) тримає більшу частину графа на SSD з мінімальною втратою якості ------------------------------------------------------------------------ Як працює Flat (brute-force) [] Аналогія для розуміння Тобі треба знайти найближчого за віком серед 1000 людей. Flat — це коли ти заглядаєш у паспорт кожного і запам'ятовуєш найближчий вік. Точно — але повільно: 1000 порівнянь. Як працює пошук 1. Для кожного вектора в базі обчисли відстань до query (cosine / L2 / dot product — формули близькості). 2. Зберігай у пам'яті K найближчих поки проходиш по всіх — як топ-список рекордів. 3. Поверни top-K у відсортованому порядку. 4. Жодного індексу — просто перебір усіх векторів, але дуже швидкий завдяки оптимізаціям CPU (паралельно рахує по кілька чисел за раз). Складність O(N·d) час на 1 запит O(N·d) RAM на вектори 100% recall — точно top-K 0 часу на побудову Коли Flat — оптимальний вибір - < 100K векторів — на 50K × 1536d виходить ~5-15ms на M2 CPU. Швидше ніж build HNSW + швидше ніж network round-trip до Qdrant. - Eval / benchmark — Flat дає 100% точний результат, з яким порівнюють якість інших індексів. - Часті оновлення — додавання/видалення вектора — це O(1), без rebuild. - FAISS Flat / numpy / pgvector без HNSW — готові production-варіанти. ------------------------------------------------------------------------ Як працює IVF (Inverted File) [] Аналогія для розуміння Тобі треба знайти книгу в бібліотеці на 1M томів. Flat — обходиш кожну поличку. IVF — спочатку дивишся на табличку відділу («Історія / Фізика / Поезія…»), заходиш у потрібний відділ і шукаєш тільки там. Якщо книга могла бути на межі двох відділів — заходиш у nprobe=2 найближчих. Як алгоритм будує індекс 1. Кластеризація: алгоритм k-means автоматично групує всі N векторів у nlist «купок» (наприклад 4096) — схожі вектори потрапляють в одну купку. 2. Центр кластера (centroid) — це «середній» вектор усієї купки, її «представник». 3. Список приналежності: для кожного кластера — список ID векторів, які до нього належать. 4. Розмір індексу ≈ розмір сирих векторів + крихітний список центрів. Як працює пошук 1. Порівняй query з усіма центрами кластерів (їх мало — для 1M векторів зазвичай ~1000-4000). 2. Вибери nprobe найближчих кластерів (зазвичай 1-32). 3. Перебери всі вектори всередині цих кластерів (повний скан, але тільки відібраних — це 1-3% від усієї бази). 4. Поверни top-K з усіх відсканованих. Параметри IVF Параметр Що означає Дефолт Trade-off ------------------ ---------------------------------------- ------------------------- ------------------------------------------------------------ nlist Кількість кластерів (K у k-means) √N (для 1M ~ 1024-4096) ↑ → менші кластери, точніше, але більше centroid-порівнянь nprobe (runtime) Скільки кластерів сканувати при пошуку 1-32 ↑ → вище recall, лінійно повільніше Коли IVF — оптимальний вибір - 10M+ векторів зі статичним індексом — швидкий build (хвилини, не години як HNSW). - Часті повні rebuild — k-means кластеризація швидша за побудову графа. - Є GPU — FAISS-GPU прискорює і build, і search у IVF. - Зазвичай комбінують з PQ → IVF-PQ для масштабу 100M+. ------------------------------------------------------------------------ Як працює PQ (Product Quantization) [] Аналогія для розуміння Замість того щоб запам'ятовувати точні координати кожної точки, ти кажеш: «ця точка ≈ біля Києва». У PQ ти ділиш вектор на 8 частин і для кожної зберігаєш номер найближчого «міста» (centroid) з 256 варіантів — це 1 байт. Замість 6144 байтів — 8 байтів. Точність трохи падає (5-15% recall), але економія RAM колосальна. Як алгоритм будує словники (codebooks) 1. Розріж вектор на m рівних частин (наприклад 1536 чисел → 8 шматків по 192). 2. Для кожної частини побудуй «словник» з 256 типових представників (k-means кластеризація на всьому датасеті). 3. Тепер у тебе m словників, у кожному — 256 «типових» під-векторів. 4. Стискай вектор: для кожної з m частин запиши номер найближчого представника (число від 0 до 255 — рівно 1 байт). 5. Стиснений вектор = m байтів (для m=8 → 8 байт замість 6144). Як працює пошук 1. Розріж query на ті самі m частин. 2. Підготуй таблицю відстаней один раз: для кожної частини query порахуй відстань до всіх 256 представників її словника. Виходить маленька таблиця m × 256 чисел — вміщається в швидку пам'ять процесора. 3. Для кожного документа відстань ≈ сума m готових значень з таблиці. Це блискавично швидко — ~10 наносекунд на документ. 4. Поверни top-K. Опціонально — перевір top-100 на повних векторах для точності. Економія ×32–×64 менше RAM ~85–95% recall@10 (vs 100% Flat) 8 byte на 1536d вектор (m=8) 10M = 80MB замість 60GB Параметри PQ Параметр Що означає Дефолт Trade-off ---------- --------------------------------------------------- -------- -------------------------------------- m На скільки під-векторів розбиваємо (має ділити d) 8-16 ↑ → точніше, більше байтів на вектор nbits Бітів на код (зазвичай 8 → 256 центроїдів) 8 ↑ → точніше, повільніший lookup Коли PQ — обов'язковий - > 10M векторів × 1536d — без PQ потрібно 60+ GB RAM, з PQ влізає в ноут. - Edge / mobile inference — модель з мільйонами embedding-ів на телефоні. - HNSW-PQ / IVF-PQ комбо — production-стандарт для billion-scale (FAISS, Milvus). - Re-rank pattern: PQ робить швидкий top-100, потім exact distance на цих 100 для фінального top-10 — отримуєш швидкість PQ + recall ~99%. 5Інтерактив: vector search вживу 🏎️ Vector DB Speed Race — 50 000 векторів Той самий запит паралельно йде в 3 індекси: Flat (повний перебір), HNSW (граф), IVF (кластеризація). Симуляція показує реалістичні latency, кількість «розглянутих» векторів і recall. \"як працює backpropagation\" \"вартість AWS EC2 інстансів\" \"NullPointerException у проді\" \"італійська паста рецепт\" \"оптимізація Python performance\" 🏁 Запустити пошук FAISS Flat brute-force, 100% recall Latency: — Перевірено векторів: — Recall@5: — FAISS HNSW граф, ef_search=64 Latency: — Перевірено векторів: — Recall@5: — FAISS IVF кластеризація, nprobe=8 Latency: — Перевірено векторів: — Recall@5: — Що видно з цієї демки: - HNSW у ×80–×100 швидший за Flat, бо перевіряє лише 200-400 векторів замість 50 000. - Результати майже однакові: top-3 збігаються у 90%+ випадків (recall ~0.95). ANN не страшно. - IVF посередині: швидше за Flat, але recall залежить від nprobe. Зменшиш nprobe — швидше, але recall падає. - На реальних 50K × 1536d це не симуляція, а реальні мс: Flat ~30ms, HNSW ~0.3ms, IVF ~3ms. 6Інтерактив: яку БД обрати під твою задачу Натисни відповіді — отримаєш персональну рекомендацію: Q1: Розмір датасету? < 100K векторів 100K – 10M > 10M Q2: Чи готовий запускати власний сервер (Docker / k8s)? Так, маю DevOps ресурс Ні, хочу managed Зараз прототип, потім розберусь Q3: Бюджет на місяць? $0 (хобі / навчання) < $100 $100 – $1000 $1000+ Q4: Чи потрібна складна фільтрація (за метаданими, geo, дата)? Так, обов'язково Базова фільтрація Тільки vector search 👉 Обери відповіді щоб отримати рекомендацію Відповіді на 4 питання вище згенерують підказку: яка з трьох БД тобі найкраще пасує ch DynamoDB залишається NoSQL key-value базою. Активуєш Zero-ETL інтеграцію → дані автоматично і майже миттєво реплікуються в OpenSearch для vector search. ✅ Коли використати - Вже є DynamoDB у проді (caталоги товарів, user-data) - Не хочеш писати свій ETL-pipeline - Треба combo: швидкі key-value запити + semantic search DynamoDB on-demand + OpenSearch Service Zero-ETL — без додаткової оплати за реплікацію 📄 Amazon DocumentDB Native vector search (MongoDB-сумісна) Vector search додано нативно. Зберігаєш мільйони векторів прямо у JSON-документах. Підтримує HNSW і IVFFlat для швидкого similarity search. ✅ Коли використати - MongoDB-стек, не хочеш міняти API - Документи з рідним JSON + ембеддинг разом - Без сторонніх сервісів — все в одному запиті ~$200/міс (db.r6g.large + 100GB) vector search без додаткової плати 🐘 Aurora / RDS PostgreSQL pgvector extension Для прихильників SQL. Тип vector прямо в таблицях. Можна комбінувати SQL-фільтри (price, date, user_id) з vector search в одному запиті. ✅ Коли використати - Уже працюєш з RDS / Aurora - Треба ACID-транзакції + vector search разом - Складні фільтри з JOIN-ами ~$120/міс (db.t4g.medium + 100GB) pgvector — безкоштовний extension 🪣 Amazon S3 Vectors NEW Vector storage у S3 Перетворює S3-бакети на дешеве сховище для мільярдів векторів. S3 сам виконує similarity search — не треба тримати все в RAM спеціалізованої БД. ✅ Коли використати - Billion-scale датасети (рідкісні запити) - Архівні embeddings — не latency-критичні - Cost-sensitive use cases −90% від in-memory БД ~$0.023/GB/міс storage + per-query Як обрати серед AWS-варіантів Сценарій Що обрати ---------------------------------------------- -------------------------------- Уже є DynamoDB, треба додати semantic search DynamoDB Zero-ETL → OpenSearch MongoDB-стек, JSON-документи DocumentDB з native vector SQL + складні фільтри + до 10M векторів Aurora / RDS pgvector Мільярди векторів, latency не критична S3 Vectors (cost-optimized) Чистий vector workload, високі QPS OpenSearch Service (dedicated) Філософія AWS: «не змушуй компанії мігрувати дані заради AI». Vector search додається там, де дані вже лежать. Це усуває біль data movement — не треба писати ETL, синхронізувати дві БД, дублювати storage. Якщо твій стек уже на AWS — починай з extension/intergation існуючої БД, а не з нової vector DB. Альтернатива: pgvector через managed Postgres 🐘 Якщо в тебе вже є Postgres у хмарі — спробуй pgvector ПЕРШИМ Postgres-extension pgvector підтримує HNSW (з v0.5+) і IVFFlat, доступний у всіх трьох хмарах як managed-сервіс. До ~1M векторів — повноцінна альтернатива окремій vector DB. Бонус: вектори і transactional data в одній БД, JOIN'и працюють. Хмара Сервіс Команда Стартова ціна ------- ---------------------------------- -------------------------- ------------------------- AWS RDS / Aurora PostgreSQL 15+ CREATE EXTENSION vector; ~$15/міс (db.t4g.micro) GCP Cloud SQL for PostgreSQL 15+ CREATE EXTENSION vector; ~$10/міс (db-f1-micro) Azure Database for PostgreSQL Flexible CREATE EXTENSION vector; ~$13/міс (B1ms) Швидкий приклад: pgvector + HNSW -- 1. Включити extension CREATE EXTENSION IF NOT EXISTS vector; -- 2. Створити таблицю з vector-колонкою CREATE TABLE docs ( id BIGSERIAL PRIMARY KEY, content TEXT NOT NULL, metadata JSONB, embedding vector(1536) NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW() ); -- 3. HNSW індекс (доступний з pgvector 0.5+) CREATE INDEX ON docs USING hnsw (embedding vector_cosine_ops) WITH (m = 16, ef_construction = 64); -- 4. Insert з Python -- INSERT INTO docs (content, embedding) VALUES ('Python is...', '[0.1, 0.2, ...]') -- 5. Пошук top-5 з фільтром SELECT id, content, 1 - (embedding <=> '[0.1, ...]'::vector) AS similarity FROM docs WHERE metadata->>'lang' = 'uk' ORDER BY embedding <=> '[0.1, ...]'::vector LIMIT 5; Як обрати між native cloud і dedicated vector DB Якщо… Бери ---------------------------------------------------------- -------------------------------------------------- Вже на AWS/GCP/Azure, до 1M векторів, є Postgres pgvector на managed Postgres твоєї хмари На AWS, треба hybrid search + великі ES-знання в команді OpenSearch Service На GCP, >100M векторів, Google embeddings Vertex AI Vector Search (ScaNN) На Azure + Azure OpenAI, треба best-in-class hybrid Azure AI Search Multi-cloud або планується перехід між хмарами Qdrant self-hosted — однаково на будь-якій хмарі Не хочеш ніякого ops, навіть managed Postgres Pinecone або Qdrant Cloud Lock-in попередження: native cloud-сервіси прив'язують тебе до конкретної хмари. ScaNN-індекси з GCP не переносяться у AWS, OData filters Azure не працюють у OpenSearch. Якщо є шанс міграції — Qdrant дає portable-стек з однаковим API на будь-якій інфраструктурі. 9Tenant, multi-tenancy і namespace У SaaS-продуктах vector DB обслуговує багатьох клієнтів одночасно. Перш ніж говорити про архітектуру — три терміни, без яких далі не зрозуміло: 🏢 Tenant — окремий клієнт Tenant (від англ. «орендар») — це ізольований клієнт / користувач / організація у твоїй системі, який має свої дані і не повинен бачити чужі. - Slack workspace «Acme Corp» — один tenant - Slack workspace «Beta Inc» — інший tenant - Один акаунт ChatGPT з memory — один tenant - Один проєкт у Notion — один tenant Tenant ID — унікальний ідентифікатор: UUID, slug (acme-corp), або internal ID. Цей ID використовуєш як key для ізоляції. 🏘️ Multi-tenancy — одна система для багатьох клієнтів Single-tenant Multi-tenant ------------------------------ ----------------------------------- Окрема БД на кожного клієнта Одна БД для всіх, ізоляція в коді Дорого, повний ізолят Дешево, треба правильно ізолювати Enterprise (банки, медицина) Більшість SaaS (Slack, Notion) 1 клієнт = 1 environment 1000 клієнтів = 1 environment Tenant leak = катастрофа. Якщо клієнт A побачить дані клієнта B навіть один раз — порушення SLA, втрата контракту, можливий судовий позов (GDPR / CCPA). Ізоляція — це fundamental requirement, не «опція». 📦 Namespace — логічна ізоляція всередині індексу Namespace — це логічний розділ всередині однієї vector DB-колекції, який ізолює дані одних tenants від інших на рівні API. Один індекс ├─ namespace: \"tenant_acme\" → 5K векторів ├─ namespace: \"tenant_beta\" → 12K векторів └─ namespace: \"tenant_...\" → ... Запит до namespace бачить тільки свої вектори — leak неможливий на рівні API. 🔧 3 архітектури multi-tenancy у Vector DB Підхід Ізоляція Recall Складність Коли ------------------------------ ------------------------ --------- ------------------------------------------ ---------------------------- Filter (tenant_id у payload) 🟡 покладається на код 🟡 ~80% 🟢 простий <100 тенантів Namespace ✅ 🟢 на рівні API 🟢 ~95% 🟢 простий 100-100K тенантів Collection per tenant 🟢 повна 🟢 ~95% 🔴 1000 collections = операційний кошмар окремий runtime per tenant 💡 Як виглядає в кожній БД # Pinecone — \"namespace\" як параметр виклику index.query(namespace=\"tenant_acme\", vector=q, top_k=10) # Qdrant — це називається \"collection\" client.search(collection_name=\"docs_acme\", query_vector=q) # Chroma — теж collection collection = client.get_collection(\"docs_acme\") collection.query(query_embeddings=[q], n_results=10) # pgvector — RLS (Row Level Security) + tenant_id колонка SELECT * FROM docs WHERE tenant_id = current_setting('app.tenant_id')::uuid ORDER BY embedding <=> '[...]' LIMIT 10; 🚨 4 правила namespace 1. Кожен namespace — свій HNSW-підграф → recall кращий, ніж filter (граф не «розмивається» між тенантами). 2. Namespace name — з validated source, ніколи не з user input напряму. Інакше — leak. 3. Cross-namespace search не працює з коробки — пишеш manual RRF fusion якщо треба. 4. Filter ≠ namespace: filter — runtime check, namespace — фізична ізоляція + окремий граф. Правило для SaaS RAG: якщо у тебе більше одного клієнта — бери namespace (Pinecone) або collection per tenant (Qdrant) одразу. Filter-only підхід для 1000 тенантів — fail на enterprise-співбесіді і реальна загроза витоку даних у проді. 10Filtering — фільтрація за метаданими У production query майже ніколи не «знайди семантично схоже». Воно завжди звучить як «знайди семантично схоже в моєму tenant + за останні 30 днів + категорія = tech». Filtering — це SQL-подібні умови, які накладаються поверх векторного пошуку. Як виглядає у коді // Qdrant client.search( collection_name=\"docs\", query_vector=embed(\"як налаштувати pgvector\"), query_filter=Filter( must=[ FieldCondition(key=\"category\", match=MatchValue(value=\"database\")), FieldCondition(key=\"date\", range=Range(gte=\"2024-01-01\")), FieldCondition(key=\"lang\", match=MatchValue(value=\"uk\")), ] ), limit=10, ) Виглядає просто — але під капотом це найскладніша частина vector DB. Питання: коли застосовувати фільтр — до чи після векторного пошуку? Дві стратегії: Pre-filter vs Post-filter --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- Стратегія Як працює Коли працює добре Коли ламається ----------------- ------------------------------------------------ ------------------------------------------- ------------------------------------------------------------------------ Pre-filter 1) Знаходить усі документи що проходять фільтр М'який фільтр (60-100% даних залишається) Жорсткий фільтр (1-5% даних) → треба переглянути всю базу, повільно 2) Шукає top-K серед них векторно Post-filter 1) Робить ANN-пошук top-K по всьому індексу Дуже жорсткий фільтр + великий K Жорсткий фільтр + малий K → можна не повернути нічого (всі K викинуто) 2) Викидає ті, що не проходять фільтр --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- Чому HNSW «розпадається» на жорсткому фільтрі [] HNSW працює тому, що сусіди в графі допомагають швидко наблизитись до query. Якщо фільтр викидає 90% вузлів, у решти 10% можуть не залишитися зв'язки між собою — граф буквально розрізається на ізольовані острівці. Алгоритм або не знаходить target (recall падає до 50-70%), або сканує величезну кількість вузлів в пошуках (latency злітає у 5-10×). Як рішають у production Рішення Що робить Де є ---------------------- ----------------------------------------------------------------------------------------------------------------------------------- ---------------------------------- Payload index Окремий B-tree / hash на metadata-полях. БД спочатку знаходить ID-сет за фільтром, потім робить векторний пошук тільки серед них. Qdrant, Weaviate, Pinecone Filterable HNSW Граф будується з урахуванням потенційних фільтрів — додаткові ребра між «сусідами в одній категорії». Qdrant (експериментально), Vespa Multiple collections Якщо є 5 категорій — створи 5 окремих індексів. Filter = вибір індексу. Recall ідеальний. Будь-яка БД Increase ef_search Хак: при фільтрах підняти ef_search у 5-10× щоб граф «не розривався». Будь-який HNSW Що питати від БД при оцінці filtering-а: - Чи можна індексувати payload-поля (B-tree, full-text, geo)? - Чи підтримуються складні умови (AND / OR / NOT, range, in-list)? - Як БД поводиться при фільтрі що викидає >95% даних? - Чи є метрики/логи, які показують recall при фільтрації? Мінімум що треба знати: filtering поверх vector search — це не безкоштовно. На жорстких фільтрах (<5% даних залишається) HNSW втрачає recall і latency. Рішення — payload index у Qdrant/Pinecone або multiple collections для наперед відомих категорій. Не плутай filter з namespace: filter — runtime-перевірка, namespace — фізична ізоляція з окремим графом. 11Semantic caching — vector DB як кеш для LLM Окремий, дуже корисний use-case vector DB у production: кешування LLM-відповідей. Тут vector DB не для RAG-retrieval, а як замінник Redis для семантично схожих запитів. Проблема: LLM повільні і дорогі - GPT-4 latency: ~2-5 секунд на запит - Cost: $0.01-0.03 на запит - Багато юзерів задають майже однакові питання різними словами Класичний key-value кеш (Redis) тут не працює: cache[\"What is Python?\"] → hit ✅ cache[\"what is python\"] → miss ❌ (lowercase) cache[\"Tell me about Python lang\"] → miss ❌ (інший формулювання) cache[\"Що таке Python\"] → miss ❌ (інша мова) Усі 4 запити мають однакову відповідь, але класичний кеш бачить їх як різні. Hit rate = 25% замість потенційних 100%. Рішення: семантичний кеш [] Як це працює крок за кроком 1. Юзер → query: «Tell me about Python» 2. App embed-ить query: vec = embed(\"Tell me about Python\") 3. Search у vector cache: чи є вже схожий збережений запит? - HIT (similarity ≥ 0.95): повертаєш збережену відповідь — 5ms, $0 - MISS: викликаєш LLM (3s, $0.02) → зберігаєш {vec, answer} у кеш Реальний приклад коду # Спрощено — production версія в langchain.cache.RedisSemanticCache from openai import OpenAI from qdrant_client import QdrantClient client = OpenAI() cache = QdrantClient(\"localhost\") SIMILARITY_THRESHOLD = 0.95 def ask_with_cache(query: str) -> str: # 1. Embed query query_vec = client.embeddings.create( model=\"text-embedding-3-small\", input=query ).data[0].embedding # 2. Search semantic cache hits = cache.search( collection_name=\"llm_cache\", query_vector=query_vec, limit=1, ) if hits and hits[0].score >= SIMILARITY_THRESHOLD: return hits[0].payload[\"answer\"] # ⚡ CACHE HIT # 3. CACHE MISS → call LLM answer = client.chat.completions.create( model=\"gpt-4\", messages=[{\"role\": \"user\", \"content\": query}] ).choices[0].message.content # 4. Store in cache for next time cache.upsert( collection_name=\"llm_cache\", points=[{\"vector\": query_vec, \"payload\": {\"query\": query, \"answer\": answer}}] ) return answer Економія в реальних цифрах ~30-60% типовий cache hit rate ×600 latency (5ms vs 3000ms) −50% витрати на LLM API $0.0001 cost per cached query (тільки embedding) Коли semantic cache НЕ підходить Сценарій Чому проблема ------------------------------------------------- ------------------------------------------------------------------------------------------------------------ Персоналізовані відповіді (з user_id у промпті) Однаковий query від різних юзерів → різні відповіді. Кешуй з namespace по user_id. Real-time дані (ціни акцій, новини) Закешуєш відповідь — а вона застаріла за 5 хвилин. Додай TTL. Multi-turn conversation з контекстом Один і той же question у різних чатах → різні відповіді. Кешуй за хешем (system_prompt + history + query). Високі ставки на точність (medical, legal) Similarity 0.96 ≠ 1.00. Юзер запитав «mg/kg» → знайшов кешований «mg/lb» → катастрофа. Головний trade-off — threshold similarity Threshold Hit rate Точність Коли обирати ----------- ---------- ------------------------ -------------------------------- 0.99 ~5-10% Майже ідентичні запити Високі ставки (legal, medical) 0.95 ~30-50% Перефразування ОК Дефолт для більшості випадків 0.90 ~60-80% Ризик false positive FAQ, customer support 0.85 ~90% Часто повертає не те Майже завжди погано Production-готові рішення - GPTCache (open-source) — найпопулярніша бібліотека, працює з Qdrant/Milvus/FAISS - LangChain RedisSemanticCache, QdrantSemanticCache — drop-in рішення - Redis Vector — офіційне рішення Redis Stack (саме воно на скріні з AWS) - Cloudflare AI Gateway — semantic caching з коробки на edge Підводні камені: - Cold start: перші 1000 юзерів усе ще йдуть до LLM. Cache hit rate росте з часом. - Cache invalidation: якщо змінив system prompt — стара кешована відповідь застаріла. Версіонуй кеш. - Memory cost: кожен запис = 1 вектор (1536d × 4 byte = 6 KB) + текст відповіді. На 10M записів — ~100 GB. - Privacy: ти зберігаєш user queries. Перевір GDPR / data retention policies. Коли застосовувати: chat-боти з частими повторними питаннями, FAQ-системи, customer support, code assistants. Threshold = 0.95 для дефолту, 0.99 — для критичних кейсів. Hit rate 30-50% дає економію ~$50K/міс на 1M юзерах. Це найдешевша оптимізація вартості LLM, яку взагалі можна зробити. 12Embedding drift і моніторинг якості Drift — поступове розходження між старими ембеддингами в БД і новими queries, через яке recall падає, хоча код, БД і модель здаються «такими ж». Це найтихіша і найдорожча проблема production RAG. 📉 Як виглядає drift у часі (інтерактив) [] ▶ Програти 12 місяців ⟲ Reset M0 — деплой 95% recall ⚠️ Помічаєш не з моніторингу — а через customer complaints через 4-6 тижнів. 🌊 4 типи drift Тип Що відбувається Приклад -------------------- ---------------------------------------------- --------------------------------------------- 🔴 Model drift Provider тихо оновив модель без version bump OpenAI silent update text-embedding-3-small 🟠 Data drift Реальний світ змінюється швидше за БД «covid» 2024 vs 2026 — інший контекст 🟡 Domain drift Бізнес додав новий продуктовий vertical Раніше fintech → додали healthcare 🟢 Tokenizer drift Tokenizer оновлено → інші ID токенів Той самий текст → інший embedding 🔍 5 сигналів для моніторингу 1. Падіння avg(top-1 score) — раніше 0.84, сьогодні 0.71 → алерт 2. Eval-set recall — golden 50-100 пар, daily run, recall < baseline-0.05 → алерт 3. «No good results» rate — % запитів з top1.score < threshold 4. Score distribution shift — histogram top-1 scores зміщується ліворуч 5. User feedback — thumbs-down rate, «reformulate query» rate, escalation rate 🛡️ 5 правил захисту (ставляться сьогодні) # 1. Pin model + version у payload { \"id\": \"doc_42\", \"embedding\": [...], \"payload\": { \"text\": \"...\", \"embedding_model\": \"text-embedding-3-small\", \"model_version\": \"2024-12-15\", # ← phantom version \"indexed_at\": \"2025-01-10\" } } # 2. Eval-set runner — щоночі def nightly_eval(): recall = evaluate(golden_queries, golden_answers) if recall < baseline - 0.05: alert(\"Embedding drift detected\", current=recall, baseline=baseline) # 3. Score distribution monitoring (Prometheus / Grafana) top1_score_histogram.observe(results[0].score) # 4. Re-embed на чекпоінтах — раз на 6 місяців # 5. Self-hosted embedder для critical domains (контроль над версією) 💸 Реальна вартість drift'у Метрика Вплив ------------------------------------ -------------------------------------- Recall падає з 95% до 75% за 6 міс −20% retrieval quality CSAT падає на 8-12% Втрата клієнтів, churn Час на виявлення 2-6 тижнів через customer complaints Час на fix (re-embed 10M docs) ~$200 + 1-2 дні engineering Total cost інциденту $50K - $500K залежно від продукту 🚨 Найгірша властивість drift'у — він тихий. Метрики системи зелені (latency OK, error rate 0%), але якість відповідей деградує тижні за тижнями. Без eval-set ти сліпий — побачиш проблему, коли клієнти вже втікають. Правило senior-співбесід: на питання «як моніториш якість retrieval у проді через 6 місяців?» правильна відповідь — «recall@10 на eval-set + score distribution alerting + re-embed budget». Відповідь «та ніяк, vector DB ж не ламається» — fail. 13Метрики vector DB Щоб порівнювати vector DB між собою або відстежувати деградацію в продакшні, потрібен стандартний набір метрик. Він поділяється на три групи: якість пошуку, швидкість, ресурси. 📊 Якість пошуку Recall@10 — головна метрика якості Питання: скільки правильних документів потрапили в топ-10? Навіщо міряти: Recall — основна метрика якості retrieval. Без неї неможливо стверджувати, що БД працює коректно — лише що вона повертає результати. Recall @ K на eval-set — єдиний об'єктивний спосіб порівняти ANN-індекси між собою (HNSW з різними параметрами, IVF, PQ) і оцінити, скільки точності втрачено заради швидкості. У продакшні зниження recall на 5-10% призводить до деградації якості RAG-відповідей, але без вимірювання на стабільному eval-set деградація залишається непоміченою. Формула: Recall@10 = |знайдені_правильні ∩ топ_10| / min(10, |правильні|) Приклад: для query «як готувати борщ» правильні відповіді з ground truth = {doc_42, doc_88, doc_103}. У топ-10 пошук видав {doc_42, doc_15, doc_88, doc_7, ...}. Recall@10 = 2/3 ≈ 0.67 (знайшли 2 з 3). Типові значення: - FAISS Flat → 1.00 (точний пошук, baseline) - FAISS HNSW → ~0.95-0.98 - Qdrant / Chroma / pgvector з HNSW → ~0.93-0.97 Якщо recall < 0.8 — щось зламано (неправильна метрика близькості, забутна нормалізація, невідповідна модель). MRR@10 — наскільки високо стоїть перший правильний Питання: на якій позиції стоїть перший правильний документ? Навіщо міряти: MRR доповнює Recall, оскільки Recall не враховує позицію результату. Дві БД можуть мати однаковий Recall @ 10, але різний порядок документів — у RAG-системах це впливає безпосередньо на якість відповіді, оскільки LLM використовує лише top-3 — top-5 документів через обмеження контексту та вартість токенів. Якщо релевантний документ знаходиться на позиції 8, він не потрапить у prompt, і LLM відповість неправильно. MRR — стандартна метрика для оцінки ranking quality. Формула: MRR = 1 / rank_першого_правильного (0 якщо немає в топ-K) Приклад: - Перший правильний на позиції 1 → MRR = 1.0 (ідеально) - На позиції 3 → MRR = 0.33 - На позиції 10 → MRR = 0.10 - Не знайдено → MRR = 0 Чому важливо: Recall показує «знайшли чи ні», MRR — «наскільки високо». Для RAG це критично: якщо правильний документ на позиції 1 vs 8 — LLM по-різному відповість. ⚡ Швидкість Indexing time — скільки секунд на побудову Час від db.index(vectors) до готового до пошуку індексу. Міряється секундомером (time.perf_counter()). Навіщо міряти: Indexing time визначає operational cost і обмежує операційні сценарії. При додаванні нових документів час побудови індексу впливає на вибір між incremental insert і повним rebuild. При міграції на нову embedding-модель індекс необхідно перебудувати повністю — для 100M векторів різниця між HNSW (години) і IVF (хвилини) визначає тривалість downtime або вартість blue-green deployment з паралельним індексом. Що очікувати на 523K векторів × 384d на M2 Pro CPU: - FAISS Flat → ~1-3 сек (просто копіює в пам'ять) - FAISS HNSW → ~60-120 сек (будує граф) - Qdrant → ~3-6 хв (HNSW + persistence на диск) - pgvector → ~5-10 хв (HNSW у Postgres) - Chroma → ~5-15 хв (повільніший за всіх) Висновок: якщо у проді часто переіндексовуєш — Flat або IVF, не HNSW. Якщо індекс «один раз і назавжди» — HNSW. Query latency p50 / p95 / p99 — НЕ середнє! Чому не average: 1000 запитів — 999 по 5ms і 1 на 10000ms. Середнє = 15ms (виглядає чудово), але 1% користувачів чекає 10 секунд. Навіщо міряти: Latency визначає, чи відповідає БД вимогам SLA. У RAG-системі загальний бюджет latency розподіляється між retrieval та LLM-генерацією; якщо retrieval займає 200ms при бюджеті 50ms — БД не підходить незалежно від recall. Перцентилі p95 і p99 відображають worst-case поведінку під навантаженням, яка не видна у середньому значенні через довгий хвіст розподілу (cache miss, GC pause, мережеві перешкоди). Pareto frontier «recall vs latency» — стандартний інструмент вибору БД: він показує, який recall досяжний при заданому latency-бюджеті. Перцентилі: - p50 (медіана) — половина запитів швидші, половина повільніші. «Типова» швидкість. - p95 — 95% запитів швидші за це число. Те, що бачить «звичайний поганий день». - p99 — 99% швидші. Те, що бачать worst-case користувачі. Ось це і б'є по продукту. Як міряти: import numpy as np latencies = [5.2, 4.8, 6.1, ..., 142.3] # 1000+ замірів у мс p50 = np.percentile(latencies, 50) p95 = np.percentile(latencies, 95) p99 = np.percentile(latencies, 99) Типові значення (top-10 на ~500K векторів): - FAISS Flat → p50 ~30ms, p99 ~50ms (стабільно повільний) - FAISS HNSW → p50 ~0.3ms, p99 ~2ms (×100 швидший!) - Qdrant → p50 ~3-5ms, p99 ~15ms (з network overhead) - pgvector → p50 ~10-30ms, p99 ~80ms - Chroma → p50 ~20-50ms, p99 ~150ms ⚠️ Warmup обов'язковий! Перші 50-100 запитів завжди повільніші (cold cache, JIT, lazy-load). Якщо не зробити warmup → p99 буде у 5× гірший і це не реальна картина. Стандартна практика — пропускати перші 50-100 запитів при бенчмарку. 💾 Ресурси Disk size — розмір індексу на диску Скільки мегабайт займає індекс після db.index(). Включає всі файли БД (а не тільки сирі вектори). Навіщо міряти: Disk size напряму впливає на storage cost у хмарних провайдерах (AWS gp3 — $0.08/GB/міс) та визначає cold start time після рестарту, оскільки БД повинна завантажити індекс у RAM. Метрика показує реальний storage overhead кожної БД відносно розміру сирих векторів: pgvector додає Postgres-структури та B-tree індекси, Qdrant зберігає WAL і payloads, Chroma тримає метадані поруч з векторами. Без цих даних неможливо обґрунтовано вибрати БД при обмеженому storage-бюджеті або спрогнозувати інфраструктурну вартість на 12 місяців. Очікувана арифметика для 523K × 384d float32: - Сирі вектори → 523K × 384 × 4 byte = ~770 MB - FAISS Flat → ~770 MB (плюс trivial overhead) - FAISS HNSW → ~770 MB + ~100-200 MB на граф ≈ ~900 MB - Qdrant → ~900 MB + payloads + WAL ≈ ~1.0-1.2 GB - pgvector → ~1.5-2 GB (Postgres overhead, B-tree індекси на ID) Як міряти: import os, pathlib def folder_size_mb(path): return sum(f.stat().st_size for f in pathlib.Path(path).rglob('*')) / (1024**2) 📈 Pareto frontier — фінальний графік На горизонтальній осі — latency p50 (log scale, бо різниця ×100). На вертикальній — recall@10. Кожна БД — точка. Як читати: - Верхній лівий кут — ідеал (висока recall + низька latency). Туди прагнемо. - Точки на frontier (з'єднані лінією) — оптимальні: для свого latency дають максимум recall. - Точки під frontier — гірші у всьому, не варто обирати. - FAISS Flat зазвичай — правий верхній кут (recall=1, але повільно). - HNSW-варіанти — лівий верхній (швидко + recall ~0.95). Що писати у звіті: «На 523K векторах HNSW дає recall 0.96 при p50=3ms, Flat — recall 1.00 при p50=30ms. Для нашого latency-бюджету 10ms HNSW — оптимальний: жертвуємо 4% recall за ×10 швидкість». Це — мова senior engineer. 📌 Підсумок: 9 правил для vector DB 1. До 100K векторів — тобі не треба vector DB. Numpy + cosine OK. 2. Прототип / навчання: Chroma — embedded, одна стрічка pip install. 3. Прототип з планом продакшну: Qdrant в Docker (30 сек, 0$). 4. MVP / startup: Pinecone serverless або Qdrant Cloud — без DevOps. 5. Уже на AWS/GCP/Azure: подивись native (OpenSearch / Vertex AI / AI Search) або pgvector ПЕРЕД тим як платити Pinecone. 6. 10M+ і свій DevOps: Qdrant self-hosted з шардингом — найкращий cost/performance. 7. FAISS — коли треба максимум швидкості (GPU) і ти не хочеш повноцінну БД. 8. Версіонуй колекції по моделі ембедінгу — інакше міграція = біль. 9. Hybrid search (dense + sparse) перемагає чистий vector майже завжди в продакшні. AI Engineering Course · Lesson 8 · Vector Databases у продакшні"}, {"file": "rag-enterprise.html", "title": "RAG Enterprise", "badge": "9", "text": "RAG Decision Demo — коли RAG, а коли альтернативи Покрутіть параметри — анімація показує, який підхід виграє і чому. Документи летять у відповідну систему. Лекція 9 · Enterprise RAG. Параметри сценарію Розмір корпусу 10 000 docs 505005K50K500K5M50M Тип запиту Factual Creative Structured BD Style / Format Свіжість даних Статичні Оновлюються Real-time Приватність Публічні Внутрішні Цитованість Не критична Обовʼязкова RAG … live simulation docs in flight: 0 · winner: RAG · score: 0 Підказка: click по будь-якому підходу — параметри ліворуч переключаться на сценарій, де він перемагає · space — пауза/гра · R — скинути частинки · слайдер «Розмір корпусу» оновлює сцену в реальному часі. Enterprise RAG Pipeline — живий потік запиту Натисніть «Send query» — побачите, як запит проходить через всі етапи pipeline'у. Документи (offline ingestion) і запити (online retrieval) рухаються окремими кольорами. ▶ Send query Auto-loop: OFF Trigger ingestion speed idle запит користувача · документи (ingestion) · embeddings · retrieved passages · LLM response Повний workflow — як проходить запит 01 Offline ingestion (відбувається періодично, не на кожен запит) Workflow orchestrator (Airflow / Prefect) забирає сирі дані з джерел: S3, бази даних, REST API, корпоративні вікі. Кожен файл проходить multimodal parsing — PDF/DOCX/HTML розбиваються на текст, таблиці й картинки (з captions через VLM). Парсений контент розрізається semantic chunker'ом на смислові фрагменти (типово 256–1024 токенів) і збагачується метаданими — джерело, дата, роль/відділ, мова, версія документа. Embedding model (multilingual encoder) перетворює кожен chunk у вектор. Все летить у vector store разом з payload. 02 User query — старт online частини Користувач задає природномовний запит через web/mobile. Запит потрапляє у query pre-processing: HyDE rewriting (модель генерує гіпотетичну відповідь і шукає по ній), декомпозиція multi-hop запитів на простіші, виявлення intent (factual / aggregation / порівняння). Це критично — від якості переписаного запиту залежить весь retrieval нижче. 03 Hybrid retrieval — паралельно dense + sparse Перепрацьований запит йде паралельно в два пошуки. Semantic search (HNSW по векторному індексу) знаходить семантично схожі chunks. Full-text search (BM25) ловить точні keyword-збіги — імена, абревіатури, коди помилок, де embeddings розмиваються. Поверх обох накладається metadata filtering (наприклад, «тільки документи відділу Legal, доступні role=admin»). Результати фьюзяться через RRF (Reciprocal Rank Fusion) у спільний топ-100 кандидатів. 04 Re-ranking — точне ранжування Cross-encoder (наприклад, BGE-reranker-v2-m3) читає query + chunk разом і дає точний скор релевантності. Це повільніше за bi-encoder, але точніше — тому застосовується тільки до топ-100, які вже відсіяв retrieval. Результат: топ-5 справді релевантних passages, які підуть у LLM. 05 Prompt assembly + LLM inference Зібрані passages вставляються в шаблон промпта з чіткими інструкціями («відповідай тільки з context», «якщо не знаєш — кажи \"не знаю\"», «обов'язково цитуй джерела»). Token budgeting контролює, щоб не вилізти за context window. LLM inference service робить виклик моделі з prompt caching (system prompt + великий context кешуються між запитами на 5 хв — економія $$$) і model routing (простий запит → Haiku, складний → Opus). 06 Guardrails + post-processing Перед тим, як показати відповідь користувачу, вона проходить safety filters (PII detection, заборонений контент), de-hallucination checks (чи кожне твердження підтверджується retrieved context — atomic claim verification) і citation generation (інлайн-посилання на конкретні джерела з номерами сторінок). 07 Final response with citations Користувач бачить відповідь з кліковими цитатами на оригінальні документи. Все запитання разом з retrieved passages, prompt'ом, відповіддю і timestamp'ом логується для audit trail (compliance, GDPR right-to-be-forgotten) і feedback loop — користувач ставить 👍/👎, ці сигнали зливаються в RAGOps дашборд як signal якості retrieval. Перпендикулярні шари (працюють завжди, на всі етапи) - Security & Compliance — IAM, encryption at rest/transit, audit logs, data residency. Кожен chunk має ACL — користувач не бачить документи, до яких немає доступу. - RAGOps & Observability — performance monitoring (latency p50/p95/p99, throughput), evaluation pipeline (groundedness, relevance, toxicity), CI/CD, A/B testing retrieval стратегій. - Feedback loop — позитивні/негативні signals від користувачів зливаються назад у тренування ranking-моделі і в evaluation датасет. Retriever — серце RAG — Dense vs Sparse vs Hybrid+Rerank на одному запиті Виберіть запит — побачите, як три ретрівери ранжують той самий корпус по-різному. Hybrid через RRF + cross-encoder rerank виграє на recall@5 у 9 з 10 випадків. Це і є «industry default». query: «ERR_4042 — як виправити?» «SLA on K8s pods» «як машина паркується сама» «хто з юристів займався Acme у 2024?» ▶ Run retrieval Dense (vector) cosine similarity · BGE-M3 cosine score per document (↑ = closer to query) [] 🟢 relevant · 🔴 irrelevant. Dense buries relevant docs під схожими-але-неправильними. Sparse (BM25) keyword match · IDF weighting BM25 score + які терми знайдено в кожному doc [] 🟡 = term знайдено. Порожньо = нуль. BM25 сильний на рідкісних точних термінах (ERR_4042, SLA, K8s). Hybrid + Rerank production RRF fusion → cross-encoder як RRF зливає два списки → cross-encoder виправляє порядок [] Зелений = relevant. RRF бере найкраще від обох. Reranker підіймає relevant на топ."}, {"file": "context-management.html", "title": "Context Management", "badge": "9", "text": "🧠 Менеджмент контексту в LLM Як вкласти потрібну інформацію в обмежене вікно моделі: layering інструкцій, summarization, пам'ять, prompt assembly та довгі задачі. 1.Терміни: tokens, window, attention 2.Як LLM обробляє контекст 3.Context Rot — більше шкодить 4.6 типів контексту 5.Prompt vs Context engineering 6.4 стратегії: Write/Select/Compress/Isolate 7.Tradeoffs 8.Контекстне вікно (бюджет) 9.Layering інструкцій 10.Prompt assembly 11.Summarization 12.Memory & state 13.Довгі задачі 1Базові терміни Перш ніж говорити про менеджмент контексту — три терміни, без яких далі важко. 🔤 Token Одиниця, в якій LLM «думає». Це не слово, а шматок тексту — в середньому ¾ слова. \"context\" = 1 токен, \"engineering\" = 2 токени. Кириличний токен зазвичай коротший за латинський. 🪟 Context window Загальна кількість токенів, які модель «бачить» одночасно: system prompt, історія, RAG-документи, твоє питання — все разом. У сучасних моделей 128K → 2M токенів. 🎯 Attention Механізм, яким модель вирішує, які токени важливі для яких. Перед генерацією кожного нового токена модель порівнює його з усіма токенами в контексті. Це і сила, і головне обмеження LLM. 2Як LLM обробляє контекст Модель не читає текст «зверху вниз», як людина. Attention порівнює кожен токен з кожним іншим. Теоретично це означає: ідея з першого речення може зв'язатися з ідеєю з останнього. Практично — є дві ціни. Ціна #1: квадратична складність Подвоєння токенів у вікні → ~4× більше обчислень. Довгий контекст непропорційно повільніший і дорожчий. 2× більше токенів 4× більше compute 2-3× більше latency $2.50 gpt-4o · 1M tok $15 Claude Opus · 1M tok −90% з prompt cache Ціна #2: «Lost in the Middle» — увага розподілена нерівномірно Дослідження (Liu et al., 2024) показали: LLM найкраще «бачать» токени на початку і в кінці контексту. У середині — провал. Точність може падати на 30%+, коли важливий факт ховається в середині довгого документа. [] Точність витягування факту залежно від його позиції в контексті. Дані типу Liu et al. (2024) + Chroma 2025. Корінь — у позиційному кодуванні (RoPE, Rotary Position Embedding), яке використовують більшість сучасних LLM. Воно вносить «згасання уваги» для позицій далеко від початку і кінця. Нові моделі це послабили, але повністю не усунули — це архітектурна властивість трансформерів. Практичний висновок: позиція інформації важить так само, як сама інформація. У RAG — клади найрелевантніший chunk на початку або в кінці. Не в середину. Ціна #3: LLM — stateless Модель не має пам'яті між викликами. Кожен запит починається з нуля. Коли ChatGPT «пам'ятає» попередній turn — це додаток повторно вкладає історію у вікно, а не модель «пам'ятає». Це означає: хтось (твій код) вирішує для кожного виклику, що покласти, що залишити, як структурувати. 3Context Rot — чому більше контексту шкодить Context rot — деградація якості LLM з ростом довжини вхідного контексту, навіть на простих задачах. У 2025 команда Chroma протестувала 18 frontier-моделей (GPT-4.1, Claude, Gemini тощо) на задачі different lengths. 18 моделей у тесті Chroma 95% → 60% типове падіння точності 100% моделей деградують з довжиною Деградація не плавна. Модель тримає ~95% точності до певної довжини, потім обвал — і точка обвалу непередбачувана: різна для моделей і для задач. Чому це відбувається - Кожен токен «з'їдає» частку обмеженого attention-бюджету - Нерелевантна інформація ховає важливу в low-attention зонах - Контент, який звучить релевантно, але насправді ні — плутає модель у виборі - Модель не «розумнішає» від більше інформації — вона відволікається Effective context vs Advertised context На коробці моделі пишуть «1M токенів». Це advertised — модель приймає такий вхід без помилки. Але effective context — довжина, на якій модель ще надійно використовує інформацію — зазвичай у 2-10 разів менший. 📦 Advertised (на коробці) «128K / 200K / 1M / 2M токенів». Модель прийме й обробить вхід. Проходить «needle in haystack» benchmarks. vs ✅ Effective (реально працює) Часто 20-50K для складних задач. Reliable synthesis, multi-hop reasoning. Те, на що можна закластися в проді. Не плутай benchmarks з реальністю: «needle in a haystack» (знайти одне підкладене речення у довгому тексті) — не те саме, що «синтезувати інформацію, розкидану по сотнях сторінок». Перше — пасять майже всі моделі. Друге — provadить майже всі. 46 типів контексту, які борються за місце Контекстне вікно — спільний бюджет, за який конкурують 6 типів інформації. Запитання користувача часто — крихітна частка від загалу. Решта — інфраструктура, яку проєктує context engineering. [] System instructions — поведінка, persona, правила ~12% User input — твоє питання ~5% Conversation history — short-term пам'ять сесії ~18% Retrieved knowledge — RAG, БД, API responses ~35% Tool descriptions — JSON schemas tools, які модель може викликати ~10% Tool outputs — результати попередніх викликів tools ~20% Уважно: у складних агентських workflow user input — це часто 5% контексту. Все інше — твоя інфраструктура. Виграш у якості і вартості — у тому, як ти керуєш цими 95%. 5Prompt engineering vs Context engineering Це не одне й те саме. Prompt engineering — підмножина context engineering. 📝 Prompt engineering Питання: «Як сформулювати інструкцію, щоб отримати кращий результат?» Фокус: instruction layer. Шаблони, few-shot, chain-of-thought, формат відповіді. Зазвичай — статичний текст промпта. ⊂ 🏗️ Context engineering Питання: «Що модель має побачити прямо зараз і як це динамічно зібрати?» Фокус: повна інформаційна система навколо моделі. Promp + RAG + memory + tools + history + token budget + assembly logic. «Context engineering — це делікатне мистецтво і наука наповнення контекстного вікна саме тією інформацією, яка потрібна для наступного кроку.» — Andrej Karpathy Двоє людей з тією самою моделлю можуть отримати кардинально різні результати. Модель та сама — контекст різний. Context engineering вирішує,
